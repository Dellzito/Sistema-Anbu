<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Registro - Esquadrão ANBU (ONLINE - FIREBASE)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        .remove-btn, .edit-btn, .admin-only, .writer-only { transition: all 0.1s ease-in-out; }
        .executor-list-container {
            min-height: 50px;
            padding: 8px;
            border: 1px solid #4b5563; 
            border-radius: 8px;
            background-color: #374151; 
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .executor-tag {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 9999px; 
            font-size: 0.875rem; 
            font-weight: 600;
            background-color: #ef4444; 
            color: #fff;
        }
        .executor-remove-btn {
            margin-left: 6px;
            cursor: pointer;
            color: #fecaca; 
        }
        .nav-link {
            cursor: pointer;
            padding: 10px 15px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .nav-link:hover:not(.active) {
            background-color: #1e293b; 
        }
        .nav-link.active {
            color: #f87171; 
            border-bottom: 2px solid #f87171;
        }
    </style>
</head>
<body class="p-4 sm:p-8 text-gray-100">

    <div id="app" class="max-w-6xl mx-auto space-y-8">
        
        <header class="pb-4 border-b border-red-700/50">
            <h1 id="main-title" class="text-4xl font-bold text-red-500 text-center mb-4">📜 Sistema de Registro — Esquadrão ANBU</h1>
            <nav class="flex justify-center bg-gray-900 rounded-xl shadow-lg p-1">
                <a class="nav-link" onclick="window.renderPage('home')" id="nav-home">Home</a>
                <a class="nav-link" onclick="window.renderPage('scoreboard')" id="nav-scoreboard">Ver Rank</a>
                <a class="nav-link" onclick="window.renderPage('reports_log')" id="nav-reports_log">Histórico</a>
                <a class="nav-link" onclick="window.renderPage('ninja_panel')" id="nav-ninja_panel">Painel de ANBUs</a>
                <a class="nav-link" onclick="window.renderPage('report_form')" id="nav-report_form">Criar Relatório</a>
                <a class="nav-link" onclick="window.renderPage('admin_panel')" id="nav-admin_panel">Autorização</a>
            </nav>
        </header>
        
        <div id="content" class="min-h-[60vh]">
            </div>

        <div id="status" class="text-center p-4 rounded-lg hidden"></div>
        <div id="auth-info" class="text-sm text-center text-yellow-500">Conectando ao Firebase...</div>
    </div>

    <div id="custom-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 hidden items-center justify-center p-4 z-50">
        <div id="modal-content" class="bg-gray-800 rounded-xl shadow-2xl p-6 w-full max-w-lg space-y-4 transform scale-95 transition-all">
            <h3 id="modal-title" class="text-xl font-bold text-red-400">Título</h3>
            <p id="modal-message" class="text-gray-300">Mensagem</p>
            <div id="modal-input-container" class="space-y-3 hidden">
                <label id="input-label-1" for="modal-input-1" class="block text-sm font-medium text-gray-300">Input 1</label>
                <input type="text" id="modal-input-1" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white" />
                <label id="input-label-2" for="modal-input-2" class="block text-sm font-medium text-gray-300">Input 2</label>
                <select id="modal-input-2" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white"></select>
                <span id="modal-error" class="text-red-400 text-sm hidden"></span>
            </div>
            <div id="modal-actions" class="flex justify-end gap-3 pt-2">
                <button id="modal-cancel-btn" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white font-semibold rounded-lg transition duration-150">Cancelar</button>
                <button id="modal-confirm-btn" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition duration-150">Confirmar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, doc, setDoc, onSnapshot, collection, writeBatch, 
            updateDoc, getDoc, deleteDoc, getDocs, setLogLevel, addDoc 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const CUSTOM_FIREBASE_CONFIG = {
            apiKey: "AIzaSyC-QaPr7O6RkWR3vpXCg4zrnUWw3TzU9ss",
            authDomain: "g-2cb53.firebaseapp.com",
            projectId: "g-2cb53",
            storageBucket: "g-2cb53.firebasestorage.app",
            messagingSenderId: "292095146978",
            appId: "1:292095146978:web:836d833230907d081017bb",
            measurementId: "G-B2EXQ2Z75D"
        };
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : CUSTOM_FIREBASE_CONFIG.projectId || 'g-2cb53';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : CUSTOM_FIREBASE_CONFIG;
        
        let isMasterAdminMode = false; 
        let isWriterMode = false; 
        let currentPage = 'home';
        let currentAccessId = 'ANONYMOUS'; 
        
        let app, db, auth;
        let userId = null;
        let currentReportId = ''; 
        let selectedExecutors = []; 
        
        let missionsData = {}; 
        let ninjasData = {}; 
        let reportsData = []; 
        let accessKeysData = {}; 
        
        const COLLECTIONS = {
            MISSIONS: `artifacts/${appId}/public/data/missions`,
            REPORTS: `artifacts/${appId}/public/data/reports`,
            NINJAS: `artifacts/${appId}/public/data/ninjas`, 
            ACCESS_KEYS: `artifacts/${appId}/public/data/access_keys`, 
            AUDIT_LOG: `artifacts/${appId}/users/audit_user_log/audit_events` 
        };

        const RANK_POINTS = {
            'SRANK': 5, 'ARANK': 4, 'BRANK': 3, 'CRANK': 2, 'DRANK': 1,
            'DEFESARAID': 10, 'NPCQUEST': 0, 'STORYLINE': 0, 'ANYLEVEL': 0
        };
        const RANK_OPTIONS = ["S-Rank", "A-Rank", "B-Rank", "C-Rank", "D-Rank", "Defesa/Raid", "NPC Quest", "Storyline"];
        const RANK_ORDER = ['S', 'A', 'B', 'C', 'D', 'DEFESA', 'BT'];

        setLogLevel('debug'); 

        window.logAction = async function(action, details) {
            if (!db) return;
            try {
                const logData = {
                    timestamp: new Date().toISOString(),
                    actorAccessId: currentAccessId,
                    actorUserId: auth.currentUser?.uid || 'anon',
                    action: action,
                    details: details,
                    level: isMasterAdminMode ? 'MASTER_ADMIN' : (isWriterMode ? 'WRITER' : 'ANON')
                };
                await addDoc(collection(db, COLLECTIONS.AUDIT_LOG), logData);
            } catch (e) {
                console.error("[AUDIT] Falha ao registrar log:", e);
            }
        }
        
        function getRankIcon(rank) {
            if (rank === 1) return '🥇';
            if (rank === 2) return '🥈';
            if (rank === 3) return '🥉';
            return `#${rank}`;
        }

        function getRankColor(rank) {
            if (!rank) return 'text-gray-400';
            if (rank.includes('S')) return 'text-red-500';
            if (rank.includes('A')) return 'text-orange-500';
            if (rank.includes('B')) return 'text-yellow-500';
            if (rank.includes('C')) return 'text-green-500';
            if (rank.includes('D')) return 'text-blue-500';
            if (rank.includes('BT')) return 'text-red-400';
            return 'text-gray-400';
        }

        function cleanRankForLookup(rank) {
            return rank.toUpperCase().replace('-', '').replace('/', '');
        }

        function normalizeId(id) {
            return id.trim().toLowerCase();
        }
        
        let resolveModalPromise = null; 
        window.openCustomModal = function(title, message, type, data = {}) {
            return new Promise(resolve => {
                resolveModalPromise = resolve;
                const modal = document.getElementById('custom-modal');
                const modalTitle = document.getElementById('modal-title');
                const modalMessage = document.getElementById('modal-message');
                const inputContainer = document.getElementById('modal-input-container');
                const input1 = document.getElementById('modal-input-1');
                const selectRank = document.getElementById('modal-input-2');
                const confirmBtn = document.getElementById('modal-confirm-btn');
                const cancelBtn = document.getElementById('modal-cancel-btn');
                
                modalTitle.textContent = title;
                modalMessage.textContent = message;
                inputContainer.classList.add('hidden');
                input1.value = '';
                selectRank.innerHTML = ''; 
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
                confirmBtn.classList.remove('bg-red-600', 'hover:bg-red-700', 'bg-orange-600', 'hover:bg-orange-700');
                confirmBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');

                if (type === 'confirm') {
                    confirmBtn.textContent = 'Confirmar';
                    confirmBtn.classList.remove('bg-blue-600');
                    confirmBtn.classList.add('bg-red-600', 'hover:bg-red-700');
                } else if (type === 'ninjaEdit') {
                    const statusText = data.isActive ? 'Ativo' : 'Inativo';
                    const newStatusText = data.isActive ? 'INATIVO' : 'ATIVO';
                    modalMessage.innerHTML = `O ANBU **${data.id}** está atualmente <span class="font-bold ${data.isActive ? 'text-green-400' : 'text-red-400'}">${statusText}</span>. Deseja alternar o status para **${newStatusText}**?`;
                    confirmBtn.textContent = `Alternar para ${newStatusText}`;
                    confirmBtn.classList.add('bg-orange-600', 'hover:bg-orange-700'); 
                }

                cancelBtn.onclick = () => closeCustomModal(false);
                if (type === 'confirm' || type === 'ninjaEdit') {
                     confirmBtn.onclick = confirmBtn.onclick || (() => closeCustomModal(true));
                }

                modal.classList.remove('hidden');
                modal.classList.add('flex');
            });
        }

        function closeCustomModal(result) {
            const modal = document.getElementById('custom-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            if (resolveModalPromise) {
                resolveModalPromise(result);
                resolveModalPromise = null;
            }
        }
        
        function _gatherReportData() {
            const btInput = document.getElementById('bt-points');
            const isSpecial = document.getElementById('chk-special') ? document.getElementById('chk-special').checked : false;
            const isTrashTalk = document.getElementById('chk-trashtalk') ? document.getElementById('chk-trashtalk').checked : false;
            const targetInput = document.getElementById('target-name');

            // Captura os Healers selecionados (se existirem e estiverem marcados)
            const healers = [];
            const healer1 = document.getElementById('healer-1');
            const healer2 = document.getElementById('healer-2');
            
            if (healer1 && healer1.checked) healers.push(normalizeId(healer1.value));
            if (healer2 && healer2.checked) healers.push(normalizeId(healer2.value));

            // Lógica Matemática
            let btBase = parseInt(btInput ? btInput.value : '0', 10);
            if (isNaN(btBase)) btBase = 0;

            let totalPointsRaw = btBase;
            if (isSpecial) totalPointsRaw *= 3;
            if (isTrashTalk) totalPointsRaw += 20;

            // Divisão pelos membros da PT (Executores + Healers)
            const partySize = selectedExecutors.length + healers.length;
            const pointsPerPerson = partySize > 0 ? Math.round(totalPointsRaw / partySize) : 0;

            return {
                reportId: currentReportId,
                btBase: btBase,
                isSpecial: isSpecial,
                isTrashTalk: isTrashTalk,
                executorIds: selectedExecutors,
                healerIds: healers, // Salva os healers para registro
                targetName: targetInput ? targetInput.value.trim() : '', // Nick do inimigo
                totalPointsRaw: totalPointsRaw,
                pointsPerPerson: pointsPerPerson, // Pontos que cada um vai receber
                finalReportRank: 'BT',
                timestamp: new Date().toISOString(),
                serviceNames: ['Caça (BT)'],
                clients: [] 
            };
        }

        window.generateReportId = function() {
            const reportIdElement = document.getElementById('report-id-display');
            if (!reportIdElement) return;

            const now = new Date();
            const datePart = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}`;
            const uuidPart = crypto.randomUUID().substring(0, 8);
            currentReportId = `RPT-${datePart}-${uuidPart}`;
            reportIdElement.value = currentReportId;
        }

        window.calculateTotalPoints = function() {
            const data = _gatherReportData();
            const totalPointsInput = document.getElementById('total-points');
            const submitBtn = document.getElementById('submit-report');

            if (!data || !totalPointsInput || !submitBtn) return;
            
            // Mostra o total para conferência no formulário
            totalPointsInput.value = `${data.totalPointsRaw} (Divisão: ${data.pointsPerPerson} Pts p/ membro)`;

            const hasPartyMembers = (data.executorIds.length + data.healerIds.length) > 0;
            const isReady = isWriterMode && hasPartyMembers && data.totalPointsRaw > 0; 
            submitBtn.disabled = !isReady;
            
            if (isReady) {
                 submitBtn.classList.remove('bg-red-600/50', 'cursor-not-allowed');
                 submitBtn.classList.add('bg-red-600', 'hover:bg-red-700');
            } else {
                 submitBtn.classList.add('bg-red-600/50', 'cursor-not-allowed');
                 submitBtn.classList.remove('bg-red-600', 'hover:bg-red-700');
            }
        }
        
        window.updateDescriptionPreview = function() {
            const previewDiv = document.getElementById('description-preview');
            if (!previewDiv) return;

            const data = _gatherReportData();
            let previewText = `Bounty Base: ${data.btBase} pts. `;

            if (data.targetName) previewText += `[Alvo: ${data.targetName}]. `;
            if (data.isSpecial) previewText += `[ALVO ESPECIAL: Dakotinha/Guinho (x3)]. `;
            if (data.isTrashTalk) previewText += `[TRASH TALK (+20)]. `;

            const allPT = [...data.executorIds, ...data.healerIds];
            if (allPT.length > 0) {
                previewText += `PT (${allPT.length} membros): ${allPT.join(', ')}. `;
            } else {
                previewText += `[Nenhum ANBU/Healer selecionado]. `;
            }

            previewText += `=> TOTAL BT: ${data.totalPointsRaw} Pts | DIVISÃO: ${data.pointsPerPerson} Pts p/ cada.`;

            previewDiv.textContent = previewText.trim();
            window.calculateTotalPoints();
        }

        window.submitReport = async function() {
            if (!isWriterMode) {
                 window.openCustomModal('Acesso Negado', 'Você precisa de permissão de Escritor ou Admin para registrar BTs.', 'info');
                 return;
            }

            const data = _gatherReportData();
            const statusElement = document.getElementById('status');

            if (!data || (data.executorIds.length === 0 && data.healerIds.length === 0) || data.totalPointsRaw === 0) {
                 window.openCustomModal('Erro', 'O registro deve ter pelo menos um membro na PT e um valor de BT preenchido (maior que 0).', 'info');
                 return;
            }

            statusElement.classList.remove('hidden');
            statusElement.className = 'text-yellow-400 p-4 bg-yellow-900/50 rounded-lg block';
            statusElement.textContent = `Registrando Relatório ${data.reportId} e atualizando Rank...`;

            const batch = writeBatch(db);
            const pointsToAward = data.pointsPerPerson; // Agora usa o valor dividido
            const missionsCount = 1; 

            try {
                // 1. Set Report
                const reportRef = doc(db, COLLECTIONS.REPORTS, data.reportId);
                batch.set(reportRef, data);

                // 2. Update all Party Members (NINJAS collection - Executors + Healers)
                const allParticipants = [...data.executorIds, ...data.healerIds];
                for (const participantId of allParticipants) {
                    const ninjaRef = doc(db, COLLECTIONS.NINJAS, participantId);
                    batch.set(ninjaRef, { 
                        rankPoints: (ninjasData[participantId]?.rankPoints || 0) + pointsToAward,
                        missionsCompleted: (ninjasData[participantId]?.missionsCompleted || 0) + missionsCount,
                    }, { merge: true });
                }
                
                await batch.commit();

                statusElement.textContent = `✅ Sucesso! Registro finalizado. ${pointsToAward} pontos aplicados para cada membro.`;
                statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                
                // Reset Form UI
                selectedExecutors = [];
                window.updateExecutorTags();
                window.generateReportId();
                if(document.getElementById('bt-points')) document.getElementById('bt-points').value = '';
                if(document.getElementById('chk-special')) document.getElementById('chk-special').checked = false;
                if(document.getElementById('chk-trashtalk')) document.getElementById('chk-trashtalk').checked = false;
                if(document.getElementById('target-name')) document.getElementById('target-name').value = '';
                if(document.getElementById('healer-1')) document.getElementById('healer-1').checked = false;
                if(document.getElementById('healer-2')) document.getElementById('healer-2').checked = false;
                window.updateDescriptionPreview(); 

            } catch (e) {
                console.error("Erro no registro do Firebase Batch:", e);
                statusElement.textContent = `❌ Erro no Registro: ${e.message}. Verifique permissões de escrita/internet.`;
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
            }
            setTimeout(() => statusElement.classList.add('hidden'), 7000);
        }

        window.updateExecutorSelect = function() {
            const select = document.getElementById('new-executor-id-select');
            if (!select) return;
            
            const activeNinjas = Object.values(ninjasData).filter(n => n.isActive);

            select.innerHTML = '<option value="" disabled selected>Selecione um ANBU Ativo</option>';
            activeNinjas.sort((a, b) => a.id.localeCompare(b.id)).forEach(ninja => {
                if (!selectedExecutors.includes(ninja.id)) {
                    const option = document.createElement('option');
                    option.value = ninja.id;
                    option.textContent = ninja.id;
                    select.appendChild(option);
                }
            });
        }

        window.addNinja = async function() {
            if (!isMasterAdminMode) {
                window.openCustomModal('Acesso Negado', 'Você precisa de permissão Master para adicionar ANBUs.', 'info');
                return;
            }

            const newNinjaIdInput = document.getElementById('new-ninja-id');
            const ninjaId = newNinjaIdInput.value.trim();
            const normalizedId = normalizeId(ninjaId);
            const statusElement = document.getElementById('status');

            statusElement.classList.remove('hidden');
            statusElement.className = 'text-yellow-400 p-4 bg-yellow-900/50 rounded-lg block';
            statusElement.textContent = `Processando adição de ANBU...`;

            if (!ninjaId) {
                statusElement.textContent = '❌ O ID do ANBU não pode ser vazio.';
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 5000);
                return;
            }

            if (ninjasData[normalizedId]) {
                statusElement.textContent = `❌ O ANBU '${normalizedId}' já está cadastrado.`;
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 5000);
                return;
            }

            try {
                await setDoc(doc(db, COLLECTIONS.NINJAS, normalizedId), {
                    id: normalizedId, 
                    isActive: true, 
                    rankPoints: 0, 
                    missionsCompleted: 0
                });
                
                newNinjaIdInput.value = ''; 
                statusElement.textContent = `✅ ANBU '${normalizedId}' adicionado com sucesso!`;
                statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 5000);

                window.updateExecutorSelect();
                window.logAction('ADD_GUARDIAN', { guardianId: normalizedId });

            } catch (e) {
                console.error("Erro ao adicionar ANBU:", e);
                statusElement.textContent = `❌ Erro ao adicionar ANBU: ${e.message}`;
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
            }
        }
        
        window.deleteNinja = function(id) { 
            if (!isMasterAdminMode) return;
            window.openCustomModal('Confirmação de Exclusão', `Excluir permanentemente o ANBU '${id}'?`, 'confirm', async (confirmed) => {
                 if (confirmed) {
                     const statusElement = document.getElementById('status');
                     try {
                         await deleteDoc(doc(db, COLLECTIONS.NINJAS, id));
                         selectedExecutors = selectedExecutors.filter(execId => execId !== id);
                         window.updateExecutorTags();
                         window.updateExecutorSelect(); 
                         window.logAction('DELETE_GUARDIAN', { guardianId: id });
                         statusElement.textContent = `✅ ANBU excluído!`;
                         statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                     } catch (e) {
                         statusElement.textContent = `❌ Erro: ${e.message}`;
                         statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                     }
                     statusElement.classList.remove('hidden');
                     setTimeout(() => statusElement.classList.add('hidden'), 5000);
                 }
            });
        }
        
        window.editNinja = function(id) { 
            if (!isMasterAdminMode) return;
            const ninja = ninjasData[id];
            if (!ninja) return;

            window.openCustomModal('Alternar Status do ANBU', null, 'ninjaEdit', { id: ninja.id, isActive: ninja.isActive }).then(async (confirmed) => {
                 if (confirmed) {
                     try {
                         await updateDoc(doc(db, COLLECTIONS.NINJAS, id), { isActive: !ninja.isActive });
                         window.logAction('EDIT_GUARDIAN_STATUS', { guardianId: id });
                     } catch (e) {
                         console.error(e);
                     }
                 }
            });
        }

        window.addExecutor = function() {
            const select = document.getElementById('new-executor-id-select');
            if (!select || !select.value) return;

            const ninjaId = select.value;
            if (!selectedExecutors.includes(ninjaId)) {
                selectedExecutors.push(ninjaId);
                select.value = ''; 
                window.updateExecutorTags();
                window.updateExecutorSelect(); 
                window.updateDescriptionPreview(); 
            }
        }
        
        window.removeExecutor = function(ninjaId) {
            selectedExecutors = selectedExecutors.filter(id => id !== ninjaId);
            window.updateExecutorTags();
            window.updateExecutorSelect(); 
            window.updateDescriptionPreview(); 
        }

        window.updateExecutorTags = function() { 
            const container = document.getElementById('executors-tag-container');
            if (!container) return;
            
            let contentHTML = '';
            if (selectedExecutors.length === 0) {
                contentHTML = '<span id="no-executor-message" class="text-gray-400 text-sm italic">Nenhum ANBU selecionado.</span>';
            } else {
                selectedExecutors.forEach(id => {
                    contentHTML += `
                        <span class="executor-tag" id="executor-tag-${id}">
                            ${id}
                            <span class="executor-remove-btn" onclick="window.removeExecutor('${id}')">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                            </span>
                        </span>
                    `;
                });
            }
            container.innerHTML = contentHTML;
            window.updateDescriptionPreview();
        }
        
        window.copyReportId = function() { 
             const reportIdElement = document.getElementById('report-id-display');
             if (reportIdElement) {
                const tempInput = document.createElement('textarea');

                    const ninjaCollectionRef = collection(db, COLLECTIONS.NINJAS);
                    
                    const reportsSnapshot = await getDocs(reportsCollectionRef); 
                    const ninjaSnapshot = await getDocs(ninjaCollectionRef);
                    
                    let batch = writeBatch(db);
                    reportsSnapshot.forEach((doc) => batch.delete(doc.ref));
                    ninjaSnapshot.forEach((doc) => batch.update(doc.ref, { rankPoints: 0, missionsCompleted: 0 }));
                    
                    await batch.commit();

                    statusElement.textContent = `✅ Sucesso! Registros excluídos e Ranks resetados.`;
                    statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';

        window.recalculateAllRanks = async function(calledInternally = false) {
            if (!isWriterMode) return;
            if (!calledInternally) {
                const confirmed = await window.openCustomModal(
                    'Confirmação de Recálculo', 'RECALCULAR todos os Ranks? Isso irá recontar os pontos com base no histórico.', 'confirm'
                );
                if (!confirmed) return;
            }

            const statusElement = document.getElementById('status');
            if (!calledInternally) { 
                statusElement.classList.remove('hidden');
                statusElement.className = 'text-yellow-400 p-4 bg-yellow-900/50 rounded-lg block';
                statusElement.textContent = `Recalculando Ranks...`;
            }
            
            try {
                const tempNinjas = {}; 
                Object.values(ninjasData).forEach(ninja => {
                    tempNinjas[ninja.id] = { ...ninja, rankPoints: 0, missionsCompleted: 0 };
                });

                let resetBatch = writeBatch(db);
                Object.values(ninjasData).forEach(ninja => {
                    const ninjaRef = doc(db, COLLECTIONS.NINJAS, ninja.id);
                    resetBatch.update(ninjaRef, { rankPoints: 0, missionsCompleted: 0 });
                });
                await resetBatch.commit();
                
                let applyBatch = writeBatch(db);
                reportsData.forEach((report) => {
                    // Usar a pontuação por pessoa do banco de dados (novo formato) ou manter compatibilidade
                    const pointsToGive = report.pointsPerPerson || report.totalPointsRaw || 0;
                    
                    const allParticipants = [...(report.executorIds || []), ...(report.healerIds || [])];
                    if (allParticipants.length > 0 && pointsToGive > 0) {
                        allParticipants.forEach(participantId => {
                             if (!tempNinjas[participantId]) {
                                 tempNinjas[participantId] = { id: participantId, isActive: true, rankPoints: 0, missionsCompleted: 0 };
                             }
                             tempNinjas[participantId].rankPoints += pointsToGive;
                             tempNinjas[participantId].missionsCompleted += 1;
                        });
                    }
                }); 
                
                Object.values(tempNinjas).forEach(ninja => {
                    const ninjaRef = doc(db, COLLECTIONS.NINJAS, ninja.id);
                    applyBatch.update(ninjaRef, { 
                        rankPoints: ninja.rankPoints, 
                        missionsCompleted: ninja.missionsCompleted
                    });
                });

                await applyBatch.commit();
                
                if (!calledInternally) {
                    statusElement.textContent = `✅ Sucesso! Recálculo concluído.`;
                    statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                    setTimeout(() => statusElement.classList.add('hidden'), 5000);
                }
            } catch (e) {
                statusElement.textContent = `❌ Erro no Recálculo: ${e.message}`;
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 7000);
            }
        }

        async function initializeFirebase() {
            try {
                if (!firebaseConfig || !firebaseConfig.projectId) throw new Error("Configuração do Firebase inválida.");
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                const anonUser = await signInAnonymously(auth);
                userId = anonUser.user.uid;
                currentAccessId = 'ANONYMOUS'; 
                
                document.getElementById('auth-info').textContent = `Usuário ID (Anon): ${userId} | App ID: ${appId}`;
                setupFirestoreListeners(); 
                window.renderPage(currentPage);
                window.generateReportId(); 
            } catch (error) {
                const statusElement = document.getElementById('status');
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                statusElement.textContent = `❌ Erro ao conectar: ${error.message}`;
            }
        }
        
        function setupFirestoreListeners() {
            if (!db) return;

            onSnapshot(collection(db, COLLECTIONS.ACCESS_KEYS), (snapshot) => {
                accessKeysData = {};
                snapshot.forEach(doc => accessKeysData[doc.id] = doc.data());
                if (currentPage === 'admin_panel' || currentPage === 'report_form') window.renderPage(currentPage); 
            }, (error) => {});

            onSnapshot(collection(db, COLLECTIONS.NINJAS), (snapshot) => {
                ninjasData = {};
                snapshot.forEach(doc => ninjasData[doc.id] = doc.data());
                window.updateExecutorSelect && window.updateExecutorSelect();
                if (['scoreboard', 'ninja_panel'].includes(currentPage)) window.renderPage(currentPage);
                else if (currentPage === 'admin_panel') window.renderNinjasTable && window.renderNinjasTable();
            }, (error) => {});

            onSnapshot(collection(db, COLLECTIONS.REPORTS), (snapshot) => {
                reportsData = [];
                snapshot.forEach(doc => reportsData.push(doc.data()));
                if (['reports_log', 'ninja_panel'].includes(currentPage)) window.renderPage(currentPage);
            }, (error) => {});
        }

        window.checkAccessKey = async function() {
            const idInput = document.getElementById('access-id-input');
            const keyInput = document.getElementById('access-key-input');
            const statusElement = document.getElementById('status');
            if (!idInput || !keyInput) return;

            const id = idInput.value.trim();
            const key = keyInput.value.trim();
            if (!id || !key) return;
            
            const accessData = accessKeysData[id];

            if (accessData && accessData.key === key) {
                currentAccessId = id; 
                if (accessData.level === 'master_admin') {
                    window.toggleMasterAdminUI(true);
                    window.toggleWriterUI(true);
                    statusElement.textContent = `✅ Acesso MASTER LIBERADO. ID: ${id}.`;
                } else if (accessData.level === 'report_writer') {
                    window.toggleWriterUI(true);
                    window.toggleMasterAdminUI(false);
                    statusElement.textContent = `✅ Acesso ANBU LIBERADO. ID: ${id}.`;
                }
                keyInput.value = ''; 
                idInput.value = '';
                statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 5000);
                window.renderPage(currentPage);
            } else {
                currentAccessId = 'ANONYMOUS'; 
                window.toggleWriterUI(false);
                window.toggleMasterAdminUI(false);
                statusElement.textContent = '❌ Autorização Negada. ID ou Senha Incorreta.';
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 7000);
            }
        }
        
        window.renderPage = function(pageName) {
            currentPage = pageName;
            const contentDiv = document.getElementById('content');
            
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            const activeLink = document.getElementById(`nav-${pageName}`);
            if (activeLink) activeLink.classList.add('active');

            contentDiv.innerHTML = '';

            switch (pageName) {
                case 'home':
                    contentDiv.innerHTML = window.renderHome();
                    break;
                case 'scoreboard':
                    contentDiv.innerHTML = window.renderRank();
                    window.renderScoreboard();
                    break;
                case 'reports_log':
                    contentDiv.innerHTML = window.renderRelatorios();
                    window.renderReportsLog();
                    break;
                case 'ninja_panel':
                    contentDiv.innerHTML = window.renderNinjaPanel(); 
                    window.renderReportsLogFiltered(); 
                    break;

                    contentDiv.innerHTML = window.renderCriarRelatorio();

            }
        }

                            <input id="report-id-display" type="text" readonly class="w-full p-2.5 rounded-lg bg-gray-600/50 border border-gray-600 text-red-300 font-mono shadow-inner cursor-not-allowed" value="Gerado Automaticamente">
                            <button type="button" onclick="window.copyReportId()" class="p-2.5 bg-gray-700 hover:bg-gray-600 text-white rounded-lg transition duration-200" title="Copiar ID para o Discord">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M7 9a1 1 0 011-1h4a1 1 0 110 2H8a1 1 0 01-1-1zm0 4a1 1 0 011-1h4a1 1 0 110 2H8a1 1 0 01-1-1z" /><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-5a1 1 0 00-1 1v2a1 1 0 102 0V6a1 1 0 00-1-1zm2 13a1 1 0 001-1v-2a1 1 0 10-2 0v2a1 1 0 001 1z" clip-rule="evenodd" /></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 pt-4 border-t border-gray-700/50">
                    <div class="space-y-2 lg:col-span-2">
                        <label class="block text-sm font-medium text-gray-300">Total Dividido pela PT</label>
                        <input id="total-points" type="text" readonly class="w-full p-2.5 rounded-lg bg-gray-600/50 border border-gray-600 text-green-400 font-bold shadow-inner cursor-not-allowed" value="0">
                    </div>
                </div>

                <div class="pt-4 space-y-2 border-t border-gray-700/50">
                    <h3 class="text-xl font-medium text-gray-300">Preview do Registro:</h3>
                    <div id="description-preview" class="p-4 bg-gray-700 rounded-lg text-gray-300 italic min-h-[50px]">
                        Preencha os dados acima para gerar o preview.
                    </div>
                </div>

                <button id="submit-report" class="w-full py-3 mt-4 bg-red-600/50 rounded-lg font-bold text-white text-lg transition duration-200 shadow-lg shadow-red-500/50 cursor-not-allowed" disabled onclick="window.submitReport()">
                    Registrar BT e Atualizar Rank
                </button>
            </section>
        `; }
        
        window.renderRank = function() {
            return `
                <section class="space-y-4 pt-8">
                    <h2 class="text-3xl font-bold text-red-400 text-center flex justify-center items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM7 8a1 1 0 000 2h6a1 1 0 100-2H7z" clip-rule="evenodd" /><path fill-rule="evenodd" d="M10 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zM5 10a1 1 0 011-1h8a1 1 0 110 2H6a1 1 0 01-1-1z" clip-rule="evenodd" /></svg>
                        Rank da ANBU (Membros Cadastrados)
                    </h2>
                    <div class="bg-gray-800 p-4 rounded-xl shadow-xl overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-700">
                            <thead class="bg-gray-700">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Rank</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">ID ANBU</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Total de Pontos</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Caçadas Concluídas</th>
                                </tr>
                            </thead>
                            <tbody id="ninjas-scoreboard" class="bg-gray-800 divide-y divide-gray-700"></tbody>
                        </table>
                    </div>
                </section>
            `;
        }

        window.renderRelatorios = function() {
            return `
                <section class="space-y-4 pt-8">
                    <h2 class="text-3xl font-bold text-red-400 text-center">Registro Completo de Caçadas (BTs)</h2>
                    <div class="bg-gray-800 p-4 rounded-xl shadow-xl overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-700">
                            <thead class="bg-gray-700">
                                <tr>
                                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider w-1/12">ID Registro</th>
                                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider w-2/12">Serviços/Rank</th>
                                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider w-2/12">Membros da PT</th>
                                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider w-2/12">Alvo Morto</th>
                                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider w-4/12">Descrição/Pontos</th>
                                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider w-1/12">Data</th>
                                </tr>
                            </thead>
                            <tbody id="reports-log" class="bg-gray-800 divide-y divide-gray-700"></tbody>
                        </table>
                    </div>
                </section>
            `;
        }

        window.renderAutorizacao = function() {
             const accessStatus = isMasterAdminMode ? 
                `<div class="text-center text-green-400 font-bold text-lg p-2">✅ MASTER ADMIN ATIVO</div>` : 
                (isWriterMode ? `<div class="text-yellow-400 font-bold text-lg p-2">✅ ANBU ESCRITOR ATIVO</div>` :
                `<div class="text-center text-red-400 font-bold text-lg p-2">❌ ACESSO INATIVO</div>`);

            return `
                <section class="space-y-4 pt-4 pb-4 bg-gray-900 p-6 rounded-xl shadow-inner border border-red-500/50">
                     <h2 class="text-2xl font-bold text-red-400 text-center flex justify-center items-center gap-2">
                         <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a5 5 0 00-5 5v2a2 2 0 00-2 2v5a2 2 0 002 2h10a2 2 0 002-2v-5a2 2 0 00-2-2V7a5 5 0 00-5-5zm2 5v2h-4V7a3 3 0 016 0z"/></svg>
                         Autorização de Escrita (ID & Senha Única)
                     </h2>
                     <div id="admin-status-display">${accessStatus}</div>
                     <div class="flex flex-col md:flex-row gap-4 max-w-lg mx-auto">
                         <input id="access-id-input" type="text" placeholder="Seu ID de ANBU/Admin" class="flex-grow p-2 rounded-lg bg-gray-700 border border-gray-600 text-white shadow-inner">
                         <input id="access-key-input" type="password" placeholder="Sua Senha Única" class="flex-grow p-2 rounded-lg bg-gray-700 border border-gray-600 text-white shadow-inner">
                         <button id="set-access-key-btn" class="w-full md:w-auto py-2 px-4 bg-red-600 hover:bg-red-700 rounded-lg font-bold text-white transition duration-200" onclick="window.checkAccessKey()">
                             Verificar Acesso
                         </button>
                     </div>
                </section>
                
                <section class="space-y-4 pt-8 pb-16">
                    <h2 class="text-3xl font-bold text-yellow-400 text-center">Cadastro: ANBUs (Membros Oficiais)</h2>
                    <div id="add-ninja-form" class="bg-gray-700 p-4 rounded-lg shadow-inner flex flex-col sm:flex-row gap-4 admin-only ${isMasterAdminMode ? '' : 'hidden'}">
                        <input id="new-ninja-id" type="text" placeholder="ID do Novo ANBU (Ex: Dellzito)" class="flex-grow p-2 rounded-lg bg-gray-800 border border-gray-600 text-white">
                        <button id="add-ninja" class="w-full sm:w-auto py-2 px-4 bg-yellow-600 hover:bg-yellow-700 rounded-lg font-bold text-white transition duration-200" onclick="window.addNinja()">Adicionar ANBU</button>
                    </div>

                    <div class="bg-gray-800 p-4 rounded-xl shadow-xl overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-700">
                            <thead class="bg-gray-700">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">ID ANBU</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Status</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider admin-only ${isMasterAdminMode ? '' : 'hidden'}">Ação</th>
                                </tr>
                            </thead>
                            <tbody id="ninjas-cadastro" class="bg-gray-800 divide-y divide-gray-700"></tbody>
                        </table>
                    </div>
                </section>

                <div id="writer-tools" class="pt-8 space-y-4 writer-only ${isWriterMode ? '' : 'hidden'}">
                    <h3 class="text-xl font-bold text-red-400 border-b border-red-400/50 pb-2">Ferramentas de Recálculo</h3>
                    <button onclick="window.recalculateAllRanks()" class="w-full py-2 px-4 bg-red-600 hover:bg-red-700 rounded-lg font-bold text-white text-lg transition duration-200">
                        🔄 Recalcular Todos os Ranks Agora
                    </button>
                </div>

                <div id="admin-tools" class="pt-4 space-y-4 admin-only ${isMasterAdminMode ? '' : 'hidden'}">
                    <h3 class="text-xl font-bold text-red-500 border-b border-red-500/50 pb-2">Ferramentas de Exclusão (Admin Master)</h3>
                    <button onclick="window.clearReportsLog()" class="w-full py-2 px-4 bg-red-700 hover:bg-red-800 rounded-lg font-bold text-white transition duration-200">
                        ⚔️ Excluir Histórico de Registros (ZERA Ranks)
                    </button>
                </div>
            `;
        }
        
        window.onload = function() { initializeFirebase(); }
    </script>
</body>
</html>
