<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Registro - Esquadrão ANBU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        .remove-btn, .edit-btn, .admin-only, .writer-only { transition: all 0.1s ease-in-out; }
        .executor-list-container {
            min-height: 50px; padding: 8px; border: 1px solid #4b5563; 
            border-radius: 8px; background-color: #374151; 
            display: flex; flex-wrap: wrap; gap: 6px;
        }
        .executor-tag {
            display: flex; align-items: center; padding: 4px 8px;
            border-radius: 9999px; font-size: 0.875rem; font-weight: 600;
            background-color: #ef4444; color: #fff;
        }
        .healer-tag { background-color: #10b981; }
        .executor-remove-btn { margin-left: 6px; cursor: pointer; color: #fecaca; }
        .nav-link { cursor: pointer; padding: 10px 15px; font-weight: 600; transition: all 0.2s; }
        .nav-link:hover:not(.active) { background-color: #1e293b; }
        .nav-link.active { color: #f87171; border-bottom: 2px solid #f87171; }
    </style>
</head>
<body class="p-4 sm:p-8 text-gray-100">

    <div id="app" class="max-w-6xl mx-auto space-y-8">
        <header class="pb-4 border-b border-red-700/50">
            <h1 id="main-title" class="text-4xl font-bold text-red-500 text-center mb-4">📜 Sistema de Registro — Esquadrão ANBU</h1>
            <nav class="flex flex-wrap justify-center bg-gray-900 rounded-xl shadow-lg p-1 gap-2">
                <a class="nav-link" onclick="window.renderPage('home')" id="nav-home">Home</a>
                <a class="nav-link" onclick="window.renderPage('scoreboard')" id="nav-scoreboard">Ver Rank</a>
                <a class="nav-link" onclick="window.renderPage('reports_log')" id="nav-reports_log">Histórico de BTs</a>
                <a class="nav-link" onclick="window.renderPage('ninja_panel')" id="nav-ninja_panel">Perfil do ANBU</a>
                <a class="nav-link" onclick="window.renderPage('report_form')" id="nav-report_form">Registrar BT</a>
                <a class="nav-link" onclick="window.renderPage('admin_panel')" id="nav-admin_panel">Autorização / Gerenciamento</a>
            </nav>
        </header>
        
        <div id="content" class="min-h-[60vh]"></div>

        <div id="status" class="text-center p-4 rounded-lg hidden"></div>
        <div id="auth-info" class="text-sm text-center text-yellow-500">Conectando ao Firebase...</div>
    </div>

    <div id="custom-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 hidden items-center justify-center p-4 z-50">
        <div id="modal-content" class="bg-gray-800 rounded-xl shadow-2xl p-6 w-full max-w-lg space-y-4 transform scale-95 transition-all">
            <h3 id="modal-title" class="text-xl font-bold text-red-400">Título</h3>
            <p id="modal-message" class="text-gray-300">Mensagem</p>
            <div id="modal-actions" class="flex justify-end gap-3 pt-2">
                <button id="modal-cancel-btn" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white font-semibold rounded-lg transition duration-150">Cancelar</button>
                <button id="modal-confirm-btn" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition duration-150">Confirmar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, doc, setDoc, onSnapshot, collection, writeBatch, 
            updateDoc, deleteDoc, getDocs, setLogLevel, addDoc 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // SUAS CONFIGURAÇÕES DO FIREBASE
        const CUSTOM_FIREBASE_CONFIG = {
            apiKey: "AIzaSyC-QaPr7O6RkWR3vpXCg4zrnUWw3TzU9ss",
            authDomain: "g-2cb53.firebaseapp.com",
            projectId: "g-2cb53",
            storageBucket: "g-2cb53.firebasestorage.app",
            messagingSenderId: "292095146978",
            appId: "1:292095146978:web:836d833230907d081017bb"
        };
        
        const appId = CUSTOM_FIREBASE_CONFIG.projectId;
        const firebaseConfig = CUSTOM_FIREBASE_CONFIG;
        
        let isMasterAdminMode = false; 
        let isWriterMode = false; 
        let currentPage = 'home';
        let currentAccessId = 'ANONYMOUS'; 
        
        let app, db, auth;
        let currentReportId = ''; 
        let selectedExecutors = []; 
        let selectedHealers = []; 
        
        let ninjasData = {}; 
        let reportsData = []; 
        let accessKeysData = {}; 
        
        const COLLECTIONS = {
            REPORTS: `artifacts/${appId}/public/data/reports`,
            NINJAS: `artifacts/${appId}/public/data/ninjas`, 
            ACCESS_KEYS: `artifacts/${appId}/public/data/access_keys`, 
            AUDIT_LOG: `artifacts/${appId}/users/audit_user_log/audit_events` 
        };

        window.logAction = async function(action, details) {
            if (!db) return;
            try {
                await addDoc(collection(db, COLLECTIONS.AUDIT_LOG), {
                    timestamp: new Date().toISOString(),
                    actorAccessId: currentAccessId,
                    action: action,
                    details: details,
                    level: isMasterAdminMode ? 'MASTER_ADMIN' : (isWriterMode ? 'WRITER' : 'ANON')
                });
            } catch (e) { console.error(e); }
        }

        function getRankIcon(rank) {
            if (rank === 1) return '🥇';
            if (rank === 2) return '🥈';
            if (rank === 3) return '🥉';
            return `#${rank}`;
        }
        
        function normalizeId(id) {
            return id.trim().toLowerCase();
        }
        
        let resolveModalPromise = null; 
        window.openCustomModal = function(title, message, type, data = {}) {
            return new Promise(resolve => {
                resolveModalPromise = resolve;
                const modal = document.getElementById('custom-modal');
                const modalTitle = document.getElementById('modal-title');
                const modalMessage = document.getElementById('modal-message');
                const confirmBtn = document.getElementById('modal-confirm-btn');
                const cancelBtn = document.getElementById('modal-cancel-btn');
                
                modalTitle.textContent = title;
                modalMessage.textContent = message;
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
                confirmBtn.classList.remove('bg-red-600', 'bg-orange-600');
                confirmBtn.classList.add('bg-blue-600');

                if (type === 'confirm') {
                    confirmBtn.textContent = 'Confirmar';
                    confirmBtn.classList.remove('bg-blue-600');
                    confirmBtn.classList.add('bg-red-600');
                } else if (type === 'ninjaEdit') {
                    const statusText = data.isActive ? 'Ativo' : 'Inativo';
                    const newStatusText = data.isActive ? 'INATIVO' : 'ATIVO';
                    modalMessage.innerHTML = `O ANBU **${data.id}** está atualmente <span class="font-bold ${data.isActive ? 'text-green-400' : 'text-red-400'}">${statusText}</span>. Deseja alternar o status para **${newStatusText}**?`;
                    confirmBtn.textContent = `Alternar`;
                    confirmBtn.classList.add('bg-orange-600'); 
                }

                cancelBtn.onclick = () => closeCustomModal(false);
                confirmBtn.onclick = () => closeCustomModal(true);

                modal.classList.remove('hidden');
                modal.classList.add('flex');
            });
        }

        function closeCustomModal(result) {
            const modal = document.getElementById('custom-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            if (resolveModalPromise) {
                resolveModalPromise(result);
                resolveModalPromise = null;
            }
        }
        
        function _gatherReportData() {
            const btInput = document.getElementById('bt-points');
            const targetInput = document.getElementById('target-name');
            const isSpecial = document.getElementById('chk-special') ? document.getElementById('chk-special').checked : false;
            const isOrg = document.getElementById('chk-org') ? document.getElementById('chk-org').checked : false;
            const isTrashTalk = document.getElementById('chk-trashtalk') ? document.getElementById('chk-trashtalk').checked : false;

            let btBase = parseInt(btInput ? btInput.value : '0', 10);
            if (isNaN(btBase)) btBase = 0;

            let totalPointsRaw = btBase;
            
            // Lógica de Modificadores (Multiplicador primeiro, depois bônus fixos)
            if (isSpecial) totalPointsRaw *= 3; // Kage x3
            if (isOrg) totalPointsRaw += 100;   // ORG Especial +100
            if (isTrashTalk) totalPointsRaw += 20; // Trash Talk +20

            // MATEMÁTICA DA DIVISÃO
            const attackersCount = selectedExecutors.length;
            const pointsPerAttacker = attackersCount > 0 ? Math.round(totalPointsRaw / attackersCount) : 0;
            const pointsPerHealer = totalPointsRaw; 

            return {
                reportId: currentReportId,
                btBase: btBase,
                isSpecial: isSpecial,
                isOrg: isOrg,
                isTrashTalk: isTrashTalk,
                executorIds: selectedExecutors,
                healerIds: selectedHealers, 
                targetName: targetInput ? targetInput.value.trim() : '', 
                totalPointsRaw: totalPointsRaw,
                pointsPerAttacker: pointsPerAttacker,
                pointsPerHealer: pointsPerHealer,
                timestamp: new Date().toISOString()
            };
        }

        window.generateReportId = function() {
            const reportIdElement = document.getElementById('report-id-display');
            if (!reportIdElement) return;
            const datePart = new Date().toISOString().slice(0,10).replace(/-/g,'');
            const uuidPart = crypto.randomUUID().substring(0, 8);
            currentReportId = `BT-${datePart}-${uuidPart}`;
            reportIdElement.value = currentReportId;
        }

        window.calculateTotalPoints = function() {
            const data = _gatherReportData();
            const totalPointsInput = document.getElementById('total-points');
            const submitBtn = document.getElementById('submit-report');

            if (!data || !totalPointsInput || !submitBtn) return;
            
            totalPointsInput.value = `BT Total: ${data.totalPointsRaw} (PT ganha ${data.pointsPerAttacker} pts cada | Healers ganham ${data.pointsPerHealer} pts)`;

            const hasPartyMembers = (data.executorIds.length + data.healerIds.length) > 0;
            const isReady = isWriterMode && hasPartyMembers && data.totalPointsRaw > 0; 
            submitBtn.disabled = !isReady;
            
            if (isReady) {
                 submitBtn.classList.remove('bg-red-600/50', 'cursor-not-allowed');
                 submitBtn.classList.add('bg-red-600', 'hover:bg-red-700');
            } else {
                 submitBtn.classList.add('bg-red-600/50', 'cursor-not-allowed');
                 submitBtn.classList.remove('bg-red-600', 'hover:bg-red-700');
            }
        }
        
        window.updateDescriptionPreview = function() {
            const previewDiv = document.getElementById('description-preview');
            if (!previewDiv) return;

            const data = _gatherReportData();
            let previewText = `Bounty Base: ${data.btBase} pts. `;

            if (data.targetName) previewText += `[Alvo Morto: ${data.targetName}]. `;
            if (data.isSpecial) previewText += `[Kage x3]. `;
            if (data.isOrg) previewText += `[ORG Especial +100]. `;
            if (data.isTrashTalk) previewText += `[Trash Talk +20]. `;

            if (data.executorIds.length > 0) previewText += `PT Ataque: ${data.executorIds.join(', ')} (${data.pointsPerAttacker} pts cada). `;
            if (data.healerIds.length > 0) previewText += `Healers: ${data.healerIds.join(', ')} (${data.pointsPerHealer} pts cada). `;
            if (data.executorIds.length === 0 && data.healerIds.length === 0) previewText += `[Nenhum ANBU selecionado]. `;

            previewText += `=> TOTAL BT DA CAÇADA: ${data.totalPointsRaw} Pts.`;
            previewDiv.textContent = previewText.trim();
            window.calculateTotalPoints();
        }

        window.submitReport = async function() {
            if (!isWriterMode) return;

            const data = _gatherReportData();
            const statusElement = document.getElementById('status');

            if (!data || (data.executorIds.length === 0 && data.healerIds.length === 0) || data.totalPointsRaw === 0) {
                 window.openCustomModal('Erro', 'Preencha o valor do BT e adicione pelo menos um ANBU na PT.', 'info');
                 return;
            }

            statusElement.classList.remove('hidden');
            statusElement.className = 'text-yellow-400 p-4 bg-yellow-900/50 rounded-lg block';
            statusElement.textContent = `Registrando BT e atualizando Rank...`;

            const batch = writeBatch(db);

            try {
                const reportRef = doc(db, COLLECTIONS.REPORTS, data.reportId);
                batch.set(reportRef, data);

                for (const participantId of data.executorIds) {
                    const ninjaRef = doc(db, COLLECTIONS.NINJAS, participantId);
                    batch.set(ninjaRef, { 
                        rankPoints: (ninjasData[participantId]?.rankPoints || 0) + data.pointsPerAttacker,
                        missionsCompleted: (ninjasData[participantId]?.missionsCompleted || 0) + 1,
                    }, { merge: true });
                }

                for (const healerId of data.healerIds) {
                    const ninjaRef = doc(db, COLLECTIONS.NINJAS, healerId);
                    batch.set(ninjaRef, { 
                        rankPoints: (ninjasData[healerId]?.rankPoints || 0) + data.pointsPerHealer,
                        missionsCompleted: (ninjasData[healerId]?.missionsCompleted || 0) + 1,
                    }, { merge: true });
                }
                
                await batch.commit();

                statusElement.textContent = `✅ Sucesso! Registro finalizado.`;
                statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                
                selectedExecutors = [];
                selectedHealers = [];
                window.updateExecutorTags();
                window.generateReportId();
                if(document.getElementById('bt-points')) document.getElementById('bt-points').value = '';
                if(document.getElementById('chk-special')) document.getElementById('chk-special').checked = false;
                if(document.getElementById('chk-org')) document.getElementById('chk-org').checked = false;
                if(document.getElementById('chk-trashtalk')) document.getElementById('chk-trashtalk').checked = false;
                if(document.getElementById('target-name')) document.getElementById('target-name').value = '';
                window.updateDescriptionPreview(); 

            } catch (e) {
                statusElement.textContent = `❌ Erro no Registro: ${e.message}.`;
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
            }
            setTimeout(() => statusElement.classList.add('hidden'), 7000);
        }

        window.updateExecutorSelect = function() {
            const selectAtk = document.getElementById('new-executor-id-select');
            const selectHeal = document.getElementById('new-healer-id-select');
            if (!selectAtk || !selectHeal) return;
            
            const activeNinjas = Object.values(ninjasData).filter(n => n.isActive);
            activeNinjas.sort((a, b) => (a.id || '').localeCompare(b.id || ''));

            let optionsAtk = '<option value="" disabled selected>Selecione um Atacante</option>';
            let optionsHeal = '<option value="" disabled selected>Selecione um Healer</option>';

            activeNinjas.forEach(ninja => {
                if (!ninja.id) return; 
                
                const elementLabel = ninja.element ? ` (${ninja.element})` : '';
                
                if (!selectedExecutors.includes(ninja.id) && !selectedHealers.includes(ninja.id)) {
                    // Todos podem ser atacantes
                    optionsAtk += `<option value="${ninja.id}">${ninja.id}${elementLabel}</option>`;
                    
                    // Apenas quem tem a palavra 'Médico' no elemento pode ser selecionado como Healer
                    if (ninja.element && ninja.element.includes('Médico')) {
                        optionsHeal += `<option value="${ninja.id}">${ninja.id}${elementLabel}</option>`;
                    }
                }
            });

            selectAtk.innerHTML = optionsAtk;
            selectHeal.innerHTML = optionsHeal;
        }

        window.addExecutor = function(isHealer = false) {
            const selectId = isHealer ? 'new-healer-id-select' : 'new-executor-id-select';
            const select = document.getElementById(selectId);
            if (!select || !select.value) return;

            const ninjaId = select.value;
            if (isHealer) selectedHealers.push(ninjaId);
            else selectedExecutors.push(ninjaId);
            
            select.value = ''; 
            window.updateExecutorTags();
            window.updateExecutorSelect(); 
            window.updateDescriptionPreview(); 
        }
        
        window.removeExecutor = function(ninjaId, isHealer) {
            if (isHealer) selectedHealers = selectedHealers.filter(id => id !== ninjaId);
            else selectedExecutors = selectedExecutors.filter(id => id !== ninjaId);
            window.updateExecutorTags();
            window.updateExecutorSelect(); 
            window.updateDescriptionPreview(); 
        }

        window.updateExecutorTags = function() { 
            const containerAtk = document.getElementById('executors-tag-container');
            const containerHeal = document.getElementById('healers-tag-container');
            if (!containerAtk || !containerHeal) return;
            
            let htmlAtk = selectedExecutors.length === 0 ? '<span class="text-gray-400 text-sm italic">Nenhum Atacante selecionado.</span>' : '';
            selectedExecutors.forEach(id => {
                htmlAtk += `<span class="executor-tag">${id}<span class="executor-remove-btn" onclick="window.removeExecutor('${id}', false)">✖</span></span>`;
            });
            containerAtk.innerHTML = htmlAtk;

            let htmlHeal = selectedHealers.length === 0 ? '<span class="text-gray-400 text-sm italic">Nenhum Healer selecionado.</span>' : '';
            selectedHealers.forEach(id => {
                htmlHeal += `<span class="executor-tag healer-tag">${id}<span class="executor-remove-btn" onclick="window.removeExecutor('${id}', true)">✖</span></span>`;
            });
            containerHeal.innerHTML = htmlHeal;
        }

        window.addNinja = async function() {
            if (!isMasterAdminMode) return;

            const newNinjaIdInput = document.getElementById('new-ninja-id');
            const m1Select = document.getElementById('new-ninja-mastery-1');
            const m2Select = document.getElementById('new-ninja-mastery-2');
            
            const ninjaId = newNinjaIdInput.value.trim();
            const m1 = m1Select.value;
            const m2 = m2Select.value;
            
            const normalizedId = normalizeId(ninjaId);
            const statusElement = document.getElementById('status');

            if (!ninjaId) {
                statusElement.textContent = '❌ O ID do ANBU não pode ser vazio.';
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                statusElement.classList.remove('hidden');
                setTimeout(() => statusElement.classList.add('hidden'), 5000);
                return;
            }

            if (ninjasData[normalizedId]) {
                statusElement.textContent = `❌ O ANBU '${normalizedId}' já está cadastrado.`;
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                statusElement.classList.remove('hidden');
                setTimeout(() => statusElement.classList.add('hidden'), 5000);
                return;
            }

            let finalElement = m1;
            if (m2 && m2 !== m1) {
                finalElement += ` / ${m2}`;
            }

            try {
                await setDoc(doc(db, COLLECTIONS.NINJAS, normalizedId), {
                    id: normalizedId, 
                    element: finalElement, 
                    isActive: true, 
                    rankPoints: 0, 
                    missionsCompleted: 0
                });
                
                newNinjaIdInput.value = ''; 
                m2Select.value = ''; 
                
                statusElement.textContent = `✅ ANBU '${normalizedId}' (${finalElement}) cadastrado com sucesso!`;
                statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                statusElement.classList.remove('hidden');
                setTimeout(() => statusElement.classList.add('hidden'), 5000);

                window.updateExecutorSelect();
                window.logAction('ADD_GUARDIAN', { guardianId: normalizedId, element: finalElement });

            } catch (e) { console.error(e); }
        }
        
        window.deleteNinja = function(id) { 
            if (!isMasterAdminMode) return;
            window.openCustomModal('Confirmação de Exclusão', `Excluir permanentemente o ANBU '${id}'?`, 'confirm').then(async (confirmed) => {
                 if (confirmed) {
                     try {
                         await deleteDoc(doc(db, COLLECTIONS.NINJAS, id));
                         selectedExecutors = selectedExecutors.filter(execId => execId !== id);
                         selectedHealers = selectedHealers.filter(execId => execId !== id);
                         window.updateExecutorTags();
                         window.updateExecutorSelect(); 
                         window.logAction('DELETE_GUARDIAN', { guardianId: id });
                     } catch (e) { console.error(e); }
                 }
            });
        }
        
        window.editNinja = function(id) { 
            if (!isMasterAdminMode) return;
            const ninja = ninjasData[id];
            if (!ninja) return;

            window.openCustomModal('Alternar Status do ANBU', null, 'ninjaEdit', { id: ninja.id, isActive: ninja.isActive }).then(async (confirmed) => {
                 if (confirmed) {
                     try {
                         await updateDoc(doc(db, COLLECTIONS.NINJAS, id), { isActive: !ninja.isActive });
                         window.logAction('EDIT_GUARDIAN_STATUS', { guardianId: id });
                     } catch (e) { console.error(e); }
                 }
            });
        }
        
        window.copyReportId = function() { 
             const reportIdElement = document.getElementById('report-id-display');
             if (reportIdElement) {
                const tempInput = document.createElement('textarea');
                tempInput.value = reportIdElement.value;
                document.body.appendChild(tempInput);
                tempInput.select();
                try { document.execCommand('copy'); } catch (err) {}
                document.body.removeChild(tempInput);
            }
        }

        window.clearReportsLog = async function() {
            if (!isMasterAdminMode) return;
            const confirmed = await window.openCustomModal(
                'Confirmação de Exclusão', 'DELETAR TODO o Histórico de Registros e ZERAR os Ranks? Ação IRREVERSÍVEL.', 'confirm'
            );
            
            if (confirmed) {
                const statusElement = document.getElementById('status');
                statusElement.classList.remove('hidden');
                try {
                    const reportsSnapshot = await getDocs(collection(db, COLLECTIONS.REPORTS)); 
                    const ninjaSnapshot = await getDocs(collection(db, COLLECTIONS.NINJAS));
                    
                    let batch = writeBatch(db);
                    reportsSnapshot.forEach((doc) => batch.delete(doc.ref));
                    ninjaSnapshot.forEach((doc) => batch.update(doc.ref, { rankPoints: 0, missionsCompleted: 0 }));
                    
                    await batch.commit();

                    statusElement.textContent = `✅ Sucesso! Registros excluídos e Ranks resetados.`;
                    statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                    window.logAction('CLEAR_REPORTS_LOG_AND_RESET_RANKS', { });
                    
                } catch (e) {
                    statusElement.textContent = `❌ Erro: ${e.message}`;
                    statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                }
                setTimeout(() => statusElement.classList.add('hidden'), 5000);
            }
        }
        
        window.recalculateAllRanks = async function(calledInternally = false) {
            if (!isWriterMode) return;
            if (!calledInternally) {
                const confirmed = await window.openCustomModal(
                    'Confirmação de Recálculo', 'RECALCULAR todos os Ranks com base no histórico de BTs?', 'confirm'
                );
                if (!confirmed) return;
            }

            const statusElement = document.getElementById('status');
            if (!calledInternally) { 
                statusElement.classList.remove('hidden');
                statusElement.className = 'text-yellow-400 p-4 bg-yellow-900/50 rounded-lg block';
                statusElement.textContent = `Recalculando Ranks...`;
            }
            
            try {
                const tempNinjas = {}; 
                Object.values(ninjasData).forEach(ninja => {
                    tempNinjas[ninja.id] = { ...ninja, rankPoints: 0, missionsCompleted: 0 };
                });

                let resetBatch = writeBatch(db);
                Object.values(ninjasData).forEach(ninja => {
                    if (ninja.id) resetBatch.update(doc(db, COLLECTIONS.NINJAS, ninja.id), { rankPoints: 0, missionsCompleted: 0 });
                });
                await resetBatch.commit();
                
                let applyBatch = writeBatch(db);
                reportsData.forEach((report) => {
                    if (report.executorIds && report.executorIds.length > 0 && report.pointsPerAttacker > 0) {
                        report.executorIds.forEach(id => {
                             if (!tempNinjas[id]) tempNinjas[id] = { id: id, isActive: true, rankPoints: 0, missionsCompleted: 0 };
                             tempNinjas[id].rankPoints += report.pointsPerAttacker;
                             tempNinjas[id].missionsCompleted += 1;
                        });
                    }
                    if (report.healerIds && report.healerIds.length > 0 && report.pointsPerHealer > 0) {
                        report.healerIds.forEach(id => {
                             if (!tempNinjas[id]) tempNinjas[id] = { id: id, isActive: true, rankPoints: 0, missionsCompleted: 0 };
                             tempNinjas[id].rankPoints += report.pointsPerHealer;
                             tempNinjas[id].missionsCompleted += 1;
                        });
                    }
                }); 
                
                Object.values(tempNinjas).forEach(ninja => {
                    if(ninja.id) { 
                        applyBatch.update(doc(db, COLLECTIONS.NINJAS, ninja.id), { 
                            rankPoints: ninja.rankPoints, missionsCompleted: ninja.missionsCompleted
                        });
                    }
                });

                await applyBatch.commit();
                
                if (!calledInternally) {
                    statusElement.textContent = `✅ Sucesso! Recálculo concluído.`;
                    statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                    setTimeout(() => statusElement.classList.add('hidden'), 5000);
                }
            } catch (e) {
                statusElement.textContent = `❌ Erro no Recálculo: ${e.message}`;
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 7000);
            }
        }

        window.renderReportsLogFiltered = function(filterId = null, targetId = 'filtered-reports-log') {
            const reportsLog = document.getElementById(targetId);
            const guardianSummaryDiv = document.getElementById('guardian-summary');
            if (!reportsLog) return;
            
            reportsLog.innerHTML = '';
            let filteredReports = reportsData;

            if (filterId) {
                filteredReports = reportsData.filter(report => {
                    const isExecutor = Array.isArray(report.executorIds) && report.executorIds.includes(filterId);
                    const isHealer = Array.isArray(report.healerIds) && report.healerIds.includes(filterId);
                    return isExecutor || isHealer;
                });
            }
            
            if (filterId && guardianSummaryDiv) {
                const ninjaData = ninjasData[filterId];
                if (ninjaData) {
                    guardianSummaryDiv.innerHTML = `
                        <p class="text-xl font-bold text-yellow-400">${filterId.toUpperCase()}</p>
                        <p class="text-sm text-gray-300">${ninjaData.isActive ? 'ANBU Ativo' : 'ANBU Inativo'} ${ninjaData.element ? `(${ninjaData.element})` : ''}</p>
                        <p class="text-lg text-green-400">Total de Pontos: ${Math.round(ninjaData.rankPoints)} Pts</p>
                        <p class="text-gray-300">Total de BTs Participados: ${ninjaData.missionsCompleted}</p>
                    `;
                    guardianSummaryDiv.classList.remove('hidden');
                }
            } else if (guardianSummaryDiv) {
                guardianSummaryDiv.classList.add('hidden');
            }

            const sortedReports = filteredReports.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            if (sortedReports.length === 0) {
                 reportsLog.innerHTML = `<tr><td colspan="5" class="px-4 py-4 text-center italic text-gray-500">Nenhum registro encontrado${filterId ? ` para o ANBU "${filterId}"` : ''}.</td></tr>`;
                 return;
            }

            sortedReports.forEach(data => {
                const formattedDate = new Date(data.timestamp).toLocaleDateString('pt-BR', {
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                
                const atkText = data.executorIds && data.executorIds.length > 0 ? data.executorIds.join(', ') : '';
                const healText = data.healerIds && data.healerIds.length > 0 ? `<span class="text-green-400 text-xs">Healers: ${data.healerIds.join(', ')}</span>` : '';
                const targetText = data.targetName ? data.targetName : 'N/A';
                
                let finalDesc = `BT: ${data.totalPointsRaw}. ` + 
                                (data.isSpecial ? '[Kage x3]. ' : '') + 
                                (data.isOrg ? '[ORG +100]. ' : '') + 
                                (data.isTrashTalk ? '[Trash Talk]. ' : '') + 
                                `<br><span class="text-xs text-gray-500">PT: ${data.pointsPerAttacker} pts/cada | Healer: ${data.pointsPerHealer} pts</span>`;

                reportsLog.innerHTML += `
                    <tr class="hover:bg-gray-700/50">
                        <td class="px-4 py-2 whitespace-normal text-sm text-white w-3/12">
                            <span class="font-bold text-red-300">${atkText}</span><br>
                            ${healText}
                        </td>

                        <td class="px-4 py-2 whitespace-normal text-sm text-gray-400 w-5/12">${finalDesc}</td>
                        <td class="px-4 py-2 whitespace-nowrap text-sm w-2/12">

                        </td>
                    </tr>

        }

        async function initializeFirebase() {
            try {
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                await signInAnonymously(auth);
                
                document.getElementById('auth-info').textContent = `Conectado ao Banco Central ANBU`;
                setupFirestoreListeners(); 
                window.renderPage(currentPage);
                window.generateReportId(); 
            } catch (error) {
                document.getElementById('status').textContent = `❌ Erro ao conectar: ${error.message}`;
            }
        }
        
        function setupFirestoreListeners() {
            if (!db) return;

            onSnapshot(collection(db, COLLECTIONS.ACCESS_KEYS), (snapshot) => {
                accessKeysData = {};
                snapshot.forEach(doc => accessKeysData[doc.id] = doc.data());
                if (currentPage === 'admin_panel') window.renderPage(currentPage); 
            }, (error) => {});

            onSnapshot(collection(db, COLLECTIONS.NINJAS), (snapshot) => {
                ninjasData = {};
                snapshot.forEach(doc => ninjasData[doc.id] = doc.data());
                window.updateExecutorSelect && window.updateExecutorSelect();
                if (['scoreboard', 'ninja_panel'].includes(currentPage)) window.renderPage(currentPage);
                else if (currentPage === 'admin_panel') window.renderNinjasTable && window.renderNinjasTable();
            }, (error) => {});

            onSnapshot(collection(db, COLLECTIONS.REPORTS), (snapshot) => {
                reportsData = [];
                snapshot.forEach(doc => reportsData.push(doc.data()));
                if (['reports_log', 'ninja_panel'].includes(currentPage)) window.renderPage(currentPage);
            }, (error) => {});
        }

        window.checkAccessKey = async function() {
            const idInput = document.getElementById('access-id-input');
            const keyInput = document.getElementById('access-key-input');
            const statusElement = document.getElementById('status');
            if (!idInput || !keyInput) return;

            const id = idInput.value.trim();
            const key = keyInput.value.trim();
            if (!id || !key) return;
            
            const accessData = accessKeysData[id];

            if (accessData && accessData.key === key) {
                currentAccessId = id; 
                if (accessData.level === 'master_admin') {
                    window.toggleMasterAdminUI(true);
                    window.toggleWriterUI(true);
                } else if (accessData.level === 'report_writer') {
                    window.toggleWriterUI(true);
                    window.toggleMasterAdminUI(false);
                }
                keyInput.value = ''; idInput.value = '';
                statusElement.classList.remove('hidden');
                statusElement.textContent = `✅ Acesso LIBERADO. ID: ${id}.`;
                statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 3000);
                window.renderPage(currentPage);
            } else {
                currentAccessId = 'ANONYMOUS'; 
                window.toggleWriterUI(false);
                window.toggleMasterAdminUI(false);
                statusElement.classList.remove('hidden');
                statusElement.textContent = '❌ ID ou Senha Incorreta.';
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 5000);
            }
        }
        
        window.renderPage = function(pageName) {
            currentPage = pageName;
            const contentDiv = document.getElementById('content');
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            const activeLink = document.getElementById(`nav-${pageName}`);
            if (activeLink) activeLink.classList.add('active');

            contentDiv.innerHTML = '';

            switch (pageName) {
                case 'home': contentDiv.innerHTML = window.renderHome(); break;
                case 'scoreboard': contentDiv.innerHTML = window.renderRank(); window.renderScoreboard(); break;
                case 'reports_log': contentDiv.innerHTML = window.renderRelatorios(); window.renderReportsLog(); break;
                case 'ninja_panel': contentDiv.innerHTML = window.renderNinjaPanel(); window.renderReportsLogFiltered(); break;
                case 'report_form':
                    contentDiv.innerHTML = window.renderCriarRelatorio();
                    if (!isWriterMode) {
                        contentDiv.innerHTML += '<p class="text-center text-red-500 pt-8">Faça Login na aba Autorização para registrar BTs.</p>';

                    window.updateExecutorSelect(); window.updateExecutorTags(); window.generateReportId(); window.updateDescriptionPreview(); 
                    break;
                case 'admin_panel':
                    contentDiv.innerHTML = window.renderAutorizacao();
                    window.renderNinjasTable();
                    break;
                default: contentDiv.innerHTML = window.renderHome();
            }
            
            window.toggleMasterAdminUI(isMasterAdminMode);
            window.toggleWriterUI(isWriterMode);
        }
