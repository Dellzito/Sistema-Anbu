<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QG Forças Especiais da Leaf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        .remove-btn, .edit-btn, .admin-only, .writer-only { transition: all 0.1s ease-in-out; }
        .executor-list-container {
            min-height: 50px; padding: 8px; border: 1px solid #4b5563; 
            border-radius: 8px; background-color: #374151; 
            display: flex; flex-wrap: wrap; gap: 6px;
        }
        .executor-tag {
            display: flex; align-items: center; padding: 4px 8px;
            border-radius: 9999px; font-size: 0.875rem; font-weight: 600;
            color: #fff;
        }
        .killer-tag { background-color: #dc2626; } 
        .assist-tag { background-color: #d97706; } 
        .healer-tag { background-color: #059669; } 
        .executor-remove-btn { margin-left: 6px; cursor: pointer; opacity: 0.8; }
        .executor-remove-btn:hover { opacity: 1; }
        .nav-link { cursor: pointer; padding: 10px 15px; font-weight: 600; transition: all 0.2s; text-align: center; position: relative;}
        .nav-link:hover:not(.active) { background-color: #1e293b; }
        .nav-link.active { color: #f87171; border-bottom: 2px solid #f87171; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #374151; object-fit: cover; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="p-4 sm:p-8 text-gray-100">

    <div id="app" class="max-w-6xl mx-auto space-y-8">
        <header class="pb-4 border-b border-red-700/50">
            <h1 id="main-title" class="text-4xl font-bold text-red-500 text-center mb-4">🍁 Forças Especiais da Leaf<br><span class="text-2xl text-gray-400">ANBU & 12 Guardiões</span></h1>
            <nav class="flex flex-wrap justify-center bg-gray-900 rounded-xl shadow-lg p-1 gap-2">
                <a class="nav-link active" onclick="window.renderPage('home')" id="nav-home">QG</a>
                <a class="nav-link" onclick="window.renderPage('scoreboard')" id="nav-scoreboard">Rank Geral</a>
                <a class="nav-link" onclick="window.renderPage('reports_log')" id="nav-reports_log">Histórico de Missões</a>
                <a class="nav-link" onclick="window.renderPage('targets_log')" id="nav-targets_log">Alvos Eliminados</a>
                <a class="nav-link" onclick="window.renderPage('ninja_panel')" id="nav-ninja_panel">Perfil do Membro</a>
                <a class="nav-link writer-only hidden" onclick="window.renderPage('report_form')" id="nav-report_form">Registrar Manualmente</a>
                <a class="nav-link writer-only hidden text-yellow-400" onclick="window.renderPage('audit_panel')" id="nav-audit_panel">Auditoria (Bot) <span id="audit-badge" class="absolute -top-2 -right-2 bg-red-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center hidden">0</span></a>
                <a class="nav-link" onclick="window.renderPage('admin_panel')" id="nav-admin_panel">Acesso Restrito</a>
            </nav>
        </header>
        
        <div id="content" class="min-h-[60vh]"></div>

        <div id="status" class="text-center p-4 rounded-lg hidden"></div>
        <div id="auth-info" class="text-sm text-center text-yellow-500">Conectando aos servidores seguros...</div>
        
        <datalist id="known-targets"></datalist>
    </div>

    <div id="custom-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 hidden items-center justify-center p-4 z-50">
        <div id="modal-content" class="bg-gray-800 rounded-xl shadow-2xl p-6 w-full max-w-lg space-y-4 transform scale-95 transition-all">
            <h3 id="modal-title" class="text-xl font-bold text-red-400">Título</h3>
            <p id="modal-message" class="text-gray-300">Mensagem</p>
            <div id="modal-input-container" class="space-y-3 hidden">
                <label id="input-label-1" class="block text-sm font-medium text-gray-300 hidden">Input 1</label>
                <input type="text" id="modal-input-1" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white hidden" />
                <select id="modal-select-1" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white hidden"></select>

                <label id="input-label-2" class="block text-sm font-medium text-gray-300 hidden">Input 2</label>
                <select id="modal-select-2" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white hidden"></select>
                <span id="modal-error" class="text-red-400 text-sm hidden"></span>
            </div>
            <div id="modal-actions" class="flex justify-end gap-3 pt-2">
                <button id="modal-cancel-btn" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white font-semibold rounded-lg transition duration-150">Cancelar</button>
                <button id="modal-confirm-btn" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition duration-150">Confirmar</button>
            </div>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
