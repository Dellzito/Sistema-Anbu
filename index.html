<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Registro - Esquadrão ANBU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        .executor-list-container {
            min-height: 50px; padding: 8px; border: 1px solid #4b5563; 
            border-radius: 8px; background-color: #374151; 
            display: flex; flex-wrap: wrap; gap: 6px;
        }
        .executor-tag {
            display: flex; align-items: center; padding: 4px 8px;
            border-radius: 9999px; font-size: 0.875rem; font-weight: 600; color: #fff;
        }
        .killer-tag { background-color: #dc2626; }
        .assist-tag { background-color: #d97706; }
        .healer-tag { background-color: #059669; }
        .executor-remove-btn { margin-left: 6px; cursor: pointer; opacity: 0.8; }
        .nav-link { cursor: pointer; padding: 10px 15px; font-weight: 600; transition: all 0.2s; text-align: center; }
        .nav-link:hover:not(.active) { background-color: #1e293b; }
        .nav-link.active { color: #f87171; border-bottom: 2px solid #f87171; }

        /* Status Online */
        .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 8px #22c55e; }
        #online-list-container { display: flex; gap: 8px; overflow-x: auto; padding: 8px; }

        /* Pânico */
        .panic-active-btn { animation: pulse-red 1s infinite; background: #ef4444 !important; color: white !important; }
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="p-4 sm:p-8 text-gray-100">

    <div id="app" class="max-w-6xl mx-auto space-y-8">
        <header class="pb-4 border-b border-red-700/50 relative">
            <div class="absolute right-0 top-0 flex items-center gap-2">
                <button onclick="window.openFloatingWindow()" class="p-2 bg-gray-800 rounded-lg border border-gray-600 text-blue-400 hover:text-white transition" title="Overlay">🔲</button>
                <button id="panic-audio-toggle" onclick="window.togglePanicAudio()" class="p-2 bg-gray-800 rounded-lg border border-gray-600 text-gray-400 hover:text-white transition">
                    <span id="panic-audio-icon">🔇</span>
                </button>
                <button id="panic-btn" onclick="window.triggerPanic()" class="hidden writer-only bg-red-900/30 border border-red-600 text-red-500 px-4 py-2 rounded-lg font-bold hover:bg-red-600 hover:text-white transition">🚨 PÂNICO</button>
            </div>

            <h1 class="text-4xl font-bold text-red-500 text-center mb-4">📜 Central de Inteligência — Esquadrão ANBU</h1>
            
            <nav class="flex flex-wrap justify-center bg-gray-900 rounded-xl shadow-lg p-1 gap-2">
                <a class="nav-link" onclick="window.renderPage('home')" id="nav-home">Home</a>
                <a class="nav-link" onclick="window.renderPage('scoreboard')" id="nav-scoreboard">Rank</a>
                <a class="nav-link" onclick="window.renderPage('reports_log')" id="nav-reports_log">Histórico de BTs</a>
                <a class="nav-link" onclick="window.renderPage('targets_log')" id="nav-targets_log">Alvos</a>
                <a class="nav-link" onclick="window.renderPage('ninja_panel')" id="nav-ninja_panel">Perfil</a>
                <a class="nav-link" onclick="window.renderPage('report_form')" id="nav-report_form">Registrar BT</a>
                <a class="nav-link" onclick="window.renderPage('admin_panel')" id="nav-admin_panel">Autorização</a>
            </nav>

            <div class="mt-4 bg-gray-900/50 rounded-lg border border-gray-800 p-2">
                <p class="text-[10px] text-gray-500 uppercase font-bold mb-1 ml-2">Ninjas em Patrulha (Online):</p>
                <div id="online-list-container">
                    <span class="text-gray-600 italic text-xs">Nenhum ninja logado...</span>
                </div>
            </div>
        </header>

        <div id="panic-banner" class="hidden bg-red-600 text-white p-6 rounded-xl text-center font-bold text-2xl animate-bounce shadow-2xl border-4 border-white">
            ⚠️ <span id="panic-msg">SINAL DE APOIO DETECTADO!</span> ⚠️
        </div>

        <div id="content" class="min-h-[60vh]"></div>
        <div id="status" class="text-center p-4 rounded-lg hidden"></div>
        <div id="auth-info" class="text-sm text-center text-yellow-500">Conectando ao Firebase...</div>
        <datalist id="known-targets"></datalist>
    </div>

    <div id="custom-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 hidden items-center justify-center p-4 z-50">
        <div id="modal-content" class="bg-gray-800 rounded-xl shadow-2xl p-6 w-full max-w-lg space-y-4">
            <h3 id="modal-title" class="text-xl font-bold text-red-400">Título</h3>
            <p id="modal-message" class="text-gray-300">Mensagem</p>
            <div id="modal-input-container" class="space-y-3 hidden">
                <label id="input-label-1" class="block text-sm font-medium text-gray-300 hidden"></label>
                <input type="text" id="modal-input-1" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white hidden" />
                <select id="modal-select-1" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white hidden"></select>
                <label id="input-label-2" class="block text-sm font-medium text-gray-300 hidden"></label>
                <select id="modal-select-2" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white hidden"></select>
                <span id="modal-error" class="text-red-400 text-sm hidden"></span>
            </div>
            <div class="flex justify-end gap-3 pt-2">
                <button id="modal-cancel-btn" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white font-semibold rounded-lg">Cancelar</button>
                <button id="modal-confirm-btn" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg">Confirmar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, doc, setDoc, onSnapshot, collection, writeBatch, 
            updateDoc, deleteDoc, getDocs, addDoc 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const FB_CONFIG = {
            apiKey: "AIzaSyC-QaPr7O6RkWR3vpXCg4zrnUWw3TzU9ss",
            authDomain: "g-2cb53.firebaseapp.com",
            projectId: "g-2cb53",
            storageBucket: "g-2cb53.firebasestorage.app",
            messagingSenderId: "292095146978",
            appId: "1:292095146978:web:836d833230907d081017bb"
        };
        
        let app, db, auth;
        let isMasterAdminMode = false, isWriterMode = false, currentPage = 'home', currentAccessId = 'ANONYMOUS';
        let ninjasData = {}, reportsData = [], accessKeysData = {};
        let selectedKillers = [], selectedAssists = [], selectedHealers = [];
        let targetEntryCount = 0; window.isEditingMode = false;
        let currentReportId = '';

        const COLS = {
            REPORTS: `artifacts/g-2cb53/public/data/reports`,
            NINJAS: `artifacts/g-2cb53/public/data/ninjas`, 
            ACCESS: `artifacts/g-2cb53/public/data/access_keys`,
            PANIC: `artifacts/g-2cb53/public/data/panic_system`,
            PRESENCE: `artifacts/g-2cb53/public/status/presence`,
            LOGS: `artifacts/g-2cb53/users/audit_user_log/audit_events` 
        };

        const MAESTRIAS = ["Fogo", "Água", "Vento", "Terra", "Raio", "Med (Chakra)", "Med (Int)", "WM", "TAI"];

        // --- SISTEMA DE PÂNICO E JANELA ---
        let panicAudio = false;
        const siren = new Audio('https://orangefree.sounds.com/alerts/emergency_siren.mp3');
        siren.loop = true;

        window.togglePanicAudio = () => {
            panicAudio = !panicAudio;
            document.getElementById('panic-audio-icon').textContent = panicAudio ? '🔊' : '🔇';
            document.getElementById('panic-audio-toggle').classList.toggle('border-green-500', panicAudio);
            if(panicAudio) { siren.play().then(() => { siren.pause(); siren.currentTime = 0; }); }
        };

        window.triggerPanic = async () => {
            if (currentAccessId === 'ANONYMOUS') return;
            const ref = doc(db, COLS.PANIC, "status");
            await setDoc(ref, { active: true, by: currentAccessId, time: Date.now() });
            setTimeout(() => updateDoc(ref, { active: false }), 15000);
            window.logAction('PANIC_BTN', { by: currentAccessId });
        };

        window.openFloatingWindow = () => window.open(window.location.href, 'ANBU_POP', 'width=450,height=650');

        async function updatePresence(isOnline) {
            if (currentAccessId === 'ANONYMOUS') return;
            await setDoc(doc(db, COLS.PRESENCE, currentAccessId), { id: currentAccessId, lastSeen: Date.now(), online: isOnline }, { merge: true });
        }

        // --- LÓGICA DE REGISTRO DE BTs (SUA LÓGICA ORIGINAL RECONSTRUÍDA) ---
        window.addTargetEntry = () => {
            const container = document.getElementById('targets-container');
            if (!container) return;
            targetEntryCount++;
            const targetId = `target-${targetEntryCount}`;
            const html = `
                <div id="${targetId}" class="target-entry bg-gray-700 p-4 rounded-lg border border-gray-600 relative mb-4">
                    <button type="button" onclick="window.removeTargetEntry('${targetId}')" class="absolute top-2 right-2 text-red-400 font-bold">✖</button>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" list="known-targets" placeholder="Nick do Alvo" class="target-name p-2 rounded bg-gray-800 text-white" oninput="window.updateDescriptionPreview()">
                        <input type="number" placeholder="BT Base" class="target-bt p-2 rounded bg-gray-800 text-white font-bold" oninput="window.updateDescriptionPreview()">
                    </div>
                    <div class="flex gap-4 mt-2 text-xs">
                        <label><input type="checkbox" class="target-chk-special" onchange="window.updateDescriptionPreview()"> Kage (x3)</label>
                        <label><input type="checkbox" class="target-chk-org" onchange="window.updateDescriptionPreview()"> ORG (+100)</label>
                        <label><input type="checkbox" class="target-chk-trashtalk" onchange="window.updateDescriptionPreview()"> Trash (+20)</label>
                    </div>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
        };

        window.removeTargetEntry = (id) => { document.getElementById(id)?.remove(); window.updateDescriptionPreview(); };

        window.updateDescriptionPreview = () => {
            const entries = document.querySelectorAll('.target-entry');
            let total = 0, targetsList = [];
            entries.forEach(e => {
                let base = parseInt(e.querySelector('.target-bt').value || 0);
                if(e.querySelector('.target-chk-special').checked) base *= 3;
                if(e.querySelector('.target-chk-org').checked) base += 100;
                if(e.querySelector('.target-chk-trashtalk').checked) base += 20;
                total += base;
                targetsList.push(`${e.querySelector('.target-name').value || 'Alvo'} (${base} pts)`);
            });

            const pKiller = total;
            const pAssist = selectedAssists.length > 0 ? Math.floor(total/3) : 0;
            const pHealer = total;

            document.getElementById('description-preview').innerHTML = `Alvos: ${targetsList.join(', ')} <br> <b>Total: ${total} Pts</b> (Killer/Healer: ${total} | Assist: ${pAssist})`;
            document.getElementById('total-points').value = `Total Caçada: ${total} Pts`;
            const submitBtn = document.getElementById('submit-report');
            if(submitBtn) submitBtn.disabled = (total === 0 || !isWriterMode);
        };

        window.submitReport = async () => {
            const entries = document.querySelectorAll('.target-entry');
            let totalRaw = 0, targetsData = [];
            entries.forEach(e => {
                let base = parseInt(e.querySelector('.target-bt').value || 0);
                let final = base;
                if(e.querySelector('.target-chk-special').checked) final *= 3;
                if(e.querySelector('.target-chk-org').checked) final += 100;
                if(e.querySelector('.target-chk-trashtalk').checked) final += 20;
                totalRaw += final;
                targetsData.push({ name: e.querySelector('.target-name').value, btBase: base, total: final });
            });

            const data = {
                reportId: currentReportId || `BT-${Date.now()}`,
                targets: targetsData,
                killerIds: selectedKillers,
                assistIds: selectedAssists,
                healerIds: selectedHealers,
                totalPointsRaw: totalRaw,
                pointsPerKiller: totalRaw,
                pointsPerAssist: selectedAssists.length > 0 ? Math.floor(totalRaw/3) : 0,
                pointsPerHealer: totalRaw,
                timestamp: new Date().toISOString()
            };

            const batch = writeBatch(db);
            batch.set(doc(db, COLS.REPORTS, data.reportId), data);
            
            // Atualizar Ranks individuais
            [...selectedKillers, ...selectedHealers].forEach(id => {
                const n = ninjasData[id];
                batch.update(doc(db, COLS.NINJAS, id), { rankPoints: (n.rankPoints || 0) + totalRaw, missionsCompleted: (n.missionsCompleted || 0) + 1 });
            });
            selectedAssists.forEach(id => {
                const n = ninjasData[id];
                batch.update(doc(db, COLS.NINJAS, id), { rankPoints: (n.rankPoints || 0) + data.pointsPerAssist, missionsCompleted: (n.missionsCompleted || 0) + 1 });
            });

            await batch.commit();
            alert("BT Registrado com Sucesso!");
            window.renderPage('reports_log');
        };

        // --- GESTÃO DE UI E NAVEGAÇÃO ---
        window.renderPage = (name) => {
            currentPage = name;
            const content = document.getElementById('content');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`nav-${name}`)?.classList.add('active');
            content.innerHTML = '';

            switch(name) {
                case 'home': content.innerHTML = `<div class="bg-gray-800 p-20 rounded-xl text-center shadow-2xl border border-red-900/20"><h2 class="text-3xl font-bold text-red-500">Bem-vindo, ANBU ${currentAccessId}</h2><p class="text-gray-400 mt-4 italic">"Nas sombras, protegemos a vila."</p></div>`; break;
                case 'admin_panel': content.innerHTML = window.renderAutorizacao(); break;
                case 'report_form': content.innerHTML = window.renderCriarRelatorio(); if(isWriterMode) { window.generateReportId(); window.addTargetEntry(); window.updateExecutorSelect(); } break;
                case 'scoreboard': content.innerHTML = window.renderRank(); window.renderScoreboard(); break;
                case 'reports_log': content.innerHTML = window.renderRelatorios(); window.renderReportsLog(); break;
                case 'targets_log': content.innerHTML = `<div>Alvos eliminados...</div>`; break; // Implementar similar ao scoreboard
            }
            window.toggleWriterUI(isWriterMode);
        };

        window.renderAutorizacao = () => `
            <div class="max-w-md mx-auto bg-gray-900 p-8 rounded-2xl border border-red-500/30">
                <h2 class="text-2xl font-bold text-red-500 text-center mb-6">Sincronizar Acesso</h2>
                <div class="space-y-4">
                    <input id="access-id-input" type="text" placeholder="ID ANBU" class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700">
                    <input id="access-key-input" type="password" placeholder="Chave de Acesso" class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700">
                    <button onclick="window.checkAccessKey()" class="w-full bg-red-600 hover:bg-red-700 py-3 rounded-lg font-bold transition shadow-lg">Entrar no Sistema</button>
                </div>
            </div>`;

        window.renderCriarRelatorio = () => `
            <section class="bg-gray-800 p-6 rounded-xl space-y-6">
                <h2 class="text-2xl font-bold text-red-400 border-b border-gray-700 pb-2">Novo Registro de Caçada</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="text-xs font-bold text-red-500">KILLER</label>
                        <select id="new-killer-id-select" class="w-full p-2 rounded bg-gray-700" onchange="window.addExecutor('killer')"></select>
                        <div id="killers-tag-container" class="executor-list-container mt-2"></div>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-orange-500">ASSISTÊNCIA</label>
                        <select id="new-assist-id-select" class="w-full p-2 rounded bg-gray-700" onchange="window.addExecutor('assist')"></select>
                        <div id="assists-tag-container" class="executor-list-container mt-2"></div>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-green-500">HEALER</label>
                        <select id="new-healer-id-select" class="w-full p-2 rounded bg-gray-700" onchange="window.addExecutor('healer')"></select>
                        <div id="healers-tag-container" class="executor-list-container mt-2"></div>
                    </div>
                </div>
                <div id="targets-container" class="pt-4 border-t border-gray-700"></div>
                <div class="bg-gray-900 p-4 rounded-lg">
                    <label class="text-xs text-gray-500">RESUMO MATEMÁTICO:</label>
                    <div id="description-preview" class="text-sm italic text-gray-300">Aguardando dados...</div>
                    <input id="total-points" readonly class="bg-transparent text-green-400 font-bold mt-2">
                </div>
                <button id="submit-report" onclick="window.submitReport()" class="w-full bg-red-600 py-4 rounded-xl font-bold disabled:opacity-50">SALVAR REGISTRO</button>
            </section>`;

        // Funções auxiliares de UI (Selects, Tags, Rank)
        window.updateExecutorSelect = () => {
            const active = Object.values(ninjasData).filter(n => n.isActive);
            ['killer', 'assist', 'healer'].forEach(type => {
                const select = document.getElementById(`new-${type}-id-select`);
                if(select) select.innerHTML = `<option value="">Selecionar...</option>` + active.map(n => `<option value="${n.id}">${n.id}</option>`).join('');
            });
        };

        window.addExecutor = (type) => {
            const id = document.getElementById(`new-${type}-id-select`).value;
            if(!id) return;
            if(type === 'killer') selectedKillers = [id]; // Killer é único por registro geralmente
            if(type === 'assist') if(!selectedAssists.includes(id)) selectedAssists.push(id);
            if(type === 'healer') if(!selectedHealers.includes(id)) selectedHealers.push(id);
            window.updateExecutorTags();
            window.updateDescriptionPreview();
        };

        window.updateExecutorTags = () => {
            document.getElementById('killers-tag-container').innerHTML = selectedKillers.map(id => `<span class="executor-tag killer-tag">${id}</span>`).join('');
            document.getElementById('assists-tag-container').innerHTML = selectedAssists.map(id => `<span class="executor-tag assist-tag">${id}</span>`).join('');
            document.getElementById('healers-tag-container').innerHTML = selectedHealers.map(id => `<span class="executor-tag healer-tag">${id}</span>`).join('');
        };

        window.renderScoreboard = () => {
            const table = document.getElementById('ninjas-scoreboard');
            const sorted = Object.values(ninjasData).sort((a,b) => b.rankPoints - a.rankPoints);
            table.innerHTML = sorted.map((n, i) => `
                <tr class="border-b border-gray-700">
                    <td class="p-2">#${i+1}</td>
                    <td class="p-2 text-red-400 font-bold">${n.id}</td>
                    <td class="p-2 text-green-400">${Math.round(n.rankPoints)} Pts</td>
                    <td class="p-2">${n.missionsCompleted || 0}</td>
                </tr>`).join('');
        };

        // --- FIREBASE LISTENERS ---
        function initGlobalListeners() {
            onSnapshot(collection(db, COLS.ACCESS), (s) => s.forEach(d => accessKeysData[d.id] = d.data()));
            onSnapshot(collection(db, COLS.NINJAS), (s) => { s.forEach(d => ninjasData[d.id] = d.data()); if(currentPage==='scoreboard') window.renderScoreboard(); });
            onSnapshot(collection(db, COLS.REPORTS), (s) => { reportsData = []; s.forEach(d => reportsData.push(d.data())); });
            
            // Ouvinte Online
            onSnapshot(collection(db, COLS.PRESENCE), (snap) => {
                const container = document.getElementById('online-list-container');
                container.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.online && (Date.now() - d.lastSeen < 300000)) {
                        container.innerHTML += `<div class="bg-gray-800 px-3 py-1 rounded-full text-[11px] font-bold border border-gray-700"><span class="online-dot"></span>${d.id.toUpperCase()}</div>`;
                    }
                });
            });

            // Ouvinte Pânico
            onSnapshot(doc(db, COLS.PANIC, "status"), (snap) => {
                const d = snap.data();
                const banner = document.getElementById('panic-banner');
                if(d?.active) {
                    banner.classList.remove('hidden');
                    document.getElementById('panic-msg').innerHTML = `🚨 ALERTA: ${d.by.toUpperCase()} PRECISA DE AJUDA! 🚨`;
                    document.getElementById('panic-btn').classList.add('panic-active-btn');
                    if(panicAudio) siren.play();
                } else {
                    banner.classList.add('hidden');
                    document.getElementById('panic-btn').classList.remove('panic-active-btn');
                    siren.pause(); siren.currentTime = 0;
                }
            });
        }

        window.checkAccessKey = async () => {
            const id = document.getElementById('access-id-input').value.trim().toLowerCase();
            const key = document.getElementById('access-key-input').value.trim();
            const data = accessKeysData[id];
            if (data && data.key === key) {
                currentAccessId = id; isWriterMode = true;
                isMasterAdminMode = (data.level === 'master_admin');
                await updatePresence(true);
                window.renderPage('home');
                setInterval(() => updatePresence(true), 60000);
            } else { alert("Acesso negado."); }
        };

        window.toggleWriterUI = (show) => document.querySelectorAll('.writer-only').forEach(el => show ? el.classList.remove('hidden') : el.classList.add('hidden'));
        window.generateReportId = () => currentReportId = `BT-${Date.now()}`;

        window.onload = async () => {
            app = initializeApp(FB_CONFIG);
            db = getFirestore(app);
            auth = getAuth(app);
            await signInAnonymously(auth);
            initGlobalListeners();
            window.renderPage('home');
        };
        
        window.renderRank = () => `<table class="w-full text-left"><thead><tr class="text-gray-500"><th>Rank</th><th>Ninja</th><th>Pontos</th><th>Missões</th></tr></thead><tbody id="ninjas-scoreboard"></tbody></table>`;
        window.renderRelatorios = () => `<div id="reports-log-container">Histórico de BTs...</div>`;
    </script>
</body>
</html>
