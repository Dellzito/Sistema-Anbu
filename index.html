<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Registro - Esquadrão ANBU (ONLINE - FIREBASE)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        .remove-btn, .edit-btn, .admin-only, .writer-only { transition: all 0.1s ease-in-out; }
        /* Estilo para a lista de executores */
        .executor-list-container {
            min-height: 50px;
            padding: 8px;
            border: 1px solid #4b5563; /* gray-600 */
            border-radius: 8px;
            background-color: #374151; /* gray-700 */
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .executor-tag {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 9999px; /* full rounded */
            font-size: 0.875rem; /* text-sm */
            font-weight: 600;
            background-color: #ef4444; /* red-500 */
            color: #fff;
        }
        .executor-remove-btn {
            margin-left: 6px;
            cursor: pointer;
            color: #fecaca; /* red-200 */
        }
        /* Estilo para a Navegação */
        .nav-link {
            cursor: pointer;
            padding: 10px 15px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .nav-link:hover:not(.active) {
            background-color: #1e293b; /* slate-800 */
        }
        .nav-link.active {
            color: #f87171; /* red-400 */
            border-bottom: 2px solid #f87171;
        }
    </style>
</head>
<body class="p-4 sm:p-8 text-gray-100">

    <div id="app" class="max-w-6xl mx-auto space-y-8">
        
        <header class="pb-4 border-b border-red-700/50">
            <h1 id="main-title" class="text-4xl font-bold text-red-500 text-center mb-4">📜 Sistema de Registro — Esquadrão ANBU</h1>
            <nav class="flex justify-center bg-gray-900 rounded-xl shadow-lg p-1">
                <a class="nav-link" onclick="window.renderPage('home')" id="nav-home">Home</a>
                <a class="nav-link" onclick="window.renderPage('scoreboard')" id="nav-scoreboard">Ver Rank</a>
                <a class="nav-link" onclick="window.renderPage('reports_log')" id="nav-reports_log">Histórico</a>
                <a class="nav-link" onclick="window.renderPage('auxiliary_log')" id="nav-auxiliary_log">Auxílio</a>
                <a class="nav-link" onclick="window.renderPage('ninja_panel')" id="nav-ninja_panel">Painel de ANBUs</a>
                <a class="nav-link" onclick="window.renderPage('report_form')" id="nav-report_form">Criar Relatório</a>
                <a class="nav-link" onclick="window.renderPage('admin_panel')" id="nav-admin_panel">Autorização</a>
            </nav>
        </header>
        
        <div id="content" class="min-h-[60vh]">
            </div>

        <div id="status" class="text-center p-4 rounded-lg hidden"></div>
        
        <div id="auth-info" class="text-sm text-center text-yellow-500">Conectando ao Firebase...</div>
    </div>

    <div id="custom-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 hidden items-center justify-center p-4 z-50">
        <div id="modal-content" class="bg-gray-800 rounded-xl shadow-2xl p-6 w-full max-w-lg space-y-4 transform scale-95 transition-all">
            <h3 id="modal-title" class="text-xl font-bold text-red-400">Título do Modal</h3>
            <p id="modal-message" class="text-gray-300">Mensagem do Modal.</p>
            <div id="modal-input-container" class="space-y-3 hidden">
                <label id="input-label-1" for="modal-input-1" class="block text-sm font-medium text-gray-300">Input 1</label>
                <input type="text" id="modal-input-1" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white" />
                <label id="input-label-2" for="modal-input-2" class="block text-sm font-medium text-gray-300">Input 2 (Rank)</label>
                <select id="modal-input-2" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white">
                    </select>
                <span id="modal-error" class="text-red-400 text-sm hidden"></span>
            </div>
            <div id="modal-actions" class="flex justify-end gap-3 pt-2">
                <button id="modal-cancel-btn" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white font-semibold rounded-lg transition duration-150">Cancelar</button>
                <button id="modal-confirm-btn" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition duration-150">Confirmar</button>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, doc, setDoc, onSnapshot, collection, writeBatch, 
            updateDoc, getDoc, deleteDoc, getDocs, setLogLevel, addDoc 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ====================================================================
        // CONFIGURAÇÕES FIREBASE & CHAVE MESTRA
        // ====================================================================
        
        const CUSTOM_FIREBASE_CONFIG = {
            apiKey: "AIzaSyC-QaPr7O6RkWR3vpXCg4zrnUWw3TzU9ss",
            authDomain: "g-2cb53.firebaseapp.com",
            projectId: "g-2cb53",
            storageBucket: "g-2cb53.firebasestorage.app",
            messagingSenderId: "292095146978",
            appId: "1:292095146978:web:836d833230907d081017bb",
            measurementId: "G-B2EXQ2Z75D"
        };
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : CUSTOM_FIREBASE_CONFIG.projectId || 'g-2cb53';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : CUSTOM_FIREBASE_CONFIG;
        
        const MASTER_ADMIN_ID = 'master_admin_key'; 
        const WRITER_MODE_ID = 'writer_mode_key'; 

        let isMasterAdminMode = false; 
        let isWriterMode = false; 
        let currentPage = 'home';
        let currentAccessId = 'ANONYMOUS'; 
        
        let app;
        let db;
        let auth;
        let userId = null;
        let currentReportId = ''; 
        let selectedExecutors = []; 
        
        let missionsData = {}; 
        let ninjasData = {}; 
        let auxiliaryData = {}; 
        let reportsData = []; 
        let accessKeysData = {}; 
        
        const COLLECTIONS = {
            MISSIONS: `artifacts/${appId}/public/data/missions`,
            REPORTS: `artifacts/${appId}/public/data/reports`,
            NINJAS: `artifacts/${appId}/public/data/ninjas`, 
            AUXILIARY_LOG: `artifacts/${appId}/public/data/auxiliary_log`,
            ACCESS_KEYS: `artifacts/${appId}/public/data/access_keys`, 
            AUDIT_LOG: `artifacts/${appId}/users/audit_user_log/audit_events` 
        };

        const RANK_POINTS = {
            'SRANK': 5, 'ARANK': 4, 'BRANK': 3, 'CRANK': 2, 'DRANK': 1,
            'DEFESARAID': 10, 'NPCQUEST': 0, 'STORYLINE': 0, 'ANYLEVEL': 0
        };
        const RANK_OPTIONS = [
            "S-Rank", "A-Rank", "B-Rank", "C-Rank", "D-Rank", 
            "Defesa/Raid", "NPC Quest", "Storyline"
        ];
        const RANK_ORDER = ['S', 'A', 'B', 'C', 'D', 'DEFESA', 'BT'];

        setLogLevel('debug'); 

        // ====================================================================
        // FUNÇÕES DE LOG E UTILIDADE
        // ====================================================================
        
        window.logAction = async function(action, details) {
            if (!db) return;
            try {
                const logData = {
                    timestamp: new Date().toISOString(),
                    actorAccessId: currentAccessId,
                    actorUserId: auth.currentUser?.uid || 'anon',
                    action: action,
                    details: details,
                    level: isMasterAdminMode ? 'MASTER_ADMIN' : (isWriterMode ? 'WRITER' : 'ANON')
                };
                await addDoc(collection(db, COLLECTIONS.AUDIT_LOG), logData);
                console.log(`[AUDIT] Log registrado: ${action} por ${currentAccessId}`);
            } catch (e) {
                console.error("[AUDIT] Falha ao registrar log:", e);
            }
        }
        
        function getRankIcon(rank) {
            if (rank === 1) return '🥇';
            if (rank === 2) return '🥈';
            if (rank === 3) return '🥉';
            return `#${rank}`;
        }
        function getRankColor(rank) {
            if (!rank) return 'text-gray-400';
            if (rank.includes('S')) return 'text-red-500';
            if (rank.includes('A')) return 'text-orange-500';
            if (rank.includes('B')) return 'text-yellow-500';
            if (rank.includes('C')) return 'text-green-500';
            if (rank.includes('D')) return 'text-blue-500';
            if (rank.includes('BT')) return 'text-red-400';
            return 'text-gray-400';
        }
        function cleanRankForLookup(rank) {
            return rank.toUpperCase().replace('-', '').replace('/', '');
        }
        function normalizeId(id) {
            return id.trim().toLowerCase();
        }
        
        // --- FUNÇÕES DO MODAL ---
        let resolveModalPromise = null; 

        window.openCustomModal = function(title, message, type, data = {}) {
            return new Promise(resolve => {
                resolveModalPromise = resolve;

                const modal = document.getElementById('custom-modal');
                const modalTitle = document.getElementById('modal-title');
                const modalMessage = document.getElementById('modal-message');
                const inputContainer = document.getElementById('modal-input-container');
                const input1 = document.getElementById('modal-input-1');
                const selectRank = document.getElementById('modal-input-2');
                const label1 = document.getElementById('input-label-1');
                const label2 = document.getElementById('input-label-2');
                const confirmBtn = document.getElementById('modal-confirm-btn');
                const cancelBtn = document.getElementById('modal-cancel-btn');
                const errorSpan = document.getElementById('modal-error');
                
                modalTitle.textContent = title;
                modalMessage.textContent = message;
                errorSpan.classList.add('hidden');
                inputContainer.classList.add('hidden');
                input1.value = '';
                selectRank.innerHTML = ''; 
                input1.type = 'text'; 
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
                confirmBtn.classList.remove('hidden'); 
                
                confirmBtn.classList.remove('bg-red-600', 'hover:bg-red-700');
                confirmBtn.classList.remove('bg-orange-600', 'hover:bg-orange-700');
                confirmBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');

                if (type === 'confirm') {
                    confirmBtn.textContent = 'Confirmar';
                    confirmBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                    confirmBtn.classList.add('bg-red-600', 'hover:bg-red-700');
                } else if (type === 'input') {
                    inputContainer.classList.remove('hidden');
                    label1.textContent = 'Novo Nome da Missão:';
                    input1.value = data.name || ''; 
                    label2.textContent = 'Novo Rank:';
                    
                    RANK_OPTIONS.forEach(rank => {
                        const option = document.createElement('option');
                        option.value = rank;
                        option.textContent = rank;
                        if (rank === data.rank) option.selected = true;
                        selectRank.appendChild(option);
                    });

                    confirmBtn.textContent = 'Salvar Alterações';

                    confirmBtn.onclick = () => {
                        const newName = input1.value.trim();
                        const newRank = selectRank.value;
                        if (!newName || !newRank) {
                            errorSpan.textContent = 'Nome e Rank não podem ser vazios.';
                            errorSpan.classList.remove('hidden');
                            return;
                        }
                        closeCustomModal({ name: newName, rank: newRank });
                    };
                } else if (type === 'ninjaEdit') {
                    const statusText = data.isActive ? 'Ativo' : 'Inativo';
                    const newStatusText = data.isActive ? 'INATIVO' : 'ATIVO';
                    modalMessage.innerHTML = `O ANBU **${data.id}** está atualmente <span class="font-bold ${data.isActive ? 'text-green-400' : 'text-red-400'}">${statusText}</span>. Deseja alternar o status para **${newStatusText}**?`;
                    confirmBtn.textContent = `Alternar para ${newStatusText}`;
                    confirmBtn.classList.add('bg-orange-600', 'hover:bg-orange-700'); 
                }

                cancelBtn.onclick = () => closeCustomModal(false);
                if (type === 'confirm' || type === 'ninjaEdit') {
                     confirmBtn.onclick = confirmBtn.onclick || (() => closeCustomModal(true));
                }

                modal.classList.remove('hidden');
                modal.classList.add('flex');
            });
        }

        function closeCustomModal(result) {
            const modal = document.getElementById('custom-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            if (resolveModalPromise) {
                resolveModalPromise(result);
                resolveModalPromise = null;
            }
        }
        
        // NOVO: Coleta de dados adaptada para o sistema de BT (ANBU)
        function _gatherReportData() {
            const btInput = document.getElementById('bt-points');
            const isSpecial = document.getElementById('chk-special') ? document.getElementById('chk-special').checked : false;
            const isTrashTalk = document.getElementById('chk-trashtalk') ? document.getElementById('chk-trashtalk').checked : false;
            const supportInput = document.getElementById('support-ids');

            // Lógica Matemática
            let btBase = parseInt(btInput ? btInput.value : '0', 10);
            if (isNaN(btBase)) btBase = 0;

            let totalPointsRaw = btBase;
            if (isSpecial) totalPointsRaw *= 3;
            if (isTrashTalk) totalPointsRaw += 20;

            const supportIdsRaw = supportInput ? supportInput.value.split(',').map(id => normalizeId(id)).filter(id => id) : [];

            return {
                reportId: currentReportId,
                btBase: btBase,
                isSpecial: isSpecial,
                isTrashTalk: isTrashTalk,
                executorIds: selectedExecutors,
                supportIds: supportIdsRaw,
                description: '', // Removido o campo antigo de detalhes manuais
                totalPointsRaw: totalPointsRaw,
                finalReportRank: 'BT', // Hardcoded rank to BT
                timestamp: new Date().toISOString(),
                serviceNames: ['Caça (BT)'], // Mantido para retrocompatibilidade do histórico
                clients: [] // Deixado vazio para retrocompatibilidade
            };
        }

        window.generateReportId = function() {
            const reportIdElement = document.getElementById('report-id-display');
            if (!reportIdElement) return;

            const now = new Date();
            const datePart = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}`;
            const uuidPart = crypto.randomUUID().substring(0, 8);
            currentReportId = `RPT-${datePart}-${uuidPart}`;
            reportIdElement.value = currentReportId;
        }

        // NOVO: Calcula pontos com lógica de BT
        window.calculateTotalPoints = function() {
            const data = _gatherReportData();
            const totalPointsInput = document.getElementById('total-points');
            const submitBtn = document.getElementById('submit-report');

            if (!data || !totalPointsInput || !submitBtn) return;
            
            const totalPoints = data.totalPointsRaw;
            totalPointsInput.value = totalPoints;

            const hasExecutors = data.executorIds.length > 0;
            const isReady = isWriterMode && hasExecutors && totalPoints > 0; 
            submitBtn.disabled = !isReady;
            
            if (isReady) {
                 submitBtn.classList.remove('bg-red-600/50', 'cursor-not-allowed');
                 submitBtn.classList.add('bg-red-600', 'hover:bg-red-700');
            } else {
                 submitBtn.classList.add('bg-red-600/50', 'cursor-not-allowed');
                 submitBtn.classList.remove('bg-red-600', 'hover:bg-red-700');
            }
        }
        
        // NOVO: Atualiza a descrição com detalhes de multiplicadores
        window.updateDescriptionPreview = function() {
            const previewDiv = document.getElementById('description-preview');
            if (!previewDiv) return;

            const data = _gatherReportData();
            let previewText = `Bounty Base: ${data.btBase} pts. `;

            if (data.isSpecial) previewText += `[ALVO ESPECIAL: Dakotinha/Guinho (x3)]. `;
            if (data.isTrashTalk) previewText += `[TRASH TALK (+20)]. `;

            if (data.executorIds.length > 0) {
                previewText += `ANBU(s): ${data.executorIds.join(', ')}. `;
            } else {
                previewText += `[Nenhum ANBU selecionado]. `;
            }

            if (data.supportIds.length > 0) {
                previewText += `Auxílio: ${data.supportIds.join(', ')}. `;
            }

            previewText += `=> TOTAL: ${data.totalPointsRaw} Pts.`;

            previewDiv.textContent = previewText.trim();
            window.calculateTotalPoints();
        }

        window.submitReport = async function() {
            if (!isWriterMode) {
                 window.openCustomModal('Acesso Negado', 'Você precisa de permissão de Escritor ou Admin para registrar BTs.', 'info');
                 return;
            }

            const data = _gatherReportData();
            const statusElement = document.getElementById('status');

            // NOVA VALIDAÇÃO BT
            if (!data || data.executorIds.length === 0 || data.totalPointsRaw === 0) {
                 window.openCustomModal('Erro', 'O registro deve ter pelo menos um ANBU selecionado e um valor de BT preenchido (maior que 0).', 'info');
                 return;
            }

            statusElement.classList.remove('hidden');
            statusElement.className = 'text-yellow-400 p-4 bg-yellow-900/50 rounded-lg block';
            statusElement.textContent = `Registrando Relatório ${data.reportId} e atualizando Rank...`;

            const batch = writeBatch(db);
            const pointsToAward = data.totalPointsRaw;
            // No sistema de BT, cada submissão conta como 1 "missão/caçada" concluída
            const missionsCount = 1; 
            const currentTime = data.timestamp;

            try {
                // 1. Set/Add Report
                const reportRef = doc(db, COLLECTIONS.REPORTS, data.reportId);
                batch.set(reportRef, data);

                // 2. Update Executors (NINJAS collection)
                for (const executorId of data.executorIds) {
                    const ninjaRef = doc(db, COLLECTIONS.NINJAS, executorId);
                    batch.set(ninjaRef, { 
                        rankPoints: (ninjasData[executorId]?.rankPoints || 0) + pointsToAward,
                        missionsCompleted: (ninjasData[executorId]?.missionsCompleted || 0) + missionsCount,
                    }, { merge: true });
                }

                // 3. Update Auxiliary Log (AUXILIARY_LOG collection)
                for (const supportId of data.supportIds) {
                    if (data.executorIds.includes(supportId)) continue; 
                    
                    const auxRef = doc(db, COLLECTIONS.AUXILIARY_LOG, supportId);
                    batch.set(auxRef, {
                        id: supportId,
                        rankPoints: (auxiliaryData[supportId]?.rankPoints || 0) + pointsToAward,
                        lastParticipation: currentTime
                    }, { merge: true });
                }
                
                await batch.commit();

                statusElement.textContent = `✅ Sucesso! Registro ${data.reportId} finalizado. ${pointsToAward} pontos aplicados.`;
                statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                
                // Reset Form UI
                selectedExecutors = [];
                window.updateExecutorTags();
                window.generateReportId();
                if(document.getElementById('bt-points')) document.getElementById('bt-points').value = '';
                if(document.getElementById('chk-special')) document.getElementById('chk-special').checked = false;
                if(document.getElementById('chk-trashtalk')) document.getElementById('chk-trashtalk').checked = false;
                if(document.getElementById('support-ids')) document.getElementById('support-ids').value = '';
                window.updateDescriptionPreview(); 

            } catch (e) {
                console.error("Erro no registro do Firebase Batch:", e);
                statusElement.textContent = `❌ Erro no Registro: ${e.message}. Verifique permissões de escrita/internet.`;
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
            }
            setTimeout(() => statusElement.classList.add('hidden'), 7000);
        }

        window.updateExecutorSelect = function() {
            const select = document.getElementById('new-executor-id-select');
            if (!select) return;
            
            const activeNinjas = Object.values(ninjasData).filter(n => n.isActive);

            select.innerHTML = '<option value="" disabled selected>Selecione um ANBU Ativo</option>';
            activeNinjas.sort((a, b) => a.id.localeCompare(b.id)).forEach(ninja => {
                if (!selectedExecutors.includes(ninja.id)) {
                    const option = document.createElement('option');
                    option.value = ninja.id;
                    option.textContent = ninja.id;
                    select.appendChild(option);
                }
            });
        }

        // Deixado por retrocompatibilidade com a aba Gerenciamento de Missões
        window.updateMissionSelects = function(resetMissionEntries = true) {
            const missionSelects = document.querySelectorAll('.mission-select');
            const missionOptions = Object.values(missionsData)
                .map(m => `<option value="${m.name}" data-rank="${m.baseRank}" data-points="${m.points}">${m.name} (${m.baseRank.replace('-Rank', '')} - ${m.points} Pts)</option>`)
                .sort((a, b) => a.localeCompare(b))
                .join('');

            missionSelects.forEach(select => {
                const currentValue = select.value;
                select.innerHTML = `<option value="" disabled selected>Selecione a Missão</option>` + missionOptions;
                if (currentValue && select.querySelector(`option[value="${currentValue}"]`)) {
                    select.value = currentValue;
                } else {
                     select.selectedIndex = 0;
                }
            });
            if (resetMissionEntries) window.updateDescriptionPreview();
        }

        // Funções de CRUD
        window.addNinja = async function() {
            if (!isMasterAdminMode) {
                window.openCustomModal('Acesso Negado', 'Você precisa de permissão de Admin Master para adicionar ANBUs.', 'info');
                return;
            }

            const newNinjaIdInput = document.getElementById('new-ninja-id');
            const ninjaId = newNinjaIdInput.value.trim();
            const normalizedId = normalizeId(ninjaId);
            const statusElement = document.getElementById('status');

            statusElement.classList.remove('hidden');
            statusElement.className = 'text-yellow-400 p-4 bg-yellow-900/50 rounded-lg block';
            statusElement.textContent = `Processando adição de ANBU...`;

            if (!ninjaId) {
                statusElement.textContent = '❌ O ID do ANBU não pode ser vazio.';
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 5000);
                return;
            }

            if (ninjasData[normalizedId]) {
                statusElement.textContent = `❌ O ANBU '${normalizedId}' já está cadastrado.`;
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 5000);
                return;
            }

            try {
                await setDoc(doc(db, COLLECTIONS.NINJAS, normalizedId), {
                    id: normalizedId, 
                    isActive: true, 
                    rankPoints: 0, 
                    missionsCompleted: 0
                });
                
                newNinjaIdInput.value = ''; 
                statusElement.textContent = `✅ ANBU '${normalizedId}' adicionado com sucesso!`;
                statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 5000);

                window.updateExecutorSelect();
                window.logAction('ADD_GUARDIAN', { guardianId: normalizedId });

            } catch (e) {
                console.error("Erro ao adicionar ANBU:", e);
                statusElement.textContent = `❌ Erro ao adicionar ANBU: ${e.message}`;
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 7000);
            }
        }
        
        window.deleteNinja = function(id) { 
            if (!isMasterAdminMode) {
                 window.openCustomModal('Acesso Negado', 'Você precisa de permissão de Admin Master para excluir ANBUs.', 'info');
                 return;
            }
            window.openCustomModal('Confirmação de Exclusão', `Tem certeza que deseja excluir o ANBU '${id}'? (Ação permanente e exige Admin Master).`, 'confirm', async (confirmed) => {
                 if (confirmed) {
                     const statusElement = document.getElementById('status');
                     statusElement.classList.remove('hidden');
                     statusElement.className = 'text-yellow-400 p-4 bg-yellow-900/50 rounded-lg block';

        window.recalculateAllRanks = async function(calledInternally = false) {
            if (!isWriterMode) { 
                 if (!calledInternally) window.openCustomModal('Acesso Negado', 'Você precisa de permissão de Escritor ou Admin para recalcular os Ranks.', 'info');
                 return;
            }

            if (!calledInternally) {
                const confirmed = await window.openCustomModal(
                    'Confirmação de Recálculo Total', 
                    'Tem certeza que deseja RECALCULAR todos os Ranks? Isso irá recontar os pontos com base no histórico atual.', 
                    'confirm'
                );
                
                if (!confirmed) return;
            }

            const statusElement = document.getElementById('status');
            if (!calledInternally) { 
                statusElement.classList.remove('hidden');
                statusElement.className = 'text-yellow-400 p-4 bg-yellow-900/50 rounded-lg block';
                statusElement.textContent = `Iniciando Recálculo Global de Ranks... (Fase 1/3: Resetando Totais)`;
            }
            
            try {
                const getRankIndex = (rankClean) => {
                     return RANK_ORDER.findIndex(prefix => rankClean.startsWith(prefix));
                };
                
                const tempNinjas = {}; 
                const tempAux = {};
                
                Object.values(ninjasData).forEach(ninja => {
                    tempNinjas[ninja.id] = { ...ninja, rankPoints: 0, missionsCompleted: 0 };
                });
                
                Object.values(auxiliaryData).forEach(aux => {
                    tempAux[aux.id] = { ...aux, rankPoints: 0 };
                });

                let resetBatch = writeBatch(db);
                Object.values(ninjasData).forEach(ninja => {
                    const ninjaRef = doc(db, COLLECTIONS.NINJAS, ninja.id);
                    resetBatch.update(ninjaRef, { rankPoints: 0, missionsCompleted: 0 });
                });
                Object.values(auxiliaryData).forEach(aux => {
                    const auxRef = doc(db, COLLECTIONS.AUXILIARY_LOG, aux.id);
                    resetBatch.update(auxRef, { rankPoints: 0 }); 
                });
                await resetBatch.commit();


                if (!calledInternally) statusElement.textContent = `Fase 2/3: Recalculando pontos de ${reportsData.length} registros...`;
                
                let applyBatch = writeBatch(db);
                
                reportsData.forEach((report) => {
                    let currentReportPoints = 0;
                    let missionCount = 0;
                    let highestRank = '';
                    
                    // PRESERVAR PONTOS DE BTs (Que não usam a aba gerenciamento de missões)
                    if (report.serviceNames && report.serviceNames.includes('Caça (BT)')) {
                        currentReportPoints = report.totalPointsRaw || 0;
                        missionCount = 1;
                        highestRank = 'BT';
                    } else if (report.serviceNames) {
                        // Lógica antiga mantida para retrocompatibilidade
                        report.serviceNames.forEach(missionName => {
                            const mission = missionsData[missionName];
                            if (mission) {
                                currentReportPoints += mission.points;
                                missionCount++;
                                
                                const currentRankClean = cleanRankForLookup(mission.baseRank);
                                const highestRankClean = cleanRankForLookup(highestRank);
                                const currentIndex = getRankIndex(currentRankClean);
                                const highestIndex = getRankIndex(highestRankClean);
                                
                                if (highestIndex === -1 || currentIndex < highestIndex) {
                                    highestRank = mission.baseRank;
                                }
                            }
                        });
                    }

                    const reportRef = doc(db, COLLECTIONS.REPORTS, report.reportId);
                    applyBatch.update(reportRef, {
                        totalPointsRaw: currentReportPoints,
                        finalReportRank: highestRank || 'N/A'
                    });

                    if (report.executorIds && currentReportPoints > 0) {
                        report.executorIds.forEach(executorId => {
                             if (!tempNinjas[executorId]) {
                                 tempNinjas[executorId] = { id: executorId, isActive: true, rankPoints: 0, missionsCompleted: 0 };
                             }
                             tempNinjas[executorId].rankPoints += currentReportPoints;
                             tempNinjas[executorId].missionsCompleted += missionCount;
                        });
                    }

                    if (report.supportIds && currentReportPoints > 0) {
                         report.supportIds.forEach(supportId => {
                              if (report.executorIds && report.executorIds.includes(supportId)) return;
                              
                              if (!tempAux[supportId]) {
                                   tempAux[supportId] = { id: supportId, rankPoints: 0, lastParticipation: report.timestamp };
                              }
                              tempAux[supportId].rankPoints += currentReportPoints;
                              if (report.timestamp > (tempAux[supportId].lastParticipation || '')) {
                                   tempAux[supportId].lastParticipation = report.timestamp;
                              }
                         });
                    }
                }); 
                
                if (!calledInternally) statusElement.textContent = `Fase 3/3: Aplicando novos Ranks...`;
                
                Object.values(tempNinjas).forEach(ninja => {
                    const ninjaRef = doc(db, COLLECTIONS.NINJAS, ninja.id);
                    applyBatch.update(ninjaRef, { 
                        rankPoints: ninja.rankPoints, 
                        missionsCompleted: ninja.missionsCompleted
                    });
                });

                Object.values(tempAux).forEach(aux => {
                    const auxRef = doc(db, COLLECTIONS.AUXILIARY_LOG, aux.id);
                    applyBatch.set(auxRef, { 
                        id: aux.id,
                        rankPoints: aux.rankPoints,
                        lastParticipation: aux.lastParticipation
                    }, { merge: true });
                });

                await applyBatch.commit();
                
                if (!calledInternally) {
                    statusElement.textContent = `✅ Sucesso! Recálculo concluído. ${reportsData.length} registros processados.`;
                    statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                    
                    window.logAction('RECALCULATE_RANKS_GLOBAL', { reportCount: reportsData.length });
                    setTimeout(() => statusElement.classList.add('hidden'), 7000);
                }
                
            } catch (e) {
                console.error("Erro no Recálculo Global:", e);
                statusElement.textContent = `❌ Erro no Recálculo: ${e.message}. Tente novamente.`;
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 7000);
            }
        }

        window.renderReportsLogFiltered = function(filterId = null, targetId = 'filtered-reports-log') {
            
            const reportsLog = document.getElementById(targetId);
            const guardianSummaryDiv = document.getElementById('guardian-summary');

            if (!reportsLog) return;
            
            reportsLog.innerHTML = '';
            let filteredReports = reportsData;

            if (filterId) {
                filteredReports = reportsData.filter(report => {
                    const isExecutor = Array.isArray(report.executorIds) && report.executorIds.includes(filterId);
                    const isAuxiliary = Array.isArray(report.supportIds) && report.supportIds.includes(filterId);
                    return isExecutor || isAuxiliary;
                });
            }
            
            if (filterId && guardianSummaryDiv) {
                const ninjaData = ninjasData[filterId];
                const auxData = auxiliaryData[filterId];
                const isGuardian = !!ninjaData;
                
                let points = 0;
                let missions = 0;
                let type = 'ID Inativo';

                if (isGuardian) {
                    points = Math.round(ninjaData.rankPoints);
                    missions = ninjaData.missionsCompleted;
                    type = ninjaData.isActive ? 'ANBU Ativo' : 'ANBU Inativo';
                } else if (auxData) {
                    points = Math.round(auxData.rankPoints);
                    missions = reportsData.filter(r => r.supportIds && r.supportIds.includes(filterId)).length;
                    type = 'Auxiliar';
                }

                guardianSummaryDiv.innerHTML = `
                    <p class="text-xl font-bold text-yellow-400">${filterId.toUpperCase()}</p>
                    <p class="text-sm text-gray-300">${type}</p>
                    <p class="text-lg text-green-400">Total de Pontos: ${points} Pts</p>
                    <p class="text-gray-300">Total de BTs/Relatórios Envolvidos: ${missions}</p>
                `;
                guardianSummaryDiv.classList.remove('hidden');
            } else if (guardianSummaryDiv) {
                guardianSummaryDiv.classList.add('hidden');
            }


            const sortedReports = filteredReports.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            if (sortedReports.length === 0) {
                 reportsLog.innerHTML = `<tr><td colspan="6" class="px-4 py-4 text-center italic text-gray-500">Nenhum registro encontrado${filterId ? ` para o ANBU/Auxiliar "${filterId}"` : ''}.</td></tr>`;
                 return;
            }

            sortedReports.forEach(data => {
                const rankClass = data.finalReportRank ? getRankColor(data.finalReportRank) : 'text-gray-400';
                
                const formattedDate = new Date(data.timestamp).toLocaleDateString('pt-BR', {
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                
                const servicesList = data.serviceNames ? data.serviceNames.map(name => 
                    `<span class="text-xs text-gray-400 block">${name}</span>`
                ).join('') : '<span class="text-xs text-gray-400 block">BT/Caça</span>';
                
                const executorsText = Array.isArray(data.executorIds) ? data.executorIds.join(', ') : data.executorId;
                const finalRankDisplay = data.finalReportRank ? `(Rank ${data.finalReportRank.replace('-Rank', '')})` : '(BT)';
                
                let role = '';
                if (filterId) {
                    const isExecutor = Array.isArray(data.executorIds) && data.executorIds.includes(filterId);
                    const isAuxiliary = Array.isArray(data.supportIds) && data.supportIds.includes(filterId);
                    if (isExecutor && isAuxiliary) role = 'ANBU Executor & Auxílio';
                    else if (isExecutor) role = 'ANBU Executor';
                    else if (isAuxiliary) role = 'Auxílio';
                }
                
                const targetBody = document.getElementById(targetId);

                // Reconstrução da descrição (se for formato novo de BT)
                let finalDesc = data.description || '';
                if (data.serviceNames && data.serviceNames.includes('Caça (BT)')) {
                    finalDesc = `Bounty Base: ${data.btBase || data.totalPointsRaw}. ` + 
                                (data.isSpecial ? '[Alvo Especial x3]. ' : '') + 
                                (data.isTrashTalk ? '[Trash Talk +20].' : '');
                }

                if (targetId === 'filtered-reports-log') {
                     targetBody.innerHTML += `
                         <tr class="hover:bg-gray-700/50">
                             <td class="px-4 py-2 whitespace-nowrap text-xs text-gray-400 truncate w-1/12">${data.reportId}</td>
                             <td class="px-4 py-2 whitespace-normal text-sm text-white w-2/12">

                             </td>
                             <td class="px-4 py-2 whitespace-normal text-sm text-white w-2/12">

                             <td class="px-4 py-2 whitespace-normal text-sm italic text-gray-400 w-4/12">${finalDesc}</td>
                             <td class="px-4 py-2 whitespace-nowrap text-sm w-1/12">
                                 <span class="font-mono text-gray-400 text-xs">${formattedDate}</span>
                             </td>

                } else {
                    const clientsDisplay = data.clients && data.clients.length > 0 ? data.clients.join(', ') : 'N/A';

        // FUNÇÕES DE PERSISTÊNCIA E INICIALIZAÇÃO (FIREBASE)

        async function initializeFirebase() {
            try {
                if (!firebaseConfig || !firebaseConfig.projectId) {
                    throw new Error("Configuração do Firebase inválida ou faltando.");
                }
                
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                
                const anonUser = await signInAnonymously(auth);
                userId = anonUser.user.uid;
                currentAccessId = 'ANONYMOUS'; 
                
                document.getElementById('auth-info').textContent = `Usuário ID (Anon): ${userId} | App ID (DB Contexto): ${appId}`;
                setupFirestoreListeners(); 
                window.renderPage(currentPage);
                window.generateReportId(); 

            } catch (error) {
                console.error("Erro na inicialização do Firebase:", error);
                const statusElement = document.getElementById('status');
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                statusElement.textContent = `❌ Erro ao conectar: ${error.message}. Verifique sua chave de API e regras de segurança.`;
            }
        }
        
        function setupFirestoreListeners() {
            if (!db) return;

            onSnapshot(collection(db, COLLECTIONS.ACCESS_KEYS), (snapshot) => {
                accessKeysData = {};
                snapshot.forEach(doc => {
                    const data = doc.data();
                    accessKeysData[doc.id] = data; 
                });
                if (currentPage === 'admin_panel' || currentPage === 'report_form') {
                    window.renderPage(currentPage); 
                }
            }, (error) => { 
                console.warn("@firebase/firestore: Permissão negada para ACCESS_KEYS:", error.message);
            });

            onSnapshot(collection(db, COLLECTIONS.MISSIONS), (snapshot) => {
                missionsData = {};
                snapshot.forEach(doc => {
                    const data = doc.data();
                    missionsData[data.name] = data; 
                });
                if (Object.keys(missionsData).length === 0) {
                     seedInitialData(db);
                }
                window.updateMissionSelects && window.updateMissionSelects(false); 
                window.renderMissionsDatabase && window.renderMissionsDatabase();
                
            }, (error) => {
                console.warn("@firebase/firestore: Permissão negada para MISSIONS:", error.message);
            });

            onSnapshot(collection(db, COLLECTIONS.NINJAS), (snapshot) => {
                ninjasData = {};
                snapshot.forEach(doc => {
                    const data = doc.data();
                    ninjasData[data.id] = data;
                });
                window.updateExecutorSelect && window.updateExecutorSelect();
                
                if (['scoreboard', 'ninja_panel'].includes(currentPage)) {
                    window.renderPage(currentPage);
                } else if (currentPage === 'admin_panel') {
                     window.renderNinjasTable && window.renderNinjasTable();
                }
            }, (error) => {
                console.warn("@firebase/firestore: Permissão negada para NINJAS:", error.message);
            });
            
            onSnapshot(collection(db, COLLECTIONS.AUXILIARY_LOG), (snapshot) => {
                auxiliaryData = {};
                snapshot.forEach(doc => {
                    const data = doc.data();
                    auxiliaryData[doc.id] = data;
                });
                if (['auxiliary_log', 'ninja_panel'].includes(currentPage)) {
                    window.renderAuxiliaryData && window.renderAuxiliaryData(); 
                }
            }, (error) => {
                console.warn("@firebase/firestore: Permissão negada para AUXILIARY_LOG:", error.message);
            });

            onSnapshot(collection(db, COLLECTIONS.REPORTS), (snapshot) => {
                reportsData = [];
                snapshot.forEach(doc => reportsData.push(doc.data()));
                if (['reports_log', 'ninja_panel'].includes(currentPage)) window.renderPage(currentPage);
            }, (error) => {
                console.warn("@firebase/firestore: Permissão negada para REPORTS:", error.message);
            });
        }
        
        async function seedInitialData(db) {
            const newMissionsList = [
                { name: "Caça (BT)", rank: "BT" }
            ];

            const batch = writeBatch(db);
            let ninjasAdded = 0;

            for (const mission of newMissionsList) {
                const docId = mission.name;
                const missionRef = doc(db, COLLECTIONS.MISSIONS, docId);
                const cleanRank = cleanRankForLookup(mission.rank);
                const points = RANK_POINTS[cleanRank] || 0; 
                batch.set(missionRef, {
                    name: mission.name,
                    baseRank: mission.rank,
                    points: points,
                    id: mission.name
                });
            }

            const exampleNinjas = ['dellzito', 'alnvctr'];
            for (const id of exampleNinjas) {
                const normalizedId = normalizeId(id); 
                const ninjaRef = doc(db, COLLECTIONS.NINJAS, normalizedId);
                const ninjaSnap = await getDoc(ninjaRef);
                if (!ninjaSnap.exists()) {
                    batch.set(ninjaRef, { id: normalizedId, isActive: true, rankPoints: 0, missionsCompleted: 0 });
                    ninjasAdded++;
                }
            }
            
            const masterKeyRef = doc(db, COLLECTIONS.ACCESS_KEYS, 'MASTER_ADMIN');
            batch.set(masterKeyRef, {
                id: 'MASTER_ADMIN',
                key: 'MASTER_KEY_001', 
                level: 'master_admin'
            }, { merge: true });

            const writerKeyRef = doc(db, COLLECTIONS.ACCESS_KEYS, 'ANBU_Exemplo');
            batch.set(writerKeyRef, {
                id: 'ANBU_1',
                key: 'report_123', 
                level: 'report_writer'
            }, { merge: true });

            if (newMissionsList.length > 0 || ninjasAdded > 0) {
                try {
                    await batch.commit();
                } catch (e) {
                     console.error("Erro ao fazer seed inicial no Firestore:", e);
                }
            }
        }

        window.checkAccessKey = async function() {
            const idInput = document.getElementById('access-id-input');
            const keyInput = document.getElementById('access-key-input');
            const statusElement = document.getElementById('status');
            
            if (!idInput || !keyInput) return;

            const id = idInput.value.trim();
            const key = keyInput.value.trim();
            
            if (!id || !key) {
                statusElement.textContent = '❌ Preencha o ID e a Senha.';
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 5000);
                return;
            }
            
            const accessData = accessKeysData[id];

            if (accessData && accessData.key === key) {
                
                currentAccessId = id; 
                
                if (accessData.level === 'master_admin') {
                    window.toggleMasterAdminUI(true);
                    window.toggleWriterUI(true);
                    statusElement.textContent = `✅ Acesso MASTER LIBERADO. ID: ${id}. Funcionalidades de edição habilitadas.`;
                } else if (accessData.level === 'report_writer') {
                    window.toggleWriterUI(true);
                    window.toggleMasterAdminUI(false);
                    statusElement.textContent = `✅ Acesso ANBU LIBERADO. ID: ${id}. Criação de relatórios habilitada.`;
                } else {
                    statusElement.textContent = '❌ ID/Senha válidos, mas Nível de Acesso não reconhecido.';
                    statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                    setTimeout(() => statusElement.classList.add('hidden'), 7000);
                    return;
                }
                
                keyInput.value = ''; 
                idInput.value = '';
                statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 5000);
                
                window.renderPage(currentPage);
                
            } else {
                currentAccessId = 'ANONYMOUS'; 
                window.toggleWriterUI(false);
                window.toggleMasterAdminUI(false);
                statusElement.textContent = '❌ Autorização Negada. ID ou Senha Incorreta.';
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 7000);
            }
        }

        window.renderPage = function(pageName) {

            });

            contentDiv.innerHTML = '';

            switch (pageName) {
                case 'home':
                    contentDiv.innerHTML = window.renderHome();
                    break;
                case 'scoreboard':
                    contentDiv.innerHTML = window.renderRank();
                    window.renderScoreboard();
                    break;
                case 'reports_log':
                    contentDiv.innerHTML = window.renderRelatorios();
                    window.renderReportsLog();
                    break;

                    contentDiv.innerHTML = window.renderAuxilio();
                    window.renderAuxiliaryData(); 
                    break;
                case 'ninja_panel':
                    contentDiv.innerHTML = window.renderNinjaPanel(); 
                    window.renderReportsLogFiltered(); 
                    break;
                case 'report_form':

                    const addExecutorBtn = document.getElementById('add-executor-btn');

                    window.renderNinjasTable();

                    break;

            }
