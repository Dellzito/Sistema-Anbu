<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forças Especiais da Leaf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        .remove-btn, .edit-btn, .admin-only, .writer-only { transition: all 0.1s ease-in-out; }
        .executor-list-container { min-height: 50px; padding: 8px; border: 1px solid #4b5563; border-radius: 8px; background-color: #374151; display: flex; flex-wrap: wrap; gap: 6px; }
        .executor-tag { display: flex; align-items: center; padding: 4px 8px; border-radius: 9999px; font-size: 0.875rem; font-weight: 600; color: #fff; text-transform: capitalize; }
        .killer-tag { background-color: #dc2626; }
        .assist-tag { background-color: #d97706; }
        .healer-tag { background-color: #059669; }
        .executor-remove-btn { margin-left: 6px; cursor: pointer; opacity: 0.8; }
        .executor-remove-btn:hover { opacity: 1; }
        .nav-link { cursor: pointer; padding: 10px 15px; font-weight: 600; transition: all 0.2s; text-align: center; position: relative; }
        .nav-link:hover:not(.active) { background-color: #1e293b; }
        .nav-link.active { color: #f87171; border-bottom: 2px solid #f87171; }
        .capitalize-name { text-transform: capitalize; }

        /* === PERFIL === */
        .profile-header { display: flex; align-items: center; gap: 16px; padding-bottom: 16px; border-bottom: 1px solid #374151; margin-bottom: 16px; flex-wrap: wrap; }
        .profile-avatar-sm { width: 72px; height: 72px; border-radius: 50%; border: 3px solid #374151; object-fit: cover; flex-shrink: 0; }
        .profile-pts-block { margin-left: auto; text-align: right; }
        .combat-bar { height: 8px; border-radius: 4px; background: #1e293b; overflow: hidden; display: flex; gap: 1px; margin-top: 6px; }
        .combat-bar-seg { height: 100%; transition: width 0.5s ease; }
        .stat-card { background: #0f172a; border-radius: 8px; padding: 10px 14px; text-align: center; }
        .stat-card-val { font-size: 1.4rem; font-weight: 700; }
        .stat-card-lbl { font-size: 0.7rem; color: #9ca3af; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
        .profile-section-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #6b7280; margin-bottom: 8px; }

        /* === HISTÓRICO: filtros === */
        .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; }
        .filter-bar input, .filter-bar select { background: #1e293b; border: 1px solid #374151; color: #e5e7eb; border-radius: 8px; padding: 6px 12px; font-size: 0.85rem; outline: none; }
        .filter-bar input:focus, .filter-bar select:focus { border-color: #ef4444; }
    </style>
</head>
<body class="p-4 sm:p-8 text-gray-100">

    <div id="app" class="max-w-6xl mx-auto space-y-8">
        <header class="pb-4 border-b border-red-700/50">
            <h1 id="main-title" class="text-4xl font-bold text-red-500 text-center mb-4">🍁 Forças Especiais da Leaf<br><span class="text-2xl text-gray-400">ANBU & 12 Guardiões</span></h1>
            <nav class="flex flex-wrap justify-center bg-gray-900 rounded-xl shadow-lg p-1 gap-2">
                <a class="nav-link active" onclick="window.renderPage('home')" id="nav-home">QG</a>
                <a class="nav-link" onclick="window.renderPage('scoreboard')" id="nav-scoreboard">Rank Geral</a>
                <a class="nav-link text-yellow-400 font-black" onclick="window.renderPage('event_panel')" id="nav-event_panel">🌟 EVENTO</a>
                <a class="nav-link" onclick="window.renderPage('reports_log')" id="nav-reports_log">Histórico</a>
                <a class="nav-link" onclick="window.renderPage('targets_log')" id="nav-targets_log">Alvos Eliminados</a>
                <a class="nav-link" onclick="window.renderPage('ninja_panel')" id="nav-ninja_panel">Membros</a>
                <a class="nav-link writer-only hidden" onclick="window.renderPage('report_form')" id="nav-report_form">Registrar Missão</a>
                <a class="nav-link writer-only hidden text-blue-400 font-bold" onclick="window.renderPage('audit_panel')" id="nav-audit_panel">
                    Auditoria (Bot)
                    <span id="audit-badge" class="absolute -top-2 -right-2 bg-red-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center hidden">0</span>
                </a>
                <a class="nav-link" onclick="window.renderPage('admin_panel')" id="nav-admin_panel">Acesso Restrito</a>
            </nav>
        </header>

        <div id="content" class="min-h-[60vh]"></div>
        <div id="status" class="text-center p-4 rounded-lg hidden"></div>
        <div id="auth-info" class="text-sm text-center text-yellow-500">Conectando ao Banco de Dados...</div>
        <datalist id="known-targets"></datalist>
    </div>

    <div id="custom-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 hidden items-center justify-center p-4 z-50">
        <div id="modal-content" class="bg-gray-800 rounded-xl shadow-2xl p-6 w-full max-w-lg space-y-4 transform scale-95 transition-all">
            <h3 id="modal-title" class="text-xl font-bold text-red-400">Título</h3>
            <p id="modal-message" class="text-gray-300">Mensagem</p>
            <div id="modal-input-container" class="space-y-3 hidden">
                <label id="input-label-1" class="block text-sm font-medium text-gray-300 hidden">Input 1</label>
                <input type="text" id="modal-input-1" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white hidden" />
                <select id="modal-select-1" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white hidden"></select>
                
                <label id="input-label-2" class="block text-sm font-medium text-gray-300 hidden">Input 2</label>
                <select id="modal-select-2" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white hidden"></select>

                <label id="input-label-3" class="block text-sm font-medium text-gray-300 hidden">Input 3</label>
                <select id="modal-select-3" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white hidden">
                    <option value="">-- Nenhuma --</option>
                    <option value="ANBU">ANBU</option>
                    <option value="12G">12 Guardiões</option>
                </select>

                <label id="input-label-4" class="block text-sm font-medium text-gray-300 hidden">Input 4</label>
                <input type="date" id="modal-input-4" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white hidden" />
            </div>
            <div id="modal-actions" class="flex justify-end gap-3 pt-2">
                <button id="modal-cancel-btn" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white font-semibold rounded-lg transition duration-150">Cancelar</button>
                <button id="modal-confirm-btn" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition duration-150">Confirmar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import {
            getFirestore, doc, setDoc, onSnapshot, collection, writeBatch,
            updateDoc, deleteDoc, getDocs
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const CUSTOM_FIREBASE_CONFIG = {
            apiKey: "AIzaSyC-QaPr7O6RkWR3vpXCg4zrnUWw3TzU9ss",
            authDomain: "g-2cb53.firebaseapp.com",
            projectId: "g-2cb53",
            storageBucket: "g-2cb53.firebasestorage.app",
            messagingSenderId: "292095146978",
            appId: "1:292095146978:web:836d833230907d081017bb"
        };

        const appId = CUSTOM_FIREBASE_CONFIG.projectId;
        let app, db, auth;

        let isMasterAdminMode = false;
        let isWriterMode = false;
        let currentPage = 'home';
        let currentAccessId = 'ANONYMOUS';
        let currentReportId = '';
        let processingPendingId = null;

        let selectedKillers = [];
        let selectedAssists = [];
        let selectedHealers = [];
        let targetEntryCount = 0;
        window.isEditingMode = false;

        let ninjasData = {};
        let reportsData = [];
        let eventReportsData = [];
        let pendingData = [];
        let accessKeysData = {};

        let historySearchTerm = '';
        let historyDateFilter = 'all';
        let historyIsEvent = false;

        const COLLECTIONS = {
            REPORTS: `artifacts/${appId}/public/data/reports`,
            EVENT_REPORTS: `artifacts/${appId}/public/data/event_reports`,
            PENDING_REPORTS: `artifacts/${appId}/public/data/pending_reports`,
            NINJAS: `artifacts/${appId}/public/data/ninjas`,
            ACCESS_KEYS: `artifacts/${appId}/public/data/access_keys`
        };

        const MAESTRIAS_OPCOES = ["Fogo", "Água", "Vento", "Terra", "Raio", "Med (Chakra)", "Med (Int)", "WM", "TAI"];

        function getRankIcon(rank) {
            if (rank === 1) return '🥇';
            if (rank === 2) return '🥈';
            if (rank === 3) return '🥉';
            return `#${rank}`;
        }
        
        function normalizeId(id) { 
            const trimmed = id.trim();
            if(!trimmed) return '';
            return trimmed.charAt(0).toUpperCase() + trimmed.slice(1).toLowerCase(); 
        }

        // ==========================================
        // MODAL
        // ==========================================
        let resolveModalPromise = null;
        window.openCustomModal = function(title, message, type, data = {}) {
            return new Promise(resolve => {
                resolveModalPromise = resolve;
                const modal = document.getElementById('custom-modal');
                document.getElementById('modal-title').textContent = title;
                document.getElementById('modal-message').innerHTML = message || '';

                const confirmBtn = document.getElementById('modal-confirm-btn');
                const cancelBtn = document.getElementById('modal-cancel-btn');
                const inputContainer = document.getElementById('modal-input-container');
                const input1 = document.getElementById('modal-input-1'), select1 = document.getElementById('modal-select-1'), select2 = document.getElementById('modal-select-2');
                const select3 = document.getElementById('modal-select-3'), input4 = document.getElementById('modal-input-4');
                const label1 = document.getElementById('input-label-1'), label2 = document.getElementById('input-label-2');
                const label3 = document.getElementById('input-label-3'), label4 = document.getElementById('input-label-4');

                inputContainer.classList.add('hidden'); 
                input1.classList.add('hidden'); select1.classList.add('hidden'); select2.classList.add('hidden'); 
                select3.classList.add('hidden'); input4.classList.add('hidden');
                label1.classList.add('hidden'); label2.classList.add('hidden'); label3.classList.add('hidden'); label4.classList.add('hidden');

                confirmBtn.className = 'px-4 py-2 text-white font-semibold rounded-lg transition duration-150 bg-blue-600 hover:bg-blue-700';
                confirmBtn.onclick = null; cancelBtn.onclick = null;

                if (type === 'confirm') {
                    confirmBtn.textContent = 'Confirmar'; confirmBtn.classList.replace('bg-blue-600', 'bg-red-600');
                    confirmBtn.onclick = () => closeCustomModal(true);
                } else if (type === 'photoEdit') {
                    inputContainer.classList.remove('hidden'); label1.classList.remove('hidden'); input1.classList.remove('hidden');
                    label1.textContent = 'URL da Imagem:'; input1.type = 'text'; input1.value = data.url || '';
                    confirmBtn.textContent = 'Salvar Foto';
                    confirmBtn.onclick = () => closeCustomModal({ url: input1.value.trim() });
                } else if (type === 'ninjaEdit') {
                    confirmBtn.textContent = 'Alternar Status'; confirmBtn.classList.replace('bg-blue-600', 'bg-orange-600');
                    confirmBtn.onclick = () => closeCustomModal(true);
                } else if (type === 'discordIdEdit') {
                    inputContainer.classList.remove('hidden'); label1.classList.remove('hidden'); input1.classList.remove('hidden');
                    label1.textContent = 'ID do Discord (18 dígitos):'; input1.type = 'text'; input1.value = data.discordId || '';
                    input1.placeholder = 'Ex: 123456789012345678';
                    confirmBtn.textContent = 'Salvar ID Discord';
                    confirmBtn.onclick = () => closeCustomModal({ discordId: input1.value.trim() });
                } else if (type === 'detailsEdit') {
                    inputContainer.classList.remove('hidden');
                    
                    label1.textContent = '1ª Maestria:'; label1.classList.remove('hidden'); select1.classList.remove('hidden');
                    select1.innerHTML = MAESTRIAS_OPCOES.map(m => `<option value="${m}">${m}</option>`).join('');
                    if (data.m1) select1.value = data.m1;
                    
                    label2.textContent = '2ª Maestria (Opcional):'; label2.classList.remove('hidden'); select2.classList.remove('hidden');
                    select2.innerHTML = '<option value="">-- Nenhuma --</option>' + MAESTRIAS_OPCOES.map(m => `<option value="${m}">${m}</option>`).join('');
                    if (data.m2) select2.value = data.m2;

                    label3.textContent = 'Organização:'; label3.classList.remove('hidden'); select3.classList.remove('hidden');
                    if (data.org) select3.value = data.org;

                    label4.textContent = 'Data de Entrada:'; label4.classList.remove('hidden'); input4.classList.remove('hidden');
                    if (data.joinDate) input4.value = data.joinDate;

                    confirmBtn.textContent = 'Salvar Detalhes';
                    confirmBtn.onclick = () => closeCustomModal({ m1: select1.value, m2: select2.value, org: select3.value, joinDate: input4.value });
                }

                cancelBtn.onclick = () => closeCustomModal(false);
                modal.classList.remove('hidden'); modal.classList.add('flex');
            });
        }

        function closeCustomModal(result) {
            document.getElementById('custom-modal').classList.add('hidden');
            document.getElementById('custom-modal').classList.remove('flex');
            if (resolveModalPromise) { resolveModalPromise(result); resolveModalPromise = null; }
        }

        // ==========================================
        // AUDITORIA DO BOT
        // ==========================================
        window.renderAuditPanel = function() {
            let html = `<section class="space-y-4 pt-8">
                <h2 class="text-3xl font-bold text-blue-400 text-center">Auditoria de Missões (Bot Sentinela)</h2>
                <div class="bg-gray-800 p-4 rounded-xl shadow-xl overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-700">
                <thead class="bg-gray-700"><tr>
                    <th class="p-3 text-left text-xs text-gray-300">Enviado por</th>
                    <th class="p-3 text-left text-xs text-gray-300">Vínculo</th>
                    <th class="p-3 text-left text-xs text-gray-300">Texto Original (Discord)</th>
                    <th class="p-3 text-left text-xs text-gray-300">Data</th>
                    <th class="p-3 text-center text-xs text-gray-300">Ações</th>
                </tr></thead>
                <tbody class="bg-gray-800 divide-y divide-gray-700">`;

            if (pendingData.length === 0) {
                html += `<tr><td colspan="5" class="p-6 text-center text-gray-500 italic">Nenhum relatório pendente enviado pelo bot do Discord.</td></tr>`;
            } else {
                pendingData.forEach(p => {
                    const date = new Date(p.timestamp).toLocaleString('pt-BR');
                    const vinculado = Object.values(ninjasData).find(n => n.discordId && n.discordId === p.authorId);
                    const vinculoBadge = vinculado
                        ? `<span class="bg-green-900/60 text-green-400 text-xs px-2 py-1 rounded font-bold capitalize-name">🔗 ${vinculado.id}</span>`
                        : `<span class="bg-yellow-900/60 text-yellow-400 text-xs px-2 py-1 rounded font-bold">⚠️ Não vinculado</span>`;
                    html += `<tr class="hover:bg-gray-700/50">
                        <td class="p-3 text-sm text-blue-400 font-bold">${p.authorTag}</td>
                        <td class="p-3 text-sm">${vinculoBadge}</td>
                        <td class="p-3 text-sm text-gray-300 font-mono bg-gray-900 rounded">${p.rawText}</td>
                        <td class="p-3 text-sm text-gray-400">${date}</td>
                        <td class="p-3 text-sm text-center whitespace-nowrap">
                            <button onclick="window.avaliarPending('${p.id}')" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded font-bold mr-2">Revisar</button>
                            <button onclick="window.recusarPending('${p.id}')" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded font-bold">Recusar</button>
                        </td>
                    </tr>`;
                });
            }
            html += `</tbody></table></div></section>`;
            return html;
        }

        window.avaliarPending = function(pendingId) {
            const data = pendingData.find(d => d.id === pendingId);
            if (!data) return;

            processingPendingId = pendingId;
            window.isEditingMode = false;
            window.renderPage('report_form');

            let ninjaEncontrado = Object.values(ninjasData).find(n => n.discordId && n.discordId === data.authorId);
            if (ninjaEncontrado) {
                selectedKillers.push(ninjaEncontrado.id);
            } else {
                let possivelKiller = Object.keys(ninjasData).find(nick => data.authorTag.toLowerCase().includes(nick.toLowerCase()));
                if (possivelKiller) selectedKillers.push(possivelKiller);
            }

            window.addTargetEntry();
            const entry = document.getElementById(`target-${targetEntryCount}`);

            const match = data.rawText.match(/bt\s*(\d+)[,\-\s]+(.+)/i);
            if (match) {
                entry.querySelector('.target-bt').value = match[1];
                entry.querySelector('.target-name').value = match[2].trim();
            } else {
                entry.querySelector('.target-name').value = data.rawText;
            }

            window.updateExecutorTags(); window.updateExecutorSelect(); window.updateDescriptionPreview();

            const btn = document.getElementById('submit-report');
            if (btn) btn.innerHTML = '✅ Aprovar Auditoria e Salvar Caçada';

            const statusEl = document.getElementById('status');
            statusEl.classList.remove('hidden');
            statusEl.className = 'text-blue-400 p-4 bg-blue-900/50 rounded-lg block font-bold border border-blue-500/50';
            const metodo = ninjaEncontrado
                ? `✅ Killer vinculado por ID do Discord: <b class="capitalize-name">${ninjaEncontrado.id}</b>`
                : `⚠️ Killer não encontrado por ID — verifique e ajuste manualmente.`;
            statusEl.innerHTML = `Modo de Auditoria Ativo — ${metodo}<br><span class="text-gray-300 font-normal text-sm">Revise os dados e clique em Salvar para oficializar.</span>`;
        }

        window.recusarPending = async function(pendingId) {
            const confirmed = await window.openCustomModal('Recusar Relatório', 'Deseja apagar permanentemente este relatório enviado pelo bot?', 'confirm');
            if (confirmed) { try { await deleteDoc(doc(db, COLLECTIONS.PENDING_REPORTS, pendingId)); } catch (e) {} }
        }

        // ==========================================
        // REGISTRO DE MISSÕES
        // ==========================================
        window.generateReportId = function() {
            const el = document.getElementById('report-id-display');
            if (!el) return;
            currentReportId = `BT-${new Date().toISOString().slice(0,10).replace(/-/g,'')}-${crypto.randomUUID().substring(0, 8)}`;
            el.value = currentReportId;
        }

        window.toggleEventOptions = function() {
            const isEvent = document.querySelector('input[name="report_type"]:checked')?.value === 'event';
            document.querySelectorAll('.event-modifiers').forEach(el => {
                if (isEvent) { el.classList.remove('hidden'); el.classList.add('flex'); }
                else { el.classList.remove('flex'); el.classList.add('hidden'); }
            });
        }

        window.addTargetEntry = function() {
            const container = document.getElementById('targets-container'); if (!container) return;
            targetEntryCount++; const targetId = `target-${targetEntryCount}`;
            const isEvent = document.querySelector('input[name="report_type"]:checked')?.value === 'event';
            const displayEventOpts = isEvent ? 'flex' : 'hidden';

            container.insertAdjacentHTML('beforeend', `
                <div id="${targetId}" class="target-entry bg-gray-700 p-4 rounded-lg border border-gray-600 space-y-3 relative mb-4">
                    <button type="button" onclick="window.removeTargetEntry('${targetId}')" class="absolute top-2 right-2 text-red-400 font-bold">✖</button>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="block text-sm text-gray-300">Alvo Morto (Nick)</label><input type="text" list="known-targets" class="target-name w-full p-2 rounded bg-gray-800 text-white" oninput="window.updateDescriptionPreview()"></div>
                        <div><label class="block text-sm text-gray-300">BT Base</label><input type="number" min="0" class="target-bt w-full p-2 rounded bg-gray-800 text-white font-bold" oninput="window.updateDescriptionPreview()"></div>
                    </div>
                    <div class="${displayEventOpts} event-modifiers gap-4 mt-2 pt-2 border-t border-gray-600">
                        <label><input type="checkbox" class="target-chk-special" onchange="window.updateDescriptionPreview()"><span class="text-gray-200 text-sm ml-2">Kage (x3)</span></label>
                        <label><input type="checkbox" class="target-chk-org" onchange="window.updateDescriptionPreview()"><span class="text-gray-200 text-sm ml-2">ORG (+100)</span></label>
                        <label><input type="checkbox" class="target-chk-trashtalk" onchange="window.updateDescriptionPreview()"><span class="text-gray-200 text-sm ml-2">Trash Talk (+20)</span></label>
                    </div>
                </div>`);
            window.updateDescriptionPreview();
        }

        window.removeTargetEntry = function(id) { const el = document.getElementById(id); if (el) { el.remove(); window.updateDescriptionPreview(); } }

        function _gatherReportData() {
            let totalPointsRaw = 0; const targetsData = [];
            const reportTypeRadio = document.querySelector('input[name="report_type"]:checked');
            const isEvent = reportTypeRadio ? reportTypeRadio.value === 'event' : false;

            document.querySelectorAll('.target-entry').forEach((entry, idx) => {
                const name = entry.querySelector('.target-name').value.trim() || `Alvo ${idx + 1}`;
                let btBase = parseInt(entry.querySelector('.target-bt').value || '0', 10); if (isNaN(btBase)) btBase = 0;
                
                let targetTotal = btBase;
                const isSpecial = entry.querySelector('.target-chk-special').checked, 
                      isOrg = entry.querySelector('.target-chk-org').checked, 
                      isTrashTalk = entry.querySelector('.target-chk-trashtalk').checked;
                
                if (isEvent) {
                    if (isSpecial) targetTotal *= 3; 
                    if (isOrg) targetTotal += 100; 
                    if (isTrashTalk) targetTotal += 20;
                }

                totalPointsRaw += targetTotal;
                targetsData.push({ name, btBase, isSpecial, isOrg, isTrashTalk, total: targetTotal });
            });

            if (!currentReportId) window.generateReportId();

            return {
                reportId: currentReportId, isEvent,
                targets: targetsData, killerIds: selectedKillers, assistIds: selectedAssists, healerIds: selectedHealers,
                totalPointsRaw, 
                pointsPerKiller: totalPointsRaw,
                pointsPerAssist: selectedAssists.length > 0 ? (isEvent ? Math.floor(totalPointsRaw / 3) : 0) : 0,
                pointsPerHealer: totalPointsRaw,
                timestamp: new Date().toISOString()
            };
        }

        window.updateDescriptionPreview = function() {
            const data = _gatherReportData();
            const btn = document.getElementById('submit-report');
            const input = document.getElementById('total-points');
            if (!btn || !input) return;

            input.value = `Soma: ${data.totalPointsRaw} (Killer: ${data.pointsPerKiller} | Assists: ${data.pointsPerAssist})`;
            const isReady = isWriterMode && (data.killerIds.length + data.assistIds.length + data.healerIds.length) > 0 && data.targets.length > 0 && data.totalPointsRaw > 0;

            btn.disabled = !isReady;
            btn.className = isReady ? 'w-full py-3 mt-4 bg-red-600 hover:bg-red-700 rounded-lg font-bold text-white shadow-lg' : 'w-full py-3 mt-4 bg-red-600/50 rounded-lg font-bold text-white cursor-not-allowed';

            if (window.isEditingMode && isReady && !processingPendingId) {

        window.submitReport = async function() {
            if (!isWriterMode) return;
            const data = _gatherReportData(), statusEl = document.getElementById('status');

            if (!data.reportId) { window.openCustomModal('Erro', 'ID Inválido, recarregue a página.', 'info'); return; }

            statusEl.classList.remove('hidden'); statusEl.className = 'text-yellow-400 p-4 bg-yellow-900/50 rounded block';
            statusEl.textContent = window.isEditingMode ? 'Salvando alterações...' : 'Salvando no Banco de Dados...';

            const batch = writeBatch(db);
            try {
                const collectionToUse = data.isEvent ? COLLECTIONS.EVENT_REPORTS : COLLECTIONS.REPORTS;
                batch.set(doc(db, collectionToUse, data.reportId), data);

                if (processingPendingId) {
                    batch.delete(doc(db, COLLECTIONS.PENDING_REPORTS, processingPendingId));
                }

                if (!window.isEditingMode) {
                    const pointField = data.isEvent ? 'eventPoints' : 'rankPoints';
                    const missionField = data.isEvent ? 'eventMissionsCompleted' : 'missionsCompleted';
                    data.killerIds.forEach(id => batch.set(doc(db, COLLECTIONS.NINJAS, id), { [pointField]: Number(ninjasData[id]?.[pointField] || 0) + data.pointsPerKiller, [missionField]: Number(ninjasData[id]?.[missionField] || 0) + 1 }, { merge: true }));
                    data.assistIds.forEach(id => batch.set(doc(db, COLLECTIONS.NINJAS, id), { [pointField]: Number(ninjasData[id]?.[pointField] || 0) + data.pointsPerAssist, [missionField]: Number(ninjasData[id]?.[missionField] || 0) + 1 }, { merge: true }));
                    data.healerIds.forEach(id => batch.set(doc(db, COLLECTIONS.NINJAS, id), { [pointField]: Number(ninjasData[id]?.[pointField] || 0) + data.pointsPerHealer, [missionField]: Number(ninjasData[id]?.[missionField] || 0) + 1 }, { merge: true }));
                    await batch.commit();
                } else {
                    await batch.commit();
                    await window.recalculateAllRanks(true);
                    window.isEditingMode = false;
                }

                statusEl.textContent = '✅ Registro salvo com sucesso!';
                statusEl.className = 'text-green-400 p-4 bg-green-900/50 rounded block';

                selectedKillers = []; selectedAssists = []; selectedHealers = [];
                processingPendingId = null;
                window.updateExecutorTags(); window.updateExecutorSelect(); window.generateReportId();
                document.getElementById('targets-container').innerHTML = '';
                window.addTargetEntry(); window.updateDescriptionPreview();
                document.getElementById('submit-report').innerHTML = 'Salvar Caçada';

        }

        window.recalculateAllRanks = async function(calledInternally = false) {
            if (!isWriterMode && !isMasterAdminMode) return;
            if (!calledInternally) {
                const confirmed = await window.openCustomModal('Recalcular', 'Recalcular todos os Ranks lendo o Histórico completo?', 'confirm');
                if (!confirmed) return;
            }
            try {
                const tempNinjas = {};
                Object.values(ninjasData).forEach(n => {
                    if(n.id) tempNinjas[n.id] = { ...n, rankPoints: 0, missionsCompleted: 0, eventPoints: 0, eventMissionsCompleted: 0 };
                });
                const processReport = (report, isEvent) => {
                    const pField = isEvent ? 'eventPoints' : 'rankPoints';
                    const mField = isEvent ? 'eventMissionsCompleted' : 'missionsCompleted';
                    if (report.killerIds) report.killerIds.forEach(id => { if (tempNinjas[id]) { tempNinjas[id][pField] += Number(report.pointsPerKiller || report.totalPointsRaw || 0); tempNinjas[id][mField] += 1; } });
                    if (report.assistIds) report.assistIds.forEach(id => { if (tempNinjas[id]) { tempNinjas[id][pField] += Number(report.pointsPerAssist || 0); tempNinjas[id][mField] += 1; } });
                    if (report.executorIds && (!report.killerIds || report.killerIds.length === 0)) report.executorIds.forEach(id => { if (tempNinjas[id]) { tempNinjas[id][pField] += Number(report.pointsPerAttacker || report.totalPointsRaw || 0); tempNinjas[id][mField] += 1; } });
                    if (report.healerIds) report.healerIds.forEach(id => { if (tempNinjas[id]) { tempNinjas[id][pField] += Number(report.pointsPerHealer || report.totalPointsRaw || 0); tempNinjas[id][mField] += 1; } });
                };
                reportsData.forEach(r => processReport(r, false));
                eventReportsData.forEach(r => processReport(r, true));
                let applyBatch = writeBatch(db);
                Object.values(tempNinjas).forEach(n => {
                    if(n.id) applyBatch.update(doc(db, COLLECTIONS.NINJAS, n.id), {
                        rankPoints: isNaN(n.rankPoints) ? 0 : n.rankPoints,
                        missionsCompleted: isNaN(n.missionsCompleted) ? 0 : n.missionsCompleted,
                        eventPoints: isNaN(n.eventPoints) ? 0 : n.eventPoints,
                        eventMissionsCompleted: isNaN(n.eventMissionsCompleted) ? 0 : n.eventMissionsCompleted
                    });
                });
                await applyBatch.commit();
                if (!calledInternally) alert("✅ Ranks recalculados com sucesso!");
            } catch(e) { if(!calledInternally) alert("Erro: " + e.message); }
        }

        // ==========================================
        // RENDERIZAÇÃO: ALVOS
        // ==========================================
        window.renderTargetsTable = function(page = 1) {
            const tbody = document.getElementById('targets-scoreboard');
            if (!tbody) return;
            const targetsMap = {};
            [...reportsData, ...eventReportsData].forEach(report => {
                if (Array.isArray(report.targets) && report.targets.length > 0) {
                    report.targets.forEach(t => { if (t && t.name) { const n = t.name.trim().toLowerCase(); if (!targetsMap[n]) targetsMap[n] = { name: t.name.trim(), count: 0, totalBT: 0 }; targetsMap[n].count += 1; targetsMap[n].totalBT += (t.btBase || 0); } });
                } else if (report.targetName) {
                    const n = report.targetName.trim().toLowerCase(); if (!targetsMap[n]) targetsMap[n] = { name: report.targetName, count: 0, totalBT: 0 }; targetsMap[n].count += 1; targetsMap[n].totalBT += (report.btBase || report.totalPointsRaw || 0);
                }
            });
            const sortedTargets = Object.values(targetsMap).sort((a, b) => b.count - a.count || b.totalBT - a.totalBT);
            const totalPages = Math.ceil(sortedTargets.length / 10);
            if (page < 1) page = 1; if (page > totalPages && totalPages > 0) page = totalPages;
            tbody.innerHTML = '';
            if (sortedTargets.length === 0) { tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-4 text-center text-gray-500 italic">Nenhum alvo.</td></tr>`; const p = document.querySelector('.t-pag'); if(p) p.remove(); return; }
            sortedTargets.slice((page - 1) * 10, page * 10).forEach((t, i) => {
                tbody.innerHTML += `<tr class="hover:bg-gray-700/50"><td class="p-2 text-center">${getRankIcon((page-1)*10+i+1)}</td><td class="p-2 text-orange-300 capitalize">${t.name}</td><td class="p-2 text-red-400 font-bold">${t.count}x</td><td class="p-2 text-gray-300">${t.totalBT} BT Base</td></tr>`;
            });
            const cont = tbody.closest('.overflow-x-auto');
            if (cont && cont.parentElement) {
                let old = cont.parentElement.querySelector('.t-pag'); if (old) old.remove();
                if (totalPages > 1) {
                    const div = document.createElement('div'); div.className = 'flex justify-center gap-4 mt-4 p-2 t-pag';

        // ==========================================
        // RENDERIZAÇÃO: HISTÓRICO COM FILTROS
        // ==========================================
        window.renderReportsLogFiltered = function(isEvent = false, page = 1) {
            historyIsEvent = isEvent;
            const tbody = document.getElementById('reports-log');
            if (!tbody) return;
            const listToUse = isEvent ? eventReportsData : reportsData;

            const searchEl = document.getElementById('history-search');
            const dateEl = document.getElementById('history-date-filter');
            const searchTerm = (searchEl ? searchEl.value : historySearchTerm).trim().toLowerCase();
            const dateFilter = dateEl ? dateEl.value : historyDateFilter;
            historySearchTerm = searchTerm;
            historyDateFilter = dateFilter;

            let dateCut = null;
            const now = new Date();
            if (dateFilter === 'today') { dateCut = new Date(now.getFullYear(), now.getMonth(), now.getDate()); }
            else if (dateFilter === 'week') { dateCut = new Date(now - 7*24*60*60*1000); }
            else if (dateFilter === 'month') { dateCut = new Date(now.getFullYear(), now.getMonth(), 1); }

            let filtered = [...listToUse];
            if (searchTerm) {
                filtered = filtered.filter(d => {
                    const allMembers = [...(d.killerIds||[]), ...(d.assistIds||[]), ...(d.healerIds||[]), ...(d.executorIds||[])].join(' ').toLowerCase();
                    const allTargets = (d.targets ? d.targets.map(t=>t.name).join(' ') : (d.targetName||'')).toLowerCase();
                    return allMembers.includes(searchTerm) || allTargets.includes(searchTerm) || (d.reportId||'').toLowerCase().includes(searchTerm);
                });
            }
            if (dateCut) { filtered = filtered.filter(d => d.timestamp && new Date(d.timestamp) >= dateCut); }

            const sorted = filtered.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            const totalPages = Math.ceil(sorted.length / 10);
            if (page < 1) page = 1; if (page > totalPages && totalPages > 0) page = totalPages;

            tbody.innerHTML = '';
            if (sorted.length === 0) { tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-gray-500">Nenhum registro encontrado.</td></tr>`; const old = document.querySelector('.r-pag'); if(old) old.remove(); return; }

            sorted.slice((page-1)*10, page*10).forEach(d => {
                let formattedDate = d.timestamp ? new Date(d.timestamp).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
                let mTxt = '';
                if(d.killerIds?.length) mTxt += `<span class="text-red-400 text-xs block capitalize-name">Killer: ${d.killerIds.join(', ')}</span>`;
                if(d.assistIds?.length) mTxt += `<span class="text-orange-400 text-xs block capitalize-name">Assist: ${d.assistIds.join(', ')}</span>`;
                if(d.executorIds?.length && (!d.killerIds||!d.killerIds.length)) mTxt += `<span class="text-orange-400 text-xs block capitalize-name">Killer(Antigo): ${d.executorIds.join(', ')}</span>`;
                if(d.healerIds?.length) mTxt += `<span class="text-green-400 text-xs block capitalize-name">Heal: ${d.healerIds.join(', ')}</span>`;
                const tTxt = d.targets ? d.targets.map(t=>t.name).join(', ') : (d.targetName||'N/A');
                const btns = (isWriterMode||isMasterAdminMode) ? `<div class="mt-2 flex gap-2"><button onclick="window.editReport('${d.reportId}',${isEvent})" class="text-blue-400 bg-gray-900 py-1 px-2 rounded text-xs">✏️</button><button onclick="window.deleteReport('${d.reportId}',${isEvent})" class="text-red-500 bg-gray-900 py-1 px-2 rounded text-xs">🗑️</button></div>` : '';
                tbody.innerHTML += `<tr class="hover:bg-gray-700/50"><td class="p-3 text-xs font-mono align-top">${formattedDate}<br>${d.reportId}${btns}</td><td class="p-3 text-sm align-top">${mTxt}</td><td class="p-3 text-sm text-orange-300 capitalize align-top">${tTxt}</td><td class="p-3 text-sm text-white font-bold align-top">${d.totalPointsRaw||0} Pts</td></tr>`;
            });

            const cont = tbody.closest('.overflow-x-auto');
            if (cont && cont.parentElement) {
                let old = cont.parentElement.querySelector('.r-pag'); if (old) old.remove();
                if (totalPages > 1) {
                    const div = document.createElement('div'); div.className = 'flex justify-center gap-4 mt-4 r-pag';
                    div.innerHTML = `<button onclick="window.renderReportsLogFiltered(${isEvent},${page-1})" class="px-4 py-2 bg-gray-700 text-white rounded" ${page===1?'disabled':''}>Anterior</button><span class="p-2 text-gray-300 bg-gray-800 rounded">Pág ${page}/${totalPages}</span><button onclick="window.renderReportsLogFiltered(${isEvent},${page+1})" class="px-4 py-2 bg-gray-700 text-white rounded" ${page===totalPages?'disabled':''}>Próxima</button>`;
                    cont.parentElement.appendChild(div);
                }
            }
        }

        // ==========================================
        // RENDERIZAÇÃO: PERFIL DO NINJA (NOVO)
        // ==========================================
        window.renderNinjaProfile = function(filterId, page = 1) {
            const sumDiv = document.getElementById('guardian-summary');
            const histDiv = document.getElementById('profile-history-container');
            if (!filterId) { if(sumDiv) sumDiv.classList.add('hidden'); if(histDiv) histDiv.classList.add('hidden'); return; }
            const nData = ninjasData[filterId];
            if (!nData || !sumDiv) return;

            const all = [...reportsData, ...eventReportsData];
            let kC=0, aC=0, hC=0, mHist=[];
            const targetsCounter = {};

            all.forEach(r => {
                let part = false;
                const trg = r.targets?.length || 1;
                if (r.killerIds?.includes(filterId)) { kC += trg; part = true; }
                if (r.assistIds?.includes(filterId)) { aC += trg; part = true; }
                if (r.healerIds?.includes(filterId)) { hC += trg; part = true; }
                if (r.executorIds?.includes(filterId) && (!r.killerIds || !r.killerIds.includes(filterId))) { kC += trg; part = true; }
                if (part) {
                    mHist.push(r);
                    if (Array.isArray(r.targets)) {
                        r.targets.forEach(t => {
                            if (t.name) { const k = t.name.trim().toLowerCase(); targetsCounter[k] = (targetsCounter[k] || { name: t.name.trim(), count: 0 }); targetsCounter[k].count++; }
                        });
                    }
                }
            });

            const topTargets = Object.values(targetsCounter).sort((a,b) => b.count - a.count);
            const ranked = Object.values(ninjasData).filter(n => n.isActive && n.id).sort((a,b) => Number(b.rankPoints||0) - Number(a.rankPoints||0));
            const rankPos = ranked.findIndex(n => n.id === filterId) + 1;

            const total = kC + aC + hC || 1;
            const pctK = Math.round((kC / total) * 100);
            const pctA = Math.round((aC / total) * 100);
            const pctH = Math.round((hC / total) * 100);

            const parceiroMap = {};
            mHist.forEach(r => {
                const todos = [...(r.killerIds||[]), ...(r.assistIds||[]), ...(r.healerIds||[])];
                todos.forEach(id => {
                    if (id !== filterId) { parceiroMap[id] = (parceiroMap[id]||0) + 1; }
                });
            });
            const topParceiros = Object.entries(parceiroMap).sort((a,b) => b[1]-a[1]).slice(0,3);

            const avatar = nData.avatarUrl
                ? nData.avatarUrl
                : `https://ui-avatars.com/api/?name=${filterId}&background=1f2937&color=f87171&size=200&font-size=0.33&bold=true`;

            const discordBadge = nData.discordId
                ? `<span class="px-2 py-1 bg-indigo-900/50 text-indigo-300 rounded-full text-xs">🔗 Discord</span>`
                : '';
                
            const orgBadge = nData.org 
                ? `<span class="px-2 py-0.5 bg-blue-900/60 text-blue-400 rounded-full text-xs">${nData.org}</span>` 
                : '';
                
            const dateBadge = nData.joinDate 
                ? `<span class="px-2 py-0.5 bg-purple-900/60 text-purple-400 rounded-full text-xs">Entrou: ${new Date(nData.joinDate).toLocaleDateString('pt-BR', {timeZone:'UTC'})}</span>` 
                : '';

            sumDiv.innerHTML = `
            <div class="bg-gray-800 rounded-xl p-6 space-y-5">
                <div class="profile-header">
                    <img src="${avatar}" class="profile-avatar-sm" onerror="this.src='https://ui-avatars.com/api/?name=${filterId}&background=1f2937&color=f87171&size=200'">
                    <div class="flex-grow min-w-0">
                        <h3 class="text-2xl font-black text-white truncate capitalize-name">${filterId}</h3>
                        <div class="flex flex-wrap gap-2 mt-1 items-center">
                            <span class="px-2 py-0.5 ${nData.isActive ? 'bg-green-900/60 text-green-400' : 'bg-red-900/60 text-red-400'} rounded-full text-xs font-bold">${nData.isActive ? '🟢 Ativo' : '🔴 Inativo'}</span>
                            ${orgBadge}
                            ${dateBadge}
                            <span class="px-2 py-0.5 bg-gray-700 text-gray-300 rounded-full text-xs">${nData.element||'N/A'}</span>
                            ${discordBadge}
                            ${rankPos > 0 ? `<span class="px-2 py-0.5 bg-yellow-900/50 text-yellow-400 rounded-full text-xs font-bold">${getRankIcon(rankPos)} Rank Geral</span>` : ''}
                        </div>
                    </div>
                    <div class="profile-pts-block flex-shrink-0">
                        <div class="text-3xl font-black text-green-400">${Math.round(nData.rankPoints||0)}</div>
                        <div class="text-xs text-gray-400 mt-0.5">Pts Geral</div>
                        ${Number(nData.eventPoints||0) > 0 ? `<div class="text-lg font-bold text-yellow-400 mt-1">${Math.round(nData.eventPoints)} <span class="text-xs">Evento</span></div>` : ''}
                    </div>
                </div>

                <div>
                    <div class="profile-section-title">Estatísticas de Combate</div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div class="stat-card"><div class="stat-card-val text-white">${(nData.missionsCompleted||0)+(nData.eventMissionsCompleted||0)}</div><div class="stat-card-lbl">Caçadas</div></div>
                        <div class="stat-card"><div class="stat-card-val text-red-400">${kC}</div><div class="stat-card-lbl">Como Killer</div></div>
                        <div class="stat-card"><div class="stat-card-val text-orange-400">${aC}</div><div class="stat-card-lbl">Assists</div></div>
                        <div class="stat-card"><div class="stat-card-val text-green-400">${hC}</div><div class="stat-card-lbl">Heals</div></div>
                    </div>
                </div>

                <div>
                    <div class="profile-section-title">Perfil de Combate — Killer ${pctK}% · Assist ${pctA}% · Heal ${pctH}%</div>
                    <div class="combat-bar">
                        <div class="combat-bar-seg bg-red-600" style="width:${pctK}%"></div>
                        <div class="combat-bar-seg bg-orange-500" style="width:${pctA}%"></div>
                        <div class="combat-bar-seg bg-green-600" style="width:${pctH}%"></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-gray-900 rounded-lg p-4">
                        <div class="profile-section-title">Alvos Mais Eliminados</div>
                        ${topTargets.length === 0 ? `<p class="text-gray-500 text-sm">Nenhum dado.</p>` :
                            topTargets.slice(0,3).map((t,i) => `
                            <div class="flex justify-between items-center py-1 border-b border-gray-800 last:border-0">
                                <span class="text-sm text-orange-300 capitalize">${['🥇','🥈','🥉'][i]||''} ${t.name}</span>
                                <span class="text-xs font-bold text-red-400">${t.count}x</span>
                            </div>`).join('')}
                    </div>
                    <div class="bg-gray-900 rounded-lg p-4">
                        <div class="profile-section-title">Parceiros Frequentes</div>
                        ${topParceiros.length === 0 ? `<p class="text-gray-500 text-sm">Nenhum dado.</p>` :
                            topParceiros.map(([id, count]) => `
                            <div class="flex justify-between items-center py-1 border-b border-gray-800 last:border-0">
                                <span class="text-sm text-blue-300 cursor-pointer hover:underline capitalize-name" onclick="document.getElementById('ninja-filter-select').value='${id}';window.renderNinjaProfile('${id}',1)">${id}</span>
                                <span class="text-xs text-gray-400">${count} missões juntos</span>
                            </div>`).join('')}
                    </div>
                </div>
            </div>`;

            sumDiv.classList.remove('hidden');

            const tbody = document.getElementById('profile-history-log');
            tbody.innerHTML = '';
            mHist.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            const totalPages = Math.ceil(mHist.length / 10);
            if (page < 1) page = 1; if (page > totalPages && totalPages > 0) page = totalPages;

            if (mHist.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-gray-500">Nenhuma missão registrada.</td></tr>`;
                const p = document.querySelector('.p-pag'); if(p) p.remove();
            } else {
                mHist.slice((page-1)*10, page*10).forEach(d => {
                    let mTxt = '';
                    if(d.killerIds?.length) mTxt += `<span class="text-red-400 text-xs block capitalize-name">Killer: ${d.killerIds.join(', ')}</span>`;
                    if(d.assistIds?.length) mTxt += `<span class="text-orange-400 text-xs block capitalize-name">Assist: ${d.assistIds.join(', ')}</span>`;
                    if(d.executorIds?.length && (!d.killerIds||!d.killerIds.length)) mTxt += `<span class="text-orange-400 text-xs block capitalize-name">Killer(Antigo): ${d.executorIds.join(', ')}</span>`;
                    if(d.healerIds?.length) mTxt += `<span class="text-green-400 text-xs block capitalize-name">Heal: ${d.healerIds.join(', ')}</span>`;
                    const tag = d.isEvent ? '<span class="bg-yellow-900 text-yellow-400 text-[10px] px-1 rounded block w-max mt-1">EVENTO</span>' : '';
                    const roleTag = d.killerIds?.includes(filterId) ? '<span class="text-red-400 text-[10px] font-bold">[K]</span>'
                        : d.assistIds?.includes(filterId) ? '<span class="text-orange-400 text-[10px] font-bold">[A]</span>'
                        : d.healerIds?.includes(filterId) ? '<span class="text-green-400 text-[10px] font-bold">[H]</span>' : '';
                    tbody.innerHTML += `<tr class="hover:bg-gray-700/50">
                        <td class="p-2 text-xs font-mono align-top">${new Date(d.timestamp).toLocaleDateString('pt-BR')}<br>${d.reportId}${tag}</td>
                        <td class="p-2 text-sm align-top">${mTxt}</td>
                        <td class="p-2 text-sm text-orange-300 capitalize align-top">${d.targets ? d.targets.map(t=>t.name).join(', ') : (d.targetName||'N/A')}</td>
                        <td class="p-2 text-sm text-white font-bold align-top">${d.totalPointsRaw||0} Pts ${roleTag}</td>
                    </tr>`;
                });
                const cont = tbody.closest('.overflow-x-auto');
                if (cont && cont.parentElement) {
                    let old = cont.parentElement.querySelector('.p-pag'); if (old) old.remove();
                    if (totalPages > 1) {
                        const div = document.createElement('div'); div.className = 'flex justify-center gap-4 mt-4 p-pag';
                        div.innerHTML = `<button onclick="window.renderNinjaProfile('${filterId}',${page-1})" class="px-4 py-2 bg-gray-700 text-white rounded" ${page===1?'disabled':''}>Anterior</button><span class="p-2 text-gray-300 bg-gray-800 rounded">Pág ${page}/${totalPages}</span><button onclick="window.renderNinjaProfile('${filterId}',${page+1})" class="px-4 py-2 bg-gray-700 text-white rounded" ${page===totalPages?'disabled':''}>Próxima</button>`;
                        cont.parentElement.appendChild(div);
                    }
                }
            }
            histDiv.classList.remove('hidden');
        }

                                <th class="p-3 text-left text-xs">Data/ID</th>
                                <th class="p-3 text-left text-xs">Membros</th>
                                <th class="p-3 text-left text-xs">Alvos</th>
                                <th class="p-3 text-left text-xs">Pontos</th>
                            </tr></thead><tbody id="profile-history-log" class="divide-y divide-gray-700"></tbody></table>
                            </div>
                        </div>
                    </section>`;
                    break;

                case 'audit_panel':
                    contentDiv.innerHTML = window.renderAuditPanel();
                    break;

                case 'report_form':
                    contentDiv.innerHTML = `<section class="bg-gray-800 p-6 rounded-xl space-y-6">
                        <h2 class="text-3xl font-semibold border-b pb-3 border-gray-700 text-red-400 text-center">Registro de Missão</h2>
                        <div class="bg-gray-900 p-4 rounded-lg">
                            <label class="block text-sm text-gray-300 mb-2">Destino:</label>
                            <div class="flex gap-6">
                                <label class="flex items-center space-x-2"><input type="radio" name="report_type" value="daily" checked class="h-5 w-5" onchange="window.toggleEventOptions(); window.updateDescriptionPreview()"><span class="text-white font-bold">Geral</span></label>
                                <label class="flex items-center space-x-2"><input type="radio" name="report_type" value="event" class="h-5 w-5" onchange="window.toggleEventOptions(); window.updateDescriptionPreview()"><span class="text-yellow-400 font-bold">Evento 🌟</span></label>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-gray-300">Killer</label>
                                <div class="flex gap-2"><select id="new-killer-id-select" class="flex-grow p-2 rounded bg-gray-700 text-white capitalize-name"></select><button onclick="window.addExecutor('killer')" class="px-4 bg-red-600 text-white rounded font-bold">Add</button></div>
                                <div id="killers-tag-container" class="executor-list-container mt-2"></div>
                            </div>
                            <div>
                                <label class="block text-sm text-gray-300">Assist</label>
                                <div class="flex gap-2"><select id="new-assist-id-select" class="flex-grow p-2 rounded bg-gray-700 text-white capitalize-name"></select><button onclick="window.addExecutor('assist')" class="px-4 bg-orange-600 text-white rounded font-bold">Add</button></div>
                                <div id="assists-tag-container" class="executor-list-container mt-2"></div>
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-sm text-gray-300">Healer</label>
                                <div class="flex gap-2"><select id="new-healer-id-select" class="flex-grow p-2 rounded bg-gray-700 text-white capitalize-name"></select><button onclick="window.addExecutor('healer')" class="px-4 bg-green-600 text-white rounded font-bold">Add</button></div>
                                <div id="healers-tag-container" class="executor-list-container mt-2"></div>
                            </div>
                        </div>
                        <div class="space-y-4 border-t border-gray-700 pt-4">
                            <div class="flex justify-between">
                                <h3 class="text-xl font-bold text-red-400">Alvos</h3>
                                <button onclick="window.addTargetEntry()" class="py-1 px-3 bg-blue-600 text-white rounded font-bold">➕ Add Alvo</button>
                            </div>
                            <div id="targets-container" class="space-y-4"></div>
                        </div>
                        <div class="space-y-2 border-t border-gray-700 pt-4">
                            <input id="report-id-display" type="text" readonly class="w-full p-2 bg-gray-600 text-red-300 font-mono cursor-not-allowed">
                        </div>
                        <div class="space-y-2 pt-4">
                            <input id="total-points" type="text" readonly class="w-full p-2 bg-gray-600 text-green-400 font-bold cursor-not-allowed">
                        </div>
                        <button id="submit-report" class="w-full py-3 mt-4 bg-red-600/50 text-white font-bold rounded cursor-not-allowed" disabled onclick="window.submitReport()">Salvar Caçada</button>
                    </section>`;

                    if (!isWriterMode) { contentDiv.innerHTML = '<p class="text-center text-red-500 pt-8 font-bold text-xl">Faça Login na aba Acesso Restrito.</p>'; break; }
                    if (!window.isEditingMode && !processingPendingId) {
                        selectedKillers = []; selectedAssists = []; selectedHealers = []; targetEntryCount = 0;
                        window.addTargetEntry(); window.updateExecutorSelect(); window.updateExecutorTags(); window.generateReportId(); window.updateDescriptionPreview();
                    }
                    break;

                case 'admin_panel':
                    const accessStatus = isMasterAdminMode
                        ? `<div class="text-center text-green-400 font-bold text-lg p-2">✅ MASTER ADMIN ATIVO</div>`
                        : (isWriterMode
                            ? `<div class="text-yellow-400 font-bold text-lg p-2">✅ ANBU ESCRITOR ATIVO</div>`
                            : `<div class="text-center text-red-400 font-bold text-lg p-2">❌ ACESSO INATIVO</div>`);

                    contentDiv.innerHTML = `
                    <section class="space-y-4 pt-4 pb-4 bg-gray-900 p-6 rounded-xl border border-red-500/50">
                        <h2 class="text-2xl font-bold text-red-400 text-center">Login Restrito</h2>
                        <div id="admin-status-display">${accessStatus}</div>
                        <div class="flex flex-col md:flex-row gap-4 max-w-lg mx-auto">
                            <input id="access-id-input" type="text" placeholder="Seu ID" class="flex-grow p-2.5 rounded-lg bg-gray-700 text-white">
                            <input id="access-key-input" type="password" placeholder="Sua Senha" class="flex-grow p-2.5 rounded-lg bg-gray-700 text-white">
                            <button class="w-full md:w-auto py-2 px-4 bg-red-600 text-white font-bold rounded-lg" onclick="window.checkAccessKey()">Logar</button>
                        </div>
                    </section>

                    <section class="space-y-4 pt-8 pb-16 admin-only hidden">
                        <h2 class="text-3xl font-bold text-yellow-400 text-center">Cadastro: ANBUs</h2>
                        <div id="add-ninja-form" class="bg-gray-700 p-4 rounded-lg flex flex-col sm:flex-row gap-4 flex-wrap">
                            <input id="new-ninja-id" type="text" placeholder="ID do Novo ANBU" class="flex-grow p-2.5 rounded-lg bg-gray-800 text-white capitalize-name">
                            <input id="new-ninja-org" type="text" placeholder="Organização (Ex: ANBU)" class="w-full sm:w-40 p-2.5 rounded-lg bg-gray-800 text-white">
                            <input id="new-ninja-date" type="date" class="w-full sm:w-40 p-2.5 rounded-lg bg-gray-800 text-white">
                            
                            <select id="new-ninja-mastery-1" class="w-full sm:w-32 p-2.5 rounded-lg bg-gray-800 text-white">
                                ${MAESTRIAS_OPCOES.map(m=>`<option value="${m}">${m}</option>`).join('')}
                            </select>
                            <select id="new-ninja-mastery-2" class="w-full sm:w-32 p-2.5 rounded-lg bg-gray-800 text-white">
                                <option value="">2ª (Opc)</option>
                                ${MAESTRIAS_OPCOES.map(m=>`<option value="${m}">${m}</option>`).join('')}
                            </select>
                            <button class="py-2.5 px-4 bg-yellow-600 text-white font-bold rounded-lg" onclick="window.addNinja()">Cadastrar</button>
                        </div>
                        <div class="bg-gray-800 p-4 rounded-xl overflow-x-auto">
                            <table class="min-w-full"><thead class="bg-gray-700"><tr>
                                <th class="p-3 text-left text-xs">Membro</th>
                                <th class="p-3 text-left text-xs">Maestria</th>
                                <th class="p-3 text-left text-xs">Discord ID</th>
                                <th class="p-3 text-left text-xs">Status</th>
                                <th class="p-3 text-right text-xs admin-only hidden">Ações</th>
                            </tr></thead><tbody id="ninjas-cadastro" class="divide-y divide-gray-700"></tbody></table>
                        </div>
                    </section>

                    <div id="writer-tools" class="pt-8 space-y-4 writer-only hidden">
                        <h3 class="text-xl font-bold text-red-400 border-b border-red-400/50 pb-2">Manutenção</h3>
                        <button onclick="window.recalculateAllRanks()" class="w-full py-2 px-4 bg-red-600 text-white font-bold rounded-lg text-lg">🔄 Recalcular Todos os Ranks</button>
                    </div>
                    <div id="admin-tools" class="pt-4 space-y-4 admin-only hidden">
                        <h3 class="text-xl font-bold text-red-500 border-b border-red-500/50 pb-2">Exclusão</h3>
                        <button onclick="window.clearReportsLog()" class="w-full py-2 px-4 bg-red-700 text-white font-bold rounded-lg">⚔️ Excluir Histórico de Registros (ZERA Ranks)</button>
                    </div>`;

                    window.renderNinjasTable();
                    break;
            }

            document.querySelectorAll('.writer-only').forEach(el => isWriterMode ? el.classList.remove('hidden') : el.classList.add('hidden'));
            document.querySelectorAll('.admin-only').forEach(el => isMasterAdminMode ? el.classList.remove('hidden') : el.classList.add('hidden'));
        }

        // ==========================================
        // FIREBASE INIT
        // ==========================================
        async function initializeFirebase() {
            try {
                app = initializeApp(CUSTOM_FIREBASE_CONFIG);
                db = getFirestore(app);
                auth = getAuth(app);
                await signInAnonymously(auth);
                document.getElementById('auth-info').textContent = 'Conexão Segura Estabelecida';

                onSnapshot(collection(db, COLLECTIONS.ACCESS_KEYS), (s) => {
                    accessKeysData = {}; s.forEach(d => accessKeysData[d.id] = d.data());
                    if (currentPage === 'admin_panel') window.renderPage(currentPage);
                });

                onSnapshot(collection(db, COLLECTIONS.NINJAS), (s) => {
                    ninjasData = {}; s.forEach(d => ninjasData[d.id] = d.data());
                    if (currentPage === 'scoreboard' || currentPage === 'event_panel') window.renderScoreboard(currentPage === 'event_panel');
                    if (currentPage === 'admin_panel') window.renderNinjasTable();
                    if (currentPage === 'report_form') window.updateExecutorSelect();
                    if (currentPage === 'audit_panel') window.renderPage('audit_panel');
                    if (currentPage === 'ninja_panel') {
                        const sel = document.getElementById('ninja-filter-select');
                        const v = sel ? sel.value : '';
                        window.renderPage('ninja_panel');
                        if(v) setTimeout(() => { document.getElementById('ninja-filter-select').value = v; window.renderNinjaProfile(v, 1); }, 50);
                    }
                });

                onSnapshot(collection(db, COLLECTIONS.REPORTS), (s) => {
                    reportsData = []; s.forEach(d => reportsData.push(d.data()));
                    window.updateTargetSuggestions();
                    if (currentPage === 'reports_log') window.renderReportsLogFiltered(false, 1);
                    if (currentPage === 'targets_log') window.renderTargetsTable(1);
                    if (currentPage === 'scoreboard') window.renderScoreboard(false);
                    if (currentPage === 'ninja_panel') { const sel = document.getElementById('ninja-filter-select'); if(sel?.value) window.renderNinjaProfile(sel.value, 1); }
                });

                onSnapshot(collection(db, COLLECTIONS.EVENT_REPORTS), (s) => {
                    eventReportsData = []; s.forEach(d => eventReportsData.push(d.data()));
                    window.updateTargetSuggestions();
                    if (currentPage === 'reports_log') window.renderReportsLogFiltered(true, 1);
                    if (currentPage === 'targets_log') window.renderTargetsTable(1);
                    if (currentPage === 'event_panel') window.renderScoreboard(true);
                    if (currentPage === 'ninja_panel') { const sel = document.getElementById('ninja-filter-select'); if(sel?.value) window.renderNinjaProfile(sel.value, 1); }
                });

                onSnapshot(collection(db, COLLECTIONS.PENDING_REPORTS), (s) => {
                    pendingData = []; s.forEach(d => pendingData.push({ id: d.id, ...d.data() }));
                    const badge = document.getElementById('audit-badge');
                    if (badge) {
                        badge.textContent = pendingData.length;
                        pendingData.length > 0 ? badge.classList.remove('hidden') : badge.classList.add('hidden');
                    }
                    if (currentPage === 'audit_panel') window.renderPage('audit_panel');
                });

                window.renderPage(currentPage);
            } catch (error) {
                document.getElementById('status').textContent = `❌ Erro: ${error.message}`;
                document.getElementById('status').classList.remove('hidden');
            }
        }

        window.checkAccessKey = function() {
            const id = document.getElementById('access-id-input').value.trim();
            const key = document.getElementById('access-key-input').value.trim();
            if (accessKeysData[id] && accessKeysData[id].key === key) {
                currentAccessId = id;
                isMasterAdminMode = accessKeysData[id].level === 'master_admin';
                isWriterMode = true;
                window.renderPage('admin_panel');
            } else { alert("Senha incorreta"); }
        }

        window.logout = function() {
            currentAccessId = 'ANONYMOUS'; isMasterAdminMode = false; isWriterMode = false;
            window.renderPage('home');
        }

        initializeFirebase();
    </script>
</body>
</html>
