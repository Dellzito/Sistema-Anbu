<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Registro - Esquadrão ANBU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        .remove-btn, .edit-btn, .admin-only, .writer-only { transition: all 0.1s ease-in-out; }
        .executor-list-container {
            min-height: 50px; padding: 8px; border: 1px solid #4b5563; 
            border-radius: 8px; background-color: #374151; 
            display: flex; flex-wrap: wrap; gap: 6px;
        }
        .executor-tag {
            display: flex; align-items: center; padding: 4px 8px;
            border-radius: 9999px; font-size: 0.875rem; font-weight: 600;
            color: #fff;
        }
        .killer-tag { background-color: #dc2626; } /* red-600 */
        .assist-tag { background-color: #d97706; } /* yellow-600 */
        .healer-tag { background-color: #059669; } /* green-600 */
        
        .executor-remove-btn { margin-left: 6px; cursor: pointer; opacity: 0.8; }
        .executor-remove-btn:hover { opacity: 1; }
        .nav-link { cursor: pointer; padding: 10px 15px; font-weight: 600; transition: all 0.2s; text-align: center; }
        .nav-link:hover:not(.active) { background-color: #1e293b; }
        .nav-link.active { color: #f87171; border-bottom: 2px solid #f87171; }
    </style>
</head>
<body class="p-4 sm:p-8 text-gray-100">

    <div id="app" class="max-w-6xl mx-auto space-y-8">
        <header class="pb-4 border-b border-red-700/50">
            <h1 id="main-title" class="text-4xl font-bold text-red-500 text-center mb-4">📜 Sistema de Registro — Esquadrão ANBU</h1>
            <nav class="flex flex-wrap justify-center bg-gray-900 rounded-xl shadow-lg p-1 gap-2">
                <a class="nav-link" onclick="window.renderPage('home')" id="nav-home">Home</a>
                <a class="nav-link" onclick="window.renderPage('scoreboard')" id="nav-scoreboard">Ver Rank</a>
                <a class="nav-link" onclick="window.renderPage('reports_log')" id="nav-reports_log">Histórico de BTs</a>
                <a class="nav-link" onclick="window.renderPage('targets_log')" id="nav-targets_log">Alvos Eliminados</a>
                <a class="nav-link" onclick="window.renderPage('ninja_panel')" id="nav-ninja_panel">Perfil do ANBU</a>
                <a class="nav-link" onclick="window.renderPage('report_form')" id="nav-report_form">Registrar BT</a>
                <a class="nav-link" onclick="window.renderPage('admin_panel')" id="nav-admin_panel">Autorização</a>
            </nav>
        </header>
        
        <div id="content" class="min-h-[60vh]"></div>

        <div id="status" class="text-center p-4 rounded-lg hidden"></div>
        <div id="auth-info" class="text-sm text-center text-yellow-500">Conectando ao Firebase...</div>
        
        <datalist id="known-targets"></datalist>
    </div>

    <div id="custom-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 hidden items-center justify-center p-4 z-50">
        <div id="modal-content" class="bg-gray-800 rounded-xl shadow-2xl p-6 w-full max-w-lg space-y-4 transform scale-95 transition-all">
            <h3 id="modal-title" class="text-xl font-bold text-red-400">Título</h3>
            <p id="modal-message" class="text-gray-300">Mensagem</p>
            <div id="modal-input-container" class="space-y-3 hidden">
                <label id="input-label-1" class="block text-sm font-medium text-gray-300 hidden">Input 1</label>
                <input type="text" id="modal-input-1" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white hidden" />
                <select id="modal-select-1" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white hidden"></select>

                <label id="input-label-2" class="block text-sm font-medium text-gray-300 hidden">Input 2</label>
                <select id="modal-select-2" class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 text-white hidden"></select>
                
                <span id="modal-error" class="text-red-400 text-sm hidden"></span>
            </div>
            <div id="modal-actions" class="flex justify-end gap-3 pt-2">
                <button id="modal-cancel-btn" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white font-semibold rounded-lg transition duration-150">Cancelar</button>
                <button id="modal-confirm-btn" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition duration-150">Confirmar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, doc, setDoc, onSnapshot, collection, writeBatch, 
            updateDoc, deleteDoc, getDocs, setLogLevel, addDoc 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURAÇÕES DO FIREBASE
        const CUSTOM_FIREBASE_CONFIG = {
            apiKey: "AIzaSyC-QaPr7O6RkWR3vpXCg4zrnUWw3TzU9ss",
            authDomain: "g-2cb53.firebaseapp.com",
            projectId: "g-2cb53",
            storageBucket: "g-2cb53.firebasestorage.app",
            messagingSenderId: "292095146978",
            appId: "1:292095146978:web:836d833230907d081017bb"
        };
        
        const appId = CUSTOM_FIREBASE_CONFIG.projectId;
        const firebaseConfig = CUSTOM_FIREBASE_CONFIG;
        
        let isMasterAdminMode = false; 
        let isWriterMode = false; 
        let currentPage = 'home';
        let currentAccessId = 'ANONYMOUS'; 
        
        let app, db, auth;
        let currentReportId = ''; 
        
        let selectedKillers = []; 
        let selectedAssists = []; 
        let selectedHealers = []; 
        
        let targetEntryCount = 0; 
        window.isEditingMode = false; 
        
        let ninjasData = {}; 
        let reportsData = []; 
        let accessKeysData = {}; 
        
        const COLLECTIONS = {
            REPORTS: `artifacts/${appId}/public/data/reports`,
            NINJAS: `artifacts/${appId}/public/data/ninjas`, 
            ACCESS_KEYS: `artifacts/${appId}/public/data/access_keys`, 
            AUDIT_LOG: `artifacts/${appId}/users/audit_user_log/audit_events` 
        };

        const MAESTRIAS_OPCOES = ["Fogo", "Água", "Vento", "Terra", "Raio", "Med (Chakra)", "Med (Int)", "WM", "TAI"];

        window.logAction = async function(action, details) {
            if (!db) return;
            try {
                await addDoc(collection(db, COLLECTIONS.AUDIT_LOG), {
                    timestamp: new Date().toISOString(),
                    actorAccessId: currentAccessId,
                    action: action,
                    details: details,
                    level: isMasterAdminMode ? 'MASTER_ADMIN' : (isWriterMode ? 'WRITER' : 'ANON')
                });
            } catch (e) { console.error(e); }
        }

        function getRankIcon(rank) {
            if (rank === 1) return '🥇';
            if (rank === 2) return '🥈';
            if (rank === 3) return '🥉';
            return `#${rank}`;
        }
        
        function normalizeId(id) {
            return id.trim().toLowerCase();
        }
        
        let resolveModalPromise = null; 
        window.openCustomModal = function(title, message, type, data = {}) {
            return new Promise(resolve => {
                resolveModalPromise = resolve;
                const modal = document.getElementById('custom-modal');
                const modalTitle = document.getElementById('modal-title');
                const modalMessage = document.getElementById('modal-message');
                const confirmBtn = document.getElementById('modal-confirm-btn');
                const cancelBtn = document.getElementById('modal-cancel-btn');
                
                const inputContainer = document.getElementById('modal-input-container');
                const input1 = document.getElementById('modal-input-1');
                const select1 = document.getElementById('modal-select-1');
                const select2 = document.getElementById('modal-select-2');
                const label1 = document.getElementById('input-label-1');
                const label2 = document.getElementById('input-label-2');

                modalTitle.textContent = title;
                modalMessage.textContent = message;
                
                inputContainer.classList.add('hidden');
                input1.classList.add('hidden');
                select1.classList.add('hidden');
                select2.classList.add('hidden');
                label1.classList.add('hidden');
                label2.classList.add('hidden');
                
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
                confirmBtn.classList.remove('bg-red-600', 'bg-orange-600');
                confirmBtn.classList.add('bg-blue-600');

                if (type === 'confirm') {
                    confirmBtn.textContent = 'Confirmar';
                    confirmBtn.classList.remove('bg-blue-600');
                    confirmBtn.classList.add('bg-red-600');
                } else if (type === 'ninjaEdit') {
                    const statusText = data.isActive ? 'Ativo' : 'Inativo';
                    const newStatusText = data.isActive ? 'INATIVO' : 'ATIVO';
                    modalMessage.innerHTML = `O ANBU **${data.id}** está atualmente <span class="font-bold ${data.isActive ? 'text-green-400' : 'text-red-400'}">${statusText}</span>. Deseja alternar o status para **${newStatusText}**?`;
                    confirmBtn.textContent = `Alternar Status`;
                    confirmBtn.classList.add('bg-orange-600'); 
                } else if (type === 'masteryEdit') {
                    inputContainer.classList.remove('hidden');
                    
                    label1.textContent = '1ª Maestria:';
                    label1.classList.remove('hidden');
                    select1.classList.remove('hidden');
                    select1.innerHTML = MAESTRIAS_OPCOES.map(m => `<option value="${m}">${m}</option>`).join('');
                    if (data.m1) select1.value = data.m1;

                    label2.textContent = '2ª Maestria (Opcional):';
                    label2.classList.remove('hidden');
                    select2.classList.remove('hidden');
                    select2.innerHTML = '<option value="">-- Nenhuma --</option>' + MAESTRIAS_OPCOES.map(m => `<option value="${m}">${m}</option>`).join('');
                    if (data.m2) select2.value = data.m2;

                    confirmBtn.textContent = `Salvar Maestrias`;
                    confirmBtn.onclick = () => closeCustomModal({ m1: select1.value, m2: select2.value });
                }

                cancelBtn.onclick = () => closeCustomModal(false);
                if (type !== 'masteryEdit') {
                    confirmBtn.onclick = () => closeCustomModal(true);
                }

                modal.classList.remove('hidden');
                modal.classList.add('flex');
            });
        }

        function closeCustomModal(result) {
            const modal = document.getElementById('custom-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            if (resolveModalPromise) {
                resolveModalPromise(result);
                resolveModalPromise = null;
            }
        }
        
        window.updateTargetSuggestions = function() {
            const dataList = document.getElementById('known-targets');
            if (!dataList) return;

            const targetsMap = {};
            reportsData.forEach(report => {
                if (report.targets && report.targets.length > 0) {
                    report.targets.forEach(t => {
                        if (t.name) {
                            const lower = t.name.trim().toLowerCase();
                            if (!targetsMap[lower]) targetsMap[lower] = t.name.trim();
                        }
                    });
                } else if (report.targetName) {
                    const lower = report.targetName.trim().toLowerCase();
                    if (!targetsMap[lower]) targetsMap[lower] = report.targetName.trim();
                }
            });

            const sortedTargets = Object.values(targetsMap).sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
            dataList.innerHTML = sortedTargets.map(t => `<option value="${t}">`).join('');
        }

        window.addTargetEntry = function() {
            const container = document.getElementById('targets-container');
            if (!container) return;
            
            targetEntryCount++;
            const targetId = `target-${targetEntryCount}`;
            
            const html = `
                <div id="${targetId}" class="target-entry bg-gray-700 p-4 rounded-lg border border-gray-600 space-y-3 relative mb-4">
                    <button type="button" onclick="window.removeTargetEntry('${targetId}')" class="absolute top-2 right-2 text-red-400 hover:text-red-500 font-bold" title="Remover Alvo">✖</button>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-300">Alvo Morto (Nick)</label>
                            <input type="text" list="known-targets" placeholder="Ex: inimigo_xyz" class="target-name w-full p-2.5 rounded-lg bg-gray-800 border border-gray-600 focus:ring-red-500 text-white shadow-inner" oninput="window.updateDescriptionPreview()">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300">BT Base</label>
                            <input type="number" min="0" placeholder="Ex: 103" class="target-bt w-full p-2.5 rounded-lg bg-gray-800 border border-gray-600 focus:ring-red-500 text-white shadow-inner font-bold text-lg" oninput="window.updateDescriptionPreview()">
                        </div>
                    </div>

                    <div class="flex flex-wrap gap-4 mt-2 pt-2 border-t border-gray-600">
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" class="target-chk-special form-checkbox h-4 w-4 text-red-600 bg-gray-800 border-gray-600 rounded focus:ring-red-500" onchange="window.updateDescriptionPreview()">
                            <span class="text-gray-200 text-sm">É Kage? (BT x3)</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" class="target-chk-org form-checkbox h-4 w-4 text-red-600 bg-gray-800 border-gray-600 rounded focus:ring-red-500" onchange="window.updateDescriptionPreview()">
                            <span class="text-gray-200 text-sm">ORG Especial (+100 Pts)</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" class="target-chk-trashtalk form-checkbox h-4 w-4 text-red-600 bg-gray-800 border-gray-600 rounded focus:ring-red-500" onchange="window.updateDescriptionPreview()">
                            <span class="text-gray-200 text-sm">Trash Talk? (+20 Pts)</span>
                        </label>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            window.updateDescriptionPreview();
        }

        window.removeTargetEntry = function(targetId) {
            const el = document.getElementById(targetId);
            if (el) {
                el.remove();
                window.updateDescriptionPreview();
            }
        }

        function _gatherReportData() {
            const targetEntries = document.querySelectorAll('.target-entry');
            let totalPointsRaw = 0;
            const targetsData = [];

            targetEntries.forEach((entry, index) => {
                const name = entry.querySelector('.target-name').value.trim() || `Alvo ${index + 1}`;
                let btBase = parseInt(entry.querySelector('.target-bt').value || '0', 10);
                if (isNaN(btBase)) btBase = 0;

                const isSpecial = entry.querySelector('.target-chk-special').checked;
                const isOrg = entry.querySelector('.target-chk-org').checked;
                const isTrashTalk = entry.querySelector('.target-chk-trashtalk').checked;

                let targetTotal = btBase;
                if (isSpecial) targetTotal *= 3;
                if (isOrg) targetTotal += 100;
                if (isTrashTalk) targetTotal += 20;

                totalPointsRaw += targetTotal;

                targetsData.push({
                    name: name,
                    btBase: btBase,
                    isSpecial: isSpecial,
                    isOrg: isOrg,
                    isTrashTalk: isTrashTalk,
                    total: targetTotal
                });
            });

            const pointsPerKiller = totalPointsRaw;
            const pointsPerHealer = totalPointsRaw; 
            
            const assistsCount = selectedAssists.length;
            // MATEMÁTICA CORRIGIDA: Math.floor garante que 500 / 3 = 166 (Arredondamento para baixo)
            const pointsPerAssist = assistsCount > 0 ? Math.floor(totalPointsRaw / 3) : 0;

            return {
                reportId: currentReportId,
                targets: targetsData, 
                killerIds: selectedKillers,
                assistIds: selectedAssists,
                healerIds: selectedHealers,
                totalPointsRaw: totalPointsRaw,
                pointsPerKiller: pointsPerKiller,
                pointsPerAssist: pointsPerAssist,
                pointsPerHealer: pointsPerHealer,
                timestamp: new Date().toISOString()
            };
        }

        window.generateReportId = function() {
            const reportIdElement = document.getElementById('report-id-display');
            if (!reportIdElement) return;
            const datePart = new Date().toISOString().slice(0,10).replace(/-/g,'');
            const uuidPart = crypto.randomUUID().substring(0, 8);
            currentReportId = `BT-${datePart}-${uuidPart}`;
            reportIdElement.value = currentReportId;
        }

        window.calculateTotalPoints = function() {
            const data = _gatherReportData();
            const totalPointsInput = document.getElementById('total-points');
            const submitBtn = document.getElementById('submit-report');

            if (!data || !totalPointsInput || !submitBtn) return;
            
            totalPointsInput.value = `Soma: ${data.totalPointsRaw} (Killer: ${data.pointsPerKiller} pts | Assists: ${data.pointsPerAssist} pts | Healers: ${data.pointsPerHealer} pts)`;

            const hasPartyMembers = (data.killerIds.length + data.assistIds.length + data.healerIds.length) > 0;
            const hasTargets = data.targets.length > 0;
            const isReady = isWriterMode && hasPartyMembers && hasTargets && data.totalPointsRaw > 0; 
            
            submitBtn.disabled = !isReady;
            if (isReady) {
                 submitBtn.classList.remove('bg-red-600/50', 'cursor-not-allowed');
                 submitBtn.classList.add('bg-red-600', 'hover:bg-red-700');
            } else {
                 submitBtn.classList.add('bg-red-600/50', 'cursor-not-allowed');
                 submitBtn.classList.remove('bg-red-600', 'hover:bg-red-700');
            }
        }
        
        window.updateDescriptionPreview = function() {
            const previewDiv = document.getElementById('description-preview');
            if (!previewDiv) return;

            const data = _gatherReportData();
            let previewText = ``;
            
            if (data.targets.length > 0) {
                previewText += `Alvos (${data.targets.length}): ` + data.targets.map(t => `${t.name} (${t.total} pts)`).join(', ') + `. `;
            } else {
                previewText += `[Nenhum alvo adicionado]. `;
            }

            if (data.killerIds.length > 0) previewText += `Killer: ${data.killerIds.join(', ')} (${data.pointsPerKiller} pts). `;
            if (data.assistIds.length > 0) previewText += `Assistência: ${data.assistIds.join(', ')} (${data.pointsPerAssist} pts/cada). `;
            if (data.healerIds.length > 0) previewText += `Healers: ${data.healerIds.join(', ')} (${data.pointsPerHealer} pts). `;
            
            if (data.killerIds.length === 0 && data.assistIds.length === 0 && data.healerIds.length === 0) {
                previewText += `[Nenhum ANBU selecionado]. `;
            }

            previewText += `=> TOTAL DA CAÇADA: ${data.totalPointsRaw} Pts.`;
            previewDiv.textContent = previewText.trim();
            window.calculateTotalPoints();
        }

        window.submitReport = async function() {
            if (!isWriterMode) return;

            const data = _gatherReportData();
            const statusElement = document.getElementById('status');

            if (!data || (data.killerIds.length === 0 && data.assistIds.length === 0 && data.healerIds.length === 0) || data.totalPointsRaw === 0) {
                 window.openCustomModal('Erro', 'Preencha o valor do BT e adicione pelo menos um ANBU na PT.', 'info');
                 return;
            }

            statusElement.classList.remove('hidden');
            statusElement.className = 'text-yellow-400 p-4 bg-yellow-900/50 rounded-lg block';
            statusElement.textContent = window.isEditingMode ? `Salvando alterações e recalculando...` : `Registrando BT e atualizando Rank...`;

            const batch = writeBatch(db);

            try {
                const reportRef = doc(db, COLLECTIONS.REPORTS, data.reportId);
                batch.set(reportRef, data); 

                if (!window.isEditingMode) {
                    for (const participantId of data.killerIds) {
                        const ninjaRef = doc(db, COLLECTIONS.NINJAS, participantId);
                        batch.set(ninjaRef, { 
                            rankPoints: (ninjasData[participantId]?.rankPoints || 0) + data.pointsPerKiller,
                            missionsCompleted: (ninjasData[participantId]?.missionsCompleted || 0) + 1,
                        }, { merge: true });
                    }
                    for (const participantId of data.assistIds) {
                        const ninjaRef = doc(db, COLLECTIONS.NINJAS, participantId);
                        batch.set(ninjaRef, { 
                            rankPoints: (ninjasData[participantId]?.rankPoints || 0) + data.pointsPerAssist,
                            missionsCompleted: (ninjasData[participantId]?.missionsCompleted || 0) + 1,
                        }, { merge: true });
                    }
                    for (const healerId of data.healerIds) {
                        const ninjaRef = doc(db, COLLECTIONS.NINJAS, healerId);
                        batch.set(ninjaRef, { 
                            rankPoints: (ninjasData[healerId]?.rankPoints || 0) + data.pointsPerHealer,
                            missionsCompleted: (ninjasData[healerId]?.missionsCompleted || 0) + 1,
                        }, { merge: true });
                    }
                    await batch.commit();
                } else {
                    await batch.commit();
                    await window.recalculateAllRanks(true);
                    window.isEditingMode = false;
                }

                statusElement.textContent = `✅ Sucesso! Registro finalizado.`;
                statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                
                selectedKillers = [];
                selectedAssists = [];
                selectedHealers = [];
                window.updateExecutorTags();
                window.updateExecutorSelect(); 
                window.generateReportId();
                
                const targetsContainer = document.getElementById('targets-container');
                if (targetsContainer) targetsContainer.innerHTML = '';
                window.addTargetEntry(); 

                window.updateDescriptionPreview(); 
                document.getElementById('submit-report').innerHTML = 'Salvar Caçada e Atualizar Rank';

            } catch (e) {
                statusElement.textContent = `❌ Erro no Registro: ${e.message}.`;
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
            }
            setTimeout(() => statusElement.classList.add('hidden'), 7000);
        }

        window.deleteReport = function(reportId) {
            if (!isWriterMode && !isMasterAdminMode) return;
            
            window.openCustomModal('Excluir Registro', `Tem certeza que deseja excluir o registro ${reportId}? Isso não pode ser desfeito e os pontos serão recalculados automaticamente.`, 'confirm').then(async (confirmed) => {
                if (confirmed) {
                    const statusElement = document.getElementById('status');
                    statusElement.classList.remove('hidden');
                    statusElement.className = 'text-yellow-400 p-4 bg-yellow-900/50 rounded-lg block';
                    statusElement.textContent = `Excluindo registro ${reportId}...`;
                    
                    try {
                        await deleteDoc(doc(db, COLLECTIONS.REPORTS, reportId));
                        window.logAction('DELETE_REPORT', { reportId: reportId });
                        await window.recalculateAllRanks(true); 
                        
                        statusElement.textContent = `✅ Registro excluído e ranks atualizados com sucesso!`;
                        statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                    } catch (e) {
                        statusElement.textContent = `❌ Erro: ${e.message}`;
                        statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                    }
                    setTimeout(() => statusElement.classList.add('hidden'), 5000);
                }
            });
        }

        window.editReport = function(reportId) {
            if (!isWriterMode && !isMasterAdminMode) return;
            const report = reportsData.find(r => r.reportId === reportId);
            if (!report) return;

            window.renderPage('report_form');

            currentReportId = report.reportId;
            window.isEditingMode = true;

            selectedKillers = report.killerIds || [];
            selectedAssists = report.assistIds || report.executorIds || []; 
            selectedHealers = report.healerIds || [];

            const targetsContainer = document.getElementById('targets-container');
            targetsContainer.innerHTML = '';
            targetEntryCount = 0;

            if (report.targets && report.targets.length > 0) {
                report.targets.forEach(t => {
                    window.addTargetEntry();
                    const entry = document.getElementById(`target-${targetEntryCount}`);
                    entry.querySelector('.target-name').value = t.name;
                    entry.querySelector('.target-bt').value = t.btBase;
                    entry.querySelector('.target-chk-special').checked = t.isSpecial;

        window.recalculateAllRanks = async function(calledInternally = false) {
            if (!isWriterMode && !isMasterAdminMode) return;
            if (!calledInternally) {
                const confirmed = await window.openCustomModal(
                    'Confirmação de Recálculo', 'RECALCULAR todos os Ranks com base no histórico de BTs?', 'confirm'
                );
                if (!confirmed) return;
            }

            const statusElement = document.getElementById('status');
            if (!calledInternally) {
                statusElement.classList.remove('hidden');
                statusElement.className = 'text-yellow-400 p-4 bg-yellow-900/50 rounded-lg block';
                statusElement.textContent = `Recalculando Ranks...`;
            }

            try {
                const tempNinjas = {};
                Object.values(ninjasData).forEach(ninja => {
                    if(ninja.id) tempNinjas[ninja.id] = { ...ninja, rankPoints: 0, missionsCompleted: 0 };
                });

                let applyBatch = writeBatch(db);

                reportsData.forEach((report) => {
                    if (report.killerIds && report.killerIds.length > 0) {
                        report.killerIds.forEach(id => {
                             if (!tempNinjas[id]) tempNinjas[id] = { id: id, isActive: true, rankPoints: 0, missionsCompleted: 0 };
                             tempNinjas[id].rankPoints += Number(report.pointsPerKiller || report.totalPointsRaw || 0) || 0;
                             tempNinjas[id].missionsCompleted += 1;
                        });
                    }
                    if (report.assistIds && report.assistIds.length > 0) {
                        report.assistIds.forEach(id => {
                             if (!tempNinjas[id]) tempNinjas[id] = { id: id, isActive: true, rankPoints: 0, missionsCompleted: 0 };
                             tempNinjas[id].rankPoints += Number(report.pointsPerAssist || 0) || 0;
                             tempNinjas[id].missionsCompleted += 1;
                        });
                    }
                    if (report.executorIds && report.executorIds.length > 0 && (!report.killerIds || report.killerIds.length === 0) && (!report.assistIds || report.assistIds.length === 0)) {
                        report.executorIds.forEach(id => {
                             if (!tempNinjas[id]) tempNinjas[id] = { id: id, isActive: true, rankPoints: 0, missionsCompleted: 0 };
                             tempNinjas[id].rankPoints += Number(report.pointsPerAttacker || report.totalPointsRaw || 0) || 0;
                             tempNinjas[id].missionsCompleted += 1;
                        });
                    }
                    if (report.healerIds && report.healerIds.length > 0) {
                        report.healerIds.forEach(id => {
                             if (!tempNinjas[id]) tempNinjas[id] = { id: id, isActive: true, rankPoints: 0, missionsCompleted: 0 };
                             tempNinjas[id].rankPoints += Number(report.pointsPerHealer || report.totalPointsRaw || 0) || 0;
                             tempNinjas[id].missionsCompleted += 1;
                        });
                    }
                });

                Object.values(tempNinjas).forEach(ninja => {
                    if(ninja.id) {
                        applyBatch.update(doc(db, COLLECTIONS.NINJAS, ninja.id), {
                            rankPoints: isNaN(ninja.rankPoints) ? 0 : ninja.rankPoints,
                            missionsCompleted: isNaN(ninja.missionsCompleted) ? 0 : ninja.missionsCompleted
                        });
                    }
                });

                await applyBatch.commit();

                if (!calledInternally) {
                    statusElement.textContent = `✅ Sucesso! Recálculo concluído.`;
                    statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                    setTimeout(() => statusElement.classList.add('hidden'), 5000);
                }
            } catch (e) {
                statusElement.textContent = `❌ Erro no Recálculo: ${e.message}`;
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 7000);
            }
        }

        window.renderTargetsTable = function(page = 1) {
            const tbody = document.getElementById('targets-scoreboard');
            if (!tbody) return;

            const targetsMap = {};

            reportsData.forEach(report => {
                if (report.targets && report.targets.length > 0) {
                    report.targets.forEach(t => {
                        const name = t.name ? t.name.trim().toLowerCase() : 'desconhecido';
                        if (!targetsMap[name]) targetsMap[name] = { name: t.name || 'Desconhecido', count: 0, totalBT: 0 };
                        targetsMap[name].count += 1;
                        targetsMap[name].totalBT += (t.btBase || 0);
                    });
                } else if (report.targetName) {
                    const name = report.targetName.trim().toLowerCase();
                    if (!targetsMap[name]) targetsMap[name] = { name: report.targetName, count: 0, totalBT: 0 };
                    targetsMap[name].count += 1;
                    targetsMap[name].totalBT += (report.btBase || report.totalPointsRaw || 0);
                }
            });

            const sortedTargets = Object.values(targetsMap).sort((a, b) => b.count - a.count || b.totalBT - a.totalBT);

            // --- LÓGICA DE PAGINAÇÃO ---
            const ITEMS_PER_PAGE = 10;
            const totalPages = Math.ceil(sortedTargets.length / ITEMS_PER_PAGE);
            if (page < 1) page = 1;
            if (page > totalPages && totalPages > 0) page = totalPages;

            const startIndex = (page - 1) * ITEMS_PER_PAGE;
            const paginatedTargets = sortedTargets.slice(startIndex, startIndex + ITEMS_PER_PAGE);

            tbody.innerHTML = '';
            if (sortedTargets.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-4 text-center text-gray-500 italic">Nenhum alvo registrado ainda.</td></tr>`;
                return;
            }

            paginatedTargets.forEach((target, index) => {
                const realIndex = startIndex + index + 1; // Para o Ícone e Posição ficarem corretos na página 2+
                const rankIcon = getRankIcon(realIndex);
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-700/50">
                        <td class="px-6 py-2 whitespace-nowrap text-sm font-bold text-center">${rankIcon}</td>
                        <td class="px-6 py-2 whitespace-nowrap text-sm font-medium text-orange-300 capitalize">${target.name}</td>
                        <td class="px-6 py-2 whitespace-nowrap text-sm font-bold text-red-400">${target.count}x</td>
                        <td class="px-6 py-2 whitespace-nowrap text-sm text-gray-300">${target.totalBT} BT Base</td>
                    </tr>
                `;
            });

            // --- CRIAR BOTÕES DE PÁGINA ---
            const tableContainer = tbody.closest('.overflow-x-auto');
            const oldPagination = tableContainer.parentElement.querySelector('.targets-pagination');
            if (oldPagination) oldPagination.remove();

            if (totalPages > 1) {
                const prevDisabled = page === 1 ? 'disabled opacity-50 cursor-not-allowed' : '';
                const nextDisabled = page === totalPages ? 'disabled opacity-50 cursor-not-allowed' : '';

                const paginationHtml = `
                    <div class="flex justify-center items-center gap-4 mt-4 p-2 w-full targets-pagination">
                        <button onclick="window.renderTargetsTable(${page - 1})" class="px-4 py-2 bg-gray-700 hover:bg-orange-600 rounded-lg text-white font-bold transition" ${prevDisabled}>Anterior</button>
                        <span class="px-4 py-2 text-gray-300 font-bold bg-gray-800 rounded-lg">Página ${page} de ${totalPages}</span>
                        <button onclick="window.renderTargetsTable(${page + 1})" class="px-4 py-2 bg-gray-700 hover:bg-orange-600 rounded-lg text-white font-bold transition" ${nextDisabled}>Próxima</button>
                    </div>
                `;
                const paginationDiv = document.createElement('div');
                paginationDiv.className = 'targets-pagination';
                paginationDiv.innerHTML = paginationHtml;
                tableContainer.parentElement.appendChild(paginationDiv);
            }
        }

        window.renderReportsLogFiltered = function(filterId = null, targetId = 'filtered-reports-log', page = 1) {
            const reportsLog = document.getElementById(targetId);
            const guardianSummaryDiv = document.getElementById('guardian-summary');
            if (!reportsLog) return;
            
            reportsLog.innerHTML = '';
            let filteredReports = reportsData;

            if (filterId) {
                filteredReports = reportsData.filter(report => {
                    const isKiller = Array.isArray(report.killerIds) && report.killerIds.includes(filterId);
                    const isAssist = Array.isArray(report.assistIds) && report.assistIds.includes(filterId);
                    const isLegacyExecutor = Array.isArray(report.executorIds) && report.executorIds.includes(filterId);
                    const isHealer = Array.isArray(report.healerIds) && report.healerIds.includes(filterId);
                    return isKiller || isAssist || isLegacyExecutor || isHealer;
                });
            }
            
            if (filterId && guardianSummaryDiv) {
                const ninjaData = ninjasData[filterId];
                if (ninjaData) {
                    
                    let killCount = 0, killPoints = 0;
                    let assistCount = 0, assistPoints = 0;
                    let healCount = 0, healPoints = 0;

                    filteredReports.forEach(r => {
                        let targetsInReport = (r.targets && r.targets.length > 0) ? r.targets.length : 1;
                        
                        if (r.killerIds && r.killerIds.includes(filterId)) {
                            killCount += targetsInReport;
                            killPoints += (r.pointsPerKiller || r.totalPointsRaw || 0);
                        }
                        if (r.assistIds && r.assistIds.includes(filterId)) {
                            assistCount += targetsInReport;
                            assistPoints += (r.pointsPerAssist || 0);
                        }
                        if (r.executorIds && r.executorIds.includes(filterId) && (!r.killerIds && !r.assistIds)) {
                            killCount += targetsInReport; 
                            killPoints += (r.pointsPerAttacker || 0);
                        }
                        if (r.healerIds && r.healerIds.includes(filterId)) {
                            healCount += targetsInReport;
                            healPoints += (r.pointsPerHealer || r.totalPointsRaw || 0);
                        }
                    });

                    guardianSummaryDiv.innerHTML = `
                        <div class="flex flex-col md:flex-row justify-between items-center border-b border-gray-600 pb-4 mb-4">
                            <div class="text-center md:text-left">
                                <h3 class="text-2xl font-bold text-red-400 uppercase tracking-wider">${filterId}</h3>

            const totalPages = Math.ceil(sortedReports.length / ITEMS_PER_PAGE);
            if (page < 1) page = 1;
            if (page > totalPages && totalPages > 0) page = totalPages;

            const startIndex = (page - 1) * ITEMS_PER_PAGE;

                        let divisaoText = `<span class="text-xs text-gray-500 font-bold mt-2 block">TOTAL DA CAÇADA: ${data.totalPointsRaw} Pts (`;
                        if (data.pointsPerKiller > 0) divisaoText += `Killer: ${data.pointsPerKiller}/cada | `;
                        if (data.pointsPerAssist > 0) divisaoText += `Assists (1/3): ${data.pointsPerAssist}/cada | `;
                        if (data.pointsPerHealer > 0) divisaoText += `Healer: ${data.pointsPerHealer}/cada`;

                                <span class="font-mono text-gray-300 block mb-1">${data.reportId}</span>

                    </div>
                `;
                const paginationDiv = document.createElement('div');

        async function initializeFirebase() {
            try {
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                await signInAnonymously(auth);
                
                document.getElementById('auth-info').textContent = `Conectado ao Banco Central ANBU`;
                setupFirestoreListeners(); 
                window.renderPage(currentPage);
                window.generateReportId(); 
            } catch (error) {
                document.getElementById('status').textContent = `❌ Erro ao conectar: ${error.message}`;
            }
        }
        
        function setupFirestoreListeners() {
            if (!db) return;

            onSnapshot(collection(db, COLLECTIONS.ACCESS_KEYS), (snapshot) => {
                accessKeysData = {};
                snapshot.forEach(doc => accessKeysData[doc.id] = doc.data());
                if (currentPage === 'admin_panel') window.renderPage(currentPage); 
            }, (error) => {});

            onSnapshot(collection(db, COLLECTIONS.NINJAS), (snapshot) => {
                ninjasData = {};
                snapshot.forEach(doc => ninjasData[doc.id] = doc.data());
                window.updateExecutorSelect && window.updateExecutorSelect();
                if (['scoreboard', 'ninja_panel'].includes(currentPage)) window.renderPage(currentPage);
                else if (currentPage === 'admin_panel') window.renderNinjasTable && window.renderNinjasTable();
            }, (error) => {});

            onSnapshot(collection(db, COLLECTIONS.REPORTS), (snapshot) => {
                reportsData = [];
                snapshot.forEach(doc => reportsData.push(doc.data()));
                window.updateTargetSuggestions(); 
                if (['reports_log', 'ninja_panel'].includes(currentPage)) window.renderPage(currentPage);
                else if (currentPage === 'targets_log') window.renderTargetsTable && window.renderTargetsTable();
            }, (error) => {});
        }
        
        window.toggleWriterUI = function(isAuthorized) {
            isWriterMode = isAuthorized;
            const writerElements = document.querySelectorAll('.writer-only');
            writerElements.forEach(el => isAuthorized ? el.classList.remove('hidden') : el.classList.add('hidden'));
        }

        window.toggleMasterAdminUI = function(isAuthorized) {
            isMasterAdminMode = isAuthorized;
            const adminElements = document.querySelectorAll('.admin-only');
            adminElements.forEach(el => isAuthorized ? el.classList.remove('hidden') : el.classList.add('hidden'));
        }
        
        window.checkAccessKey = async function() {
            const idInput = document.getElementById('access-id-input');
            const keyInput = document.getElementById('access-key-input');
            const statusElement = document.getElementById('status');
            if (!idInput || !keyInput) return;

            const id = idInput.value.trim();
            const key = keyInput.value.trim();
            if (!id || !key) return;
            
            const accessData = accessKeysData[id];

            if (accessData && accessData.key === key) {
                currentAccessId = id; 
                if (accessData.level === 'master_admin') {
                    window.toggleMasterAdminUI(true);
                    window.toggleWriterUI(true);
                } else if (accessData.level === 'report_writer') {
                    window.toggleWriterUI(true);
                    window.toggleMasterAdminUI(false);
                }
                keyInput.value = ''; idInput.value = '';
                statusElement.classList.remove('hidden');
                statusElement.textContent = `✅ Acesso LIBERADO. ID: ${id}.`;
                statusElement.className = 'text-green-400 p-4 bg-green-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 3000);
                window.renderPage(currentPage);
            } else {
                currentAccessId = 'ANONYMOUS'; 
                window.toggleWriterUI(false);
                window.toggleMasterAdminUI(false);
                statusElement.classList.remove('hidden');
                statusElement.textContent = '❌ ID ou Senha Incorreta.';
                statusElement.className = 'text-red-400 p-4 bg-red-900/50 rounded-lg block';
                setTimeout(() => statusElement.classList.add('hidden'), 5000);
            }
        }
        
        window.renderPage = function(pageName) {
            currentPage = pageName;
            const contentDiv = document.getElementById('content');
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            const activeLink = document.getElementById(`nav-${pageName}`);
            if (activeLink) activeLink.classList.add('active');

            contentDiv.innerHTML = '';

            switch (pageName) {
                case 'home': contentDiv.innerHTML = window.renderHome(); break;
                case 'scoreboard': contentDiv.innerHTML = window.renderRank(); window.renderScoreboard(); break;
                case 'reports_log': contentDiv.innerHTML = window.renderRelatorios(); window.renderReportsLog(); break;
                case 'targets_log': contentDiv.innerHTML = window.renderTargetsLog(); window.renderTargetsTable(); break;
                case 'ninja_panel': contentDiv.innerHTML = window.renderNinjaPanel(); window.renderReportsLogFiltered(); break;
                case 'report_form':
                    contentDiv.innerHTML = window.renderCriarRelatorio();
                    if (!isWriterMode) {
                        contentDiv.innerHTML += '<p class="text-center text-red-500 pt-8">Faça Login na aba Autorização para registrar BTs.</p>';
                        break;
                    }
                    
                    if (!window.isEditingMode) {
                        window.updateExecutorSelect(); 
                        window.updateExecutorTags(); 
                        window.generateReportId(); 
                        window.addTargetEntry(); 
                        window.updateDescriptionPreview(); 
                    }
                    break;
                case 'admin_panel':
                    contentDiv.innerHTML = window.renderAutorizacao();
                    window.renderNinjasTable();
                    break;
                default: contentDiv.innerHTML = window.renderHome();
            }
            
            window.toggleMasterAdminUI(isMasterAdminMode);
            window.toggleWriterUI(isWriterMode);
        }

                            <thead class="bg-gray-700">

                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Rank</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">ID ANBU</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Total de Pontos</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Caçadas Concluídas</th>
                                </tr>
                            </thead>
                            <tbody id="ninjas-scoreboard" class="bg-gray-800 divide-y divide-gray-700"></tbody>
                        </table>
                    </div>
                </section>
            `;
        }

        window.renderRelatorios = function() {
            return `
                <section class="space-y-4 pt-8">
                    <h2 class="text-3xl font-bold text-red-400 text-center">Registro Completo de Caçadas (BTs)</h2>
                    <div class="bg-gray-800 p-4 rounded-xl shadow-xl overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-700">
                            <thead class="bg-gray-700">
                                <tr>
                                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase w-2/12">ID Registro / Ações</th>
                                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase w-3/12">Membros da PT</th>
                                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase w-2/12">Alvos</th>
                                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase w-4/12">Descrição/Pontos</th>
                                    <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase w-1/12">Data</th>
                                </tr>
                            </thead>
                            <tbody id="reports-log" class="bg-gray-800 divide-y divide-gray-700"></tbody>
                        </table>
                    </div>
                </section>
            `;
        }

        window.renderAutorizacao = function() {
             const accessStatus = isMasterAdminMode ? 
                `<div class="text-center text-green-400 font-bold text-lg p-2">✅ MASTER ADMIN ATIVO</div>` : 
                (isWriterMode ? `<div class="text-yellow-400 font-bold text-lg p-2">✅ ANBU ESCRITOR ATIVO</div>` :
                `<div class="text-center text-red-400 font-bold text-lg p-2">❌ ACESSO INATIVO</div>`);

            return `
                <section class="space-y-4 pt-4 pb-4 bg-gray-900 p-6 rounded-xl shadow-inner border border-red-500/50">
                     <h2 class="text-2xl font-bold text-red-400 text-center">Autorização de Escrita (Login)</h2>
                     <div id="admin-status-display">${accessStatus}</div>
                     <div class="flex flex-col md:flex-row gap-4 max-w-lg mx-auto">
                         <input id="access-id-input" type="text" placeholder="Seu ID" class="flex-grow p-2 rounded-lg bg-gray-700 border border-gray-600 text-white shadow-inner">
                         <input id="access-key-input" type="password" placeholder="Sua Senha" class="flex-grow p-2 rounded-lg bg-gray-700 border border-gray-600 text-white shadow-inner">
                         <button id="set-access-key-btn" class="w-full md:w-auto py-2 px-4 bg-red-600 hover:bg-red-700 rounded-lg font-bold text-white transition duration-200" onclick="window.checkAccessKey()">Logar</button>
                     </div>
                </section>
                
                <section class="space-y-4 pt-8 pb-16">
                    <h2 class="text-3xl font-bold text-yellow-400 text-center">Cadastro: ANBUs (Membros Oficiais)</h2>
                    
                    <div id="add-ninja-form" class="bg-gray-700 p-4 rounded-lg shadow-inner flex flex-col sm:flex-row gap-4 admin-only hidden flex-wrap">
                        <input id="new-ninja-id" type="text" placeholder="ID do Novo ANBU" class="flex-grow p-2 rounded-lg bg-gray-800 border border-gray-600 text-white min-w-[200px]">
                        
                        <select id="new-ninja-mastery-1" class="w-full sm:w-40 p-2 rounded-lg bg-gray-800 border border-gray-600 text-white">
                             <option value="Fogo" selected>Fogo</option>
                             <option value="Água">Água</option>
                             <option value="Vento">Vento</option>
                             <option value="Terra">Terra</option>
                             <option value="Raio">Raio</option>
                             <option value="Med (Chakra)">Med (Chakra)</option>
                             <option value="Med (Int)">Med (Int)</option>
                             <option value="WM">WM</option>
                             <option value="TAI">TAI</option>
                        </select>
                        
                        <select id="new-ninja-mastery-2" class="w-full sm:w-40 p-2 rounded-lg bg-gray-800 border border-gray-600 text-white">
                             <option value="" selected>2ª (Opcional)</option>
                             <option value="Fogo">Fogo</option>
                             <option value="Água">Água</option>
                             <option value="Vento">Vento</option>
                             <option value="Terra">Terra</option>
                             <option value="Raio">Raio</option>
                             <option value="Med (Chakra)">Med (Chakra)</option>
                             <option value="Med (Int)">Med (Int)</option>
                             <option value="WM">WM</option>
                             <option value="TAI">TAI</option>
                        </select>

                        <button id="add-ninja" class="w-full sm:w-auto py-2 px-4 bg-yellow-600 hover:bg-yellow-700 rounded-lg font-bold text-white transition duration-200" onclick="window.addNinja()">Cadastrar ANBU</button>
                    </div>

                    <div class="bg-gray-800 p-4 rounded-xl shadow-xl overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-700">
                            <thead class="bg-gray-700">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">ID ANBU</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Maestrias</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Status</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase admin-only hidden">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="ninjas-cadastro" class="bg-gray-800 divide-y divide-gray-700"></tbody>
                        </table>
                    </div>
                </section>

                <div id="writer-tools" class="pt-8 space-y-4 writer-only hidden">
                    <h3 class="text-xl font-bold text-red-400 border-b border-red-400/50 pb-2">Ferramentas de Manutenção</h3>
                    <button onclick="window.recalculateAllRanks()" class="w-full py-2 px-4 bg-red-600 hover:bg-red-700 rounded-lg font-bold text-white text-lg transition duration-200">
                        🔄 Recalcular Todos os Ranks
                    </button>
                </div>

                <div id="admin-tools" class="pt-4 space-y-4 admin-only hidden">
                    <h3 class="text-xl font-bold text-red-500 border-b border-red-500/50 pb-2">Ferramentas de Exclusão (Admin Master)</h3>
                    <button onclick="window.clearReportsLog()" class="w-full py-2 px-4 bg-red-700 hover:bg-red-800 rounded-lg font-bold text-white transition duration-200">
                        ⚔️ Excluir Histórico de Registros (ZERA Ranks)
                    </button>
                </div>
            `;
        }
        
        window.onload = function() { initializeFirebase(); }
    </script>
</body>
</html>
